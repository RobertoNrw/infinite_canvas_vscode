<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Infinite Canvas</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --grid-color: #333;
            --text-color: #e0e0e0;
            --node-bg: #2d2d2d;
            --node-border: #444;
            --accent: #007acc;
            --accent-glow: rgba(0, 122, 204, 0.4);
            --ekg-color: #ff3333;
            --ekg-glow: rgba(255, 51, 51, 0.6);
            --port-size: 12px;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(45, 45, 45, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            gap: 8px;
            pointer-events: auto;
            border: 1px solid #444;
        }

        button {
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(45, 45, 45, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .help-text {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            font-size: 11px;
            color: #666;
            pointer-events: none;
            line-height: 1.4;
        }

        /* Context Menu */
        #context-menu {
            position: absolute;
            display: none;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 5px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            pointer-events: auto;
        }

        #context-menu div {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
        }

        #context-menu div:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>

    <!-- EKG Background Layer -->
    <canvas id="ekg-canvas"></canvas>
    <!-- Main Canvas Layer -->
    <canvas id="main-canvas"></canvas>

    <div id="ui-layer">
        <div class="toolbar">
            <button onclick="addNode('monitor')">📊 Monitor</button>
            <button onclick="addNode('ecg')">❤️ EKG</button>
            <button onclick="addNode('note')">📝 Note</button>
            <button onclick="clearCanvas()">🗑️ Clear</button>
        </div>

        <div class="status-bar">
            <div class="status-indicator"></div>
            <span id="status-text">Bereit | Shift+Drag: Pan | Drag: Move Node | Pull: Connect</span>
        </div>

        <div class="help-text">
            Rechtsklick: Neues Node<br>
            Mausrad: Zoom<br>
            Shift + Klick/Zieh: Canvas bewegen
        </div>

        <div id="context-menu">
            <div onclick="addNodeAtContext('monitor')">Monitor hinzufügen</div>
            <div onclick="addNodeAtContext('ecg')">EKG hinzufügen</div>
            <div onclick="addNodeAtContext('note')">Notiz hinzufügen</div>
            <div onclick="deleteSelectedNode()">Löschen</div>
        </div>
    </div>

<script>
/**
 * MEDICAL INFINITE CANVAS
 * Optimiert für Performance und UX
 */

// --- Configuration & State ---
const config = {
    gridSize: 40,
    snapThreshold: 30,
    nodeWidth: 200,
    nodeHeight: 120,
    portRadius: 6,
    colors: {
        grid: '#333333',
        gridMajor: '#444444',
        nodeBg: '#2d2d2d',
        nodeBorder: '#555555',
        nodeSelected: '#007acc',
        text: '#e0e0e0',
        portInput: '#ff5555',
        portOutput: '#55ff55',
        connection: '#888888'
    }
};

const state = {
    nodes: [],
    connections: [],
    scale: 1,
    offsetX: 0,
    offsetY: 0,
    isDragging: false,
    isPanning: false,
    dragStart: { x: 0, y: 0 },
    selectedNode: null,
    hoveredPort: null,
    connectingFrom: null, // { nodeId, type: 'output' }
    tempConnection: null, // { x, y }
    contextMenuPos: { x: 0, y: 0 },
    lastTime: 0
};

// --- DOM Elements ---
const mainCanvas = document.getElementById('main-canvas');
const mainCtx = mainCanvas.getContext('2d');
const ekgCanvas = document.getElementById('ekg-canvas');
const ekgCtx = ekgCanvas.getContext('2d');
const statusText = document.getElementById('status-text');
const contextMenu = document.getElementById('context-menu');

// --- EKG Engine ---
const ekgState = {
    points: [],
    x: 0,
    speed: 2,
    mode: 'normal', // normal, tachy, av_block, fib
    timer: 0,
    beatTimer: 0,
    nextBeatIn: 1000
};

function initEKG() {
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);
    requestAnimationFrame(loopEKG);
}

function resizeCanvases() {
    mainCanvas.width = window.innerWidth;
    mainCanvas.height = window.innerHeight;
    ekgCanvas.width = window.innerWidth;
    ekgCanvas.height = window.innerHeight;
}

function updateEKG(dt) {
    ekgState.timer += dt;
    ekgState.beatTimer += dt;

    // Mode Switching every 15s
    if (ekgState.timer > 15000) {
        ekgState.timer = 0;
        const modes = ['normal', 'tachy', 'av_block', 'fib'];
        ekgState.mode = modes[Math.floor(Math.random() * modes.length)];
        console.log("EKG Mode:", ekgState.mode);
        
        // Reset params based on mode
        switch(ekgState.mode) {
            case 'normal': ekgState.speed = 2; ekgState.nextBeatIn = 1000; break;
            case 'tachy': ekgState.speed = 4; ekgState.nextBeatIn = 400; break;
            case 'av_block': ekgState.speed = 2; ekgState.nextBeatIn = 1200; break;
            case 'fib': ekgState.speed = 3; ekgState.nextBeatIn = 0; break;
        }
    }

    // Beat Logic
    let shouldBeat = false;
    if (ekgState.mode === 'fib') {
        // Random chaotic beats
        if (Math.random() < 0.05) shouldBeat = true;
    } else {
        if (ekgState.beatTimer > ekgState.nextBeatIn) {
            shouldBeat = true;
            ekgState.beatTimer = 0;
            
            // AV Block logic: Skip some beats randomly
            if (ekgState.mode === 'av_block' && Math.random() > 0.6) {
                shouldBeat = false;
            }
        }
    }

    // Generate Waveform Point
    let y = ekgCanvas.height / 2;
    const amplitude = 40;
    
    if (shouldBeat) {
        // Simple P-QRS-T simulation over time would be complex, 
        // so we use a simplified "spike" approach for the visualizer
        // In a real app, we'd buffer a full beat waveform.
        // Here we just simulate the visual "jump"
        ekgState.currentBeatPhase = 0;
    }

    // Simulate wave drawing
    if (ekgState.mode === 'fib') {
        y += (Math.random() - 0.5) * 30;
    } else if (ekgState.beatTimer < 300 && shouldBeat) {
        // QRS Complex approximation
        const progress = ekgState.beatTimer / 300;
        if (progress < 0.2) y -= amplitude * 0.3; // P
        else if (progress < 0.4) y += amplitude * 1.2; // R spike
        else if (progress < 0.6) y -= amplitude * 0.5; // S
        else if (progress < 0.9) y -= amplitude * 0.3; // T
    }

    ekgState.points.push({ x: ekgState.x, y: y });
    
    // Move X
    ekgState.x += ekgState.speed;
    if (ekgState.x > ekgCanvas.width) {
        ekgState.x = 0;
        ekgState.points = [];
    }

    // Limit points buffer
    if (ekgState.points.length > ekgCanvas.width / ekgState.speed + 10) {
        ekgState.points.shift();
    }
}

function drawEKG() {
    ekgCtx.clearRect(0, 0, ekgCanvas.width, ekgCanvas.height);
    
    // Draw Grid faintly behind EKG? No, keep it clean red on dark
    ekgCtx.beginPath();
    ekgCtx.strokeStyle = config.colors.portInput; // Red
    ekgCtx.lineWidth = 2;
    ekgCtx.lineCap = 'round';
    ekgCtx.lineJoin = 'round';
    ekgCtx.shadowBlur = 10;
    ekgCtx.shadowColor = config.colors.portInput;

    if (ekgState.points.length > 0) {
        ekgCtx.moveTo(ekgState.points[0].x, ekgState.points[0].y);
        for (let i = 1; i < ekgState.points.length; i++) {
            ekgCtx.lineTo(ekgState.points[i].x, ekgState.points[i].y);
        }
    }
    ekgCtx.stroke();
    ekgCtx.shadowBlur = 0;

    // Draw glowing dot at head
    if (ekgState.points.length > 0) {
        const last = ekgState.points[ekgState.points.length - 1];
        ekgCtx.beginPath();
        ekgCtx.arc(last.x, last.y, 3, 0, Math.PI * 2);
        ekgCtx.fillStyle = '#fff';
        ekgCtx.fill();
    }
}

function loopEKG() {
    const now = performance.now();
    const dt = now - state.lastTime;
    state.lastTime = now;

    updateEKG(dt);
    drawEKG();
    requestAnimationFrame(loopEKG);
}

// --- Main Canvas Logic ---

function screenToWorld(x, y) {
    return {
        x: (x - state.offsetX) / state.scale,
        y: (y - state.offsetY) / state.scale
    };
}

function worldToScreen(x, y) {
    return {
        x: x * state.scale + state.offsetX,
        y: y * state.scale + state.offsetY
    };
}

function addNode(type, x, y) {
    const id = Date.now().toString();
    // Default to center screen if no coords
    if (x === undefined || y === undefined) {
        const center = screenToWorld(window.innerWidth/2, window.innerHeight/2);
        x = center.x - config.nodeWidth/2;
        y = center.y - config.nodeHeight/2;
    }

    state.nodes.push({
        id,
        type,
        x,
        y,
        width: config.nodeWidth,
        height: config.nodeHeight,
        title: type.toUpperCase(),
        inputs: 1,
        outputs: 1
    });
    render();
}

function addNodeAtContext(type) {
    const worldPos = screenToWorld(state.contextMenuPos.x, state.contextMenuPos.y);
    addNode(type, worldPos.x - config.nodeWidth/2, worldPos.y - config.nodeHeight/2);
    contextMenu.style.display = 'none';
}

function deleteSelectedNode() {
    if (!state.selectedNode) return;
    state.nodes = state.nodes.filter(n => n.id !== state.selectedNode.id);
    state.connections = state.connections.filter(c => 
        c.from !== state.selectedNode.id && c.to !== state.selectedNode.id
    );
    state.selectedNode = null;
    render();
    contextMenu.style.display = 'none';
}

function clearCanvas() {
    if(confirm("Alles löschen?")) {
        state.nodes = [];
        state.connections = [];
        state.selectedNode = null;
        render();
    }
}

function getPortPosition(node, type, index) {
    const count = type === 'input' ? node.inputs : node.outputs;
    const spacing = node.height / (count + 1);
    const y = node.y + spacing * (index + 1);
    
    if (type === 'input') {
        return { x: node.x, y: y };
    } else {
        return { x: node.x + node.width, y: y };
    }
}

function hitTestPort(x, y) {
    for (const node of state.nodes) {
        // Check Inputs
        for (let i = 0; i < node.inputs; i++) {
            const pos = getPortPosition(node, 'input', i);
            const dist = Math.hypot(pos.x - x, pos.y - y);
            if (dist < config.portRadius * 2 / state.scale) return { node, type: 'input', index: i, pos };
        }
        // Check Outputs
        for (let i = 0; i < node.outputs; i++) {
            const pos = getPortPosition(node, 'output', i);
            const dist = Math.hypot(pos.x - x, pos.y - y);
            if (dist < config.portRadius * 2 / state.scale) return { node, type: 'output', index: i, pos };
        }
    }
    return null;
}

function hitTestNode(x, y) {
    // Reverse iterate to select top-most first
    for (let i = state.nodes.length - 1; i >= 0; i--) {
        const n = state.nodes[i];
        if (x >= n.x && x <= n.x + n.width && y >= n.y && y <= n.y + n.height) {
            return n;
        }
    }
    return null;
}

function render() {
    mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    
    mainCtx.save();
    mainCtx.translate(state.offsetX, state.offsetY);
    mainCtx.scale(state.scale, state.scale);

    // Draw Grid (Optimized: only visible area could be calculated, but simple fill for now)
    // To improve performance with huge canvas, we only draw grid lines within view roughly
    // But for simplicity in this single file, we draw a large area or use pattern.
    // Let's use a pattern for infinite feel without math overhead per frame
    
    // Actually, let's draw dynamic grid for zoom effect
    const gridSize = config.gridSize;
    const viewLeft = -state.offsetX / state.scale;
    const viewTop = -state.offsetY / state.scale;
    const viewRight = viewLeft + mainCanvas.width / state.scale;
    const viewBottom = viewTop + mainCanvas.height / state.scale;

    const startCol = Math.floor(viewLeft / gridSize) * gridSize;
    const endCol = Math.ceil(viewRight / gridSize) * gridSize;
    const startRow = Math.floor(viewTop / gridSize) * gridSize;
    const endRow = Math.ceil(viewBottom / gridSize) * gridSize;

    mainCtx.strokeStyle = config.colors.grid;
    mainCtx.lineWidth = 1 / state.scale;
    mainCtx.beginPath();
    
    // Vertical
    for (let x = startCol; x <= endCol; x += gridSize) {
        mainCtx.moveTo(x, startRow);
        mainCtx.lineTo(x, endRow);
    }
    // Horizontal
    for (let y = startRow; y <= endRow; y += gridSize) {
        mainCtx.moveTo(startCol, y);
        mainCtx.lineTo(endCol, y);
    }
    mainCtx.stroke();

    // Draw Connections
    mainCtx.lineWidth = 3 / state.scale;
    mainCtx.lineCap = 'round';
    
    state.connections.forEach(conn => {
        const fromNode = state.nodes.find(n => n.id === conn.from);
        const toNode = state.nodes.find(n => n.id === conn.to);
        if (!fromNode || !toNode) return;

        const p1 = getPortPosition(fromNode, 'output', conn.fromIndex);
        const p2 = getPortPosition(toNode, 'input', conn.toIndex);

        drawCurve(mainCtx, p1.x, p1.y, p2.x, p2.y, config.colors.connection);
    });

    // Draw Temp Connection (Dragging)
    if (state.connectingFrom && state.tempConnection) {
        const fromNode = state.nodes.find(n => n.id === state.connectingFrom.nodeId);
        if (fromNode) {
            const p1 = getPortPosition(fromNode, 'output', state.connectingFrom.index);
            // Snap preview
            let p2 = { x: state.tempConnection.x, y: state.tempConnection.y };
            let color = '#fff';
            
            if (state.hoveredPort && state.hoveredPort.type === 'input') {
                p2 = state.hoveredPort.pos;
                color = '#55ff55'; // Green snap
            }

            drawCurve(mainCtx, p1.x, p1.y, p2.x, p2.y, color, true);
        }
    }

    // Draw Nodes
    state.nodes.forEach(node => {
        const isSelected = state.selectedNode === node;
        
        // Shadow
        mainCtx.shadowColor = 'rgba(0,0,0,0.5)';
        mainCtx.shadowBlur = 15;
        mainCtx.shadowOffsetX = 5;
        mainCtx.shadowOffsetY = 5;

        // Body
        mainCtx.fillStyle = config.colors.nodeBg;
        mainCtx.strokeStyle = isSelected ? config.colors.nodeSelected : config.colors.nodeBorder;
        mainCtx.lineWidth = isSelected ? 3 / state.scale : 1 / state.scale;
        
        roundRect(mainCtx, node.x, node.y, node.width, node.height, 8);
        mainCtx.fill();
        mainCtx.stroke();

        // Reset Shadow
        mainCtx.shadowColor = 'transparent';
        mainCtx.shadowBlur = 0;
        mainCtx.shadowOffsetX = 0;
        mainCtx.shadowOffsetY = 0;

        // Header
        mainCtx.fillStyle = isSelected ? config.colors.nodeSelected : '#444';
        mainCtx.fillRect(node.x, node.y, node.width, 25);
        
        // Text
        mainCtx.fillStyle = config.colors.text;
        mainCtx.font = `${14/state.scale}px sans-serif`;
        mainCtx.fillText(node.title, node.x + 10, node.y + 17);

        // Ports
        drawPorts(node);
    });

    mainCtx.restore();
}

function drawPorts(node) {
    // Inputs (Left)
    mainCtx.fillStyle = config.colors.portInput;
    for (let i = 0; i < node.inputs; i++) {
        const pos = getPortPosition(node, 'input', i);
        mainCtx.beginPath();
        mainCtx.arc(pos.x, pos.y, config.portRadius / state.scale, 0, Math.PI * 2);
        mainCtx.fill();
        // White center for visibility
        mainCtx.fillStyle = '#fff';
        mainCtx.beginPath();
        mainCtx.arc(pos.x, pos.y, (config.portRadius * 0.4) / state.scale, 0, Math.PI * 2);
        mainCtx.fill();
        mainCtx.fillStyle = config.colors.portInput;
    }

    // Outputs (Right)
    mainCtx.fillStyle = config.colors.portOutput;
    for (let i = 0; i < node.outputs; i++) {
        const pos = getPortPosition(node, 'output', i);
        mainCtx.beginPath();
        mainCtx.arc(pos.x, pos.y, config.portRadius / state.scale, 0, Math.PI * 2);
        mainCtx.fill();
        // White center
        mainCtx.fillStyle = '#fff';
        mainCtx.beginPath();
        mainCtx.arc(pos.x, pos.y, (config.portRadius * 0.4) / state.scale, 0, Math.PI * 2);
        mainCtx.fill();
        mainCtx.fillStyle = config.colors.portOutput;
    }
}

function drawCurve(ctx, x1, y1, x2, y2, color, isDashed = false) {
    ctx.beginPath();
    ctx.strokeStyle = color;
    if (isDashed) ctx.setLineDash([5, 5]);
    else ctx.setLineDash([]);
    
    const cp1x = x1 + Math.abs(x2 - x1) * 0.5;
    const cp1y = y1;
    const cp2x = x2 - Math.abs(x2 - x1) * 0.5;
    const cp2y = y2;

    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
}

function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

// --- Event Listeners ---

mainCanvas.addEventListener('mousedown', e => {
    const rect = mainCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const worldPos = screenToWorld(mouseX, mouseY);

    state.dragStart = { x: mouseX, y: mouseY };
    state.dragStartWorld = worldPos;

    // 1. Check Ports (Connection Start)
    // Only start connection from Output ports
    const portHit = hitTestPort(worldPos.x, worldPos.y);
    if (portHit && portHit.type === 'output') {
        state.connectingFrom = { nodeId: portHit.node.id, index: portHit.index };
        state.tempConnection = worldPos;
        state.isDragging = true; // Using drag flag for connection too
        return;
    }

    // 2. Check Nodes (Move Node)
    const nodeHit = hitTestNode(worldPos.x, worldPos.y);
    if (nodeHit) {
        state.selectedNode = nodeHit;
        state.isDragging = true;
        render();
        return;
    }

    // 3. Panning (Shift Key OR Middle Mouse OR Spacebar logic handled in keydown, but here check Shift)
    if (e.shiftKey || e.button === 1) {
        state.isPanning = true;
        mainCanvas.style.cursor = 'grabbing';
        return;
    }

    // Deselect if clicked empty space
    state.selectedNode = null;
    render();
});

window.addEventListener('mousemove', e => {
    const rect = mainCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const worldPos = screenToWorld(mouseX, mouseY);

    // Cursor Logic
    if (!state.isDragging && !state.isPanning) {
        const portHit = hitTestPort(worldPos.x, worldPos.y);
        const nodeHit = hitTestNode(worldPos.x, worldPos.y);
        
        if (portHit && portHit.type === 'output') mainCanvas.style.cursor = 'crosshair';
        else if (portHit) mainCanvas.style.cursor = 'pointer';
        else if (nodeHit) mainCanvas.style.cursor = 'move';
        else mainCanvas.style.cursor = 'default';
    }

    if (state.isPanning) {
        const dx = mouseX - state.dragStart.x;
        const dy = mouseY - state.dragStart.y;
        state.offsetX += dx;
        state.offsetY += dy;
        state.dragStart = { x: mouseX, y: mouseY };
        render();
        return;
    }

    if (state.isDragging) {
        if (state.connectingFrom) {
            // Dragging Connection
            state.tempConnection = worldPos;
            
            // Snap Logic
            const portHit = hitTestPort(worldPos.x, worldPos.y);
            if (portHit && portHit.type === 'input' && portHit.node.id !== state.connectingFrom.nodeId) {
                state.hoveredPort = portHit;
            } else {
                state.hoveredPort = null;
            }
            render();
        } else if (state.selectedNode) {
            // Moving Node
            const dx = worldPos.x - state.dragStartWorld.x;
            const dy = worldPos.y - state.dragStartWorld.y;
            state.selectedNode.x += dx;
            state.selectedNode.y += dy;
            state.dragStartWorld = worldPos; // Update for smooth next frame
            render();
        }
    }
});

window.addEventListener('mouseup', e => {
    if (state.connectingFrom && state.hoveredPort) {
        // Create Connection
        // Prevent duplicates
        const exists = state.connections.some(c => 
            c.from === state.connectingFrom.nodeId && 
            c.fromIndex === state.connectingFrom.index &&
            c.to === state.hoveredPort.node.id &&
            c.toIndex === state.hoveredPort.index
        );

        if (!exists) {
            state.connections.push({
                from: state.connectingFrom.nodeId,
                fromIndex: state.connectingFrom.index,
                to: state.hoveredPort.node.id,
                toIndex: state.hoveredPort.index
            });
        }
    }

    state.isDragging = false;
    state.isPanning = false;
    state.connectingFrom = null;
    state.tempConnection = null;
    state.hoveredPort = null;
    mainCanvas.style.cursor = 'default';
    render();
});

mainCanvas.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomSensitivity = 0.001;
    const delta = -e.deltaY * zoomSensitivity;
    const oldScale = state.scale;
    
    // Exponential zoom
    let newScale = state.scale * Math.pow(1.1, e.deltaY > 0 ? -1 : 1);
    newScale = Math.max(0.1, Math.min(5, newScale));

    // Zoom towards mouse pointer
    const rect = mainCanvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const worldX = (mouseX - state.offsetX) / oldScale;
    const worldY = (mouseY - state.offsetY) / oldScale;

    state.offsetX = mouseX - worldX * newScale;
    state.offsetY = mouseY - worldY * newScale;
    state.scale = newScale;

    render();
}, { passive: false });

// Context Menu
mainCanvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    state.contextMenuPos = { x: e.clientX, y: e.clientY };
    contextMenu.style.display = 'block';
    contextMenu.style.left = e.clientX + 'px';
    contextMenu.style.top = e.clientY + 'px';
});

window.addEventListener('click', e => {
    if (e.target !== contextMenu && e.target.parentNode !== contextMenu) {
        contextMenu.style.display = 'none';
    }
});

// Keyboard Shortcuts
window.addEventListener('keydown', e => {
    if (e.code === 'Space') {
        mainCanvas.style.cursor = 'grab';
        // Optional: Auto-pan mode if held, but we rely on Shift+Drag mostly
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
        // Don't delete if typing in an input (not implemented yet, but good practice)
        deleteSelectedNode();
    }
});

window.addEventListener('keyup', e => {
    if (e.code === 'Space') {
        mainCanvas.style.cursor = 'default';
    }
});

// --- Initialization ---
initEKG();
addNode('monitor');
addNode('ecg', 100, 200);
render();

</script>
</body>
