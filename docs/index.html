<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Infinite Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            pointer-events: auto;
            margin-bottom: 10px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        h1 { font-size: 18px; color: #333; margin-bottom: 8px; }
        p { font-size: 12px; color: #666; line-height: 1.5; }
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            margin-top: 5px;
        }
        .btn:hover { background: #0056b3; transform: translateY(-1px); }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #545b62; }
        
        .ekg-status {
            margin-top: 10px;
            font-size: 11px;
            font-weight: bold;
            color: #dc3545;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #dc3545;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="panel">
            <h1>Medical Canvas</h1>
            <p>• <b>Links-Klick + Drag:</b> Verschieben / Auswahl<br>
               • <b>Rechts-Klick:</b> Node erstellen<br>
               • <b>Scroll:</b> Zoomen<br>
               • <b>Drag von Punkt:</b> Verbindung erstellen (kein Shift!)<br>
               • <b>Nahe an Port:</b> Rastet automatisch ein</p>
            <button class="btn" onclick="addNode()">+ Node hinzufügen</button>
            <button class="btn btn-secondary" onclick="clearCanvas()">Alles löschen</button>
            <div class="ekg-status">
                <div class="dot"></div>
                <span id="ekg-mode">Modus: Normal Sinus</span>
            </div>
        </div>
    </div>

    <canvas id="ekg-canvas"></canvas>
    <canvas id="main-canvas"></canvas>

<script>
const config = {
    gridColor: '#e0e0e0',
    nodeColor: '#ffffff',
    nodeBorder: '#cbd5e1',
    nodeBorderSelected: '#3b82f6',
    portColor: '#94a3b8',
    portHoverColor: '#3b82f6',
    connectionColor: '#64748b',
    connectionSelected: '#3b82f6',
    ekgColor: 'rgba(220, 38, 38, 0.35)',
    snapDistance: 30
};

const state = {
    nodes: [],
    connections: [],
    scale: 1,
    offsetX: 0,
    offsetY: 0,
    isDragging: false,
    selectedNode: null,
    hoveredPort: null,
    connectingFrom: null,
    currentMousePos: { x: 0, y: 0 },
    nextId: 1
};

const mainCanvas = document.getElementById('main-canvas');
const mainCtx = mainCanvas.getContext('2d');
const ekgCanvas = document.getElementById('ekg-canvas');
const ekgCtx = ekgCanvas.getContext('2d');

let lastTime = 0;
const ekgState = { timer: 0, mode: 'normal' };

const modes = [
    { name: 'Normal Sinus', code: 'normal' },
    { name: 'Sinustachykardie', code: 'tachy' },
    { name: 'AV-Block II', code: 'av-block' },
    { name: 'Vorhofflimmern', code: 'fib' }
];

setInterval(() => {
    const m = modes[Math.floor(Math.random() * modes.length)];
    ekgState.mode = m.code;
    document.getElementById('ekg-mode').innerText = `Modus: ${m.name}`;
}, 10000);

function generateECG(t, mode) {
    let noise = (Math.random() - 0.5) * 2;
    if (mode === 'fib') noise *= 6;
    let val = noise;
    
    if (mode === 'av-block' && Math.random() < 0.3) return val;
    
    let speed = mode === 'tachy' ? 2.5 : (mode === 'fib' ? 4 : 1);
    const cycle = (t * speed) % 1000;

    if (mode !== 'fib') {
        if (cycle > 50 && cycle < 150) val -= Math.sin(((cycle - 50) / 100) * Math.PI) * 15;
        if (cycle > 160 && cycle < 240) {
            if (cycle < 180) val += (cycle - 160) * 1.5;
            else if (cycle < 200) val -= (cycle - 180) * 4;
            else val += (cycle - 200) * 1.5;
        }
        if (cycle > 350 && cycle < 550) val -= Math.sin(((cycle - 350) / 200) * Math.PI) * 10;
    } else {
        val += (Math.random() - 0.5) * 50;
    }
    return val;
}

function drawEKG(dt) {
    const w = ekgCanvas.width, h = ekgCanvas.height, cy = h / 2;
    ekgCtx.clearRect(0, 0, w, h);
    ekgState.timer += dt;
    
    ekgCtx.beginPath();
    ekgCtx.strokeStyle = config.ekgColor;
    ekgCtx.lineWidth = 2;
    ekgCtx.lineCap = 'round';
    
    for (let x = 0; x < w; x += 2) {
        const t = (ekgState.timer - (w - x)) * 0.5;
        const y = cy + generateECG(t, ekgState.mode);
        x === 0 ? ekgCtx.moveTo(x, y) : ekgCtx.lineTo(x, y);
    }
    ekgCtx.stroke();
    
    const curY = cy + generateECG(ekgState.timer, ekgState.mode);
    ekgCtx.beginPath();
    ekgCtx.fillStyle = '#dc2626';
    ekgCtx.arc(w - 5, curY, 3, 0, Math.PI * 2);
    ekgCtx.fill();
}

function resize() {
    mainCanvas.width = window.innerWidth;
    mainCanvas.height = window.innerHeight;
    ekgCanvas.width = window.innerWidth;
    ekgCanvas.height = window.innerHeight;
    render();
}

function screenToWorld(x, y) {
    return { x: (x - state.offsetX) / state.scale, y: (y - state.offsetY) / state.scale };
}

function worldToScreen(x, y) {
    return { x: x * state.scale + state.offsetX, y: y * state.scale + state.offsetY };
}

function addNode(x, y) {
    const wp = (x && y) ? screenToWorld(x, y) : { x: 0, y: 0 };
    state.nodes.push({
        id: state.nextId++,
        x: wp.x - 75, y: wp.y - 40,
        width: 150, height: 80,
        title: `Node ${state.nodes.length + 1}`,
        content: 'Datenpunkt',
        inputs: [{ id: 'in1', x: 0, y: 0.5 }],
        outputs: [{ id: 'out1', x: 1, y: 0.5 }]
    });
    render();
}

function clearCanvas() {
    state.nodes = [];
    state.connections = [];
    state.selectedNode = null;
    render();
}

function getPortPos(node, port) {
    return { x: node.x + port.x * node.width, y: node.y + port.y * node.height };
}

function findNearestPort(x, y, excludeId) {
    let nearest = null, minD = config.snapDistance;
    state.nodes.forEach(n => {
        if (n.id === excludeId) return;
        n.inputs.forEach(p => {
            const pos = getPortPos(n, p);
            const d = Math.hypot(pos.x - x, pos.y - y);
            if (d < minD) { minD = d; nearest = { node: n, port: p, type: 'input', pos }; }
        });
    });
    return nearest;
}

function render() {
    mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    drawGrid();
    drawConnections();
    if (state.connectingFrom) drawActiveConnection();
    state.nodes.forEach(drawNode);
}

function drawGrid() {
    const gs = 50 * state.scale;
    const ox = state.offsetX % gs, oy = state.offsetY % gs;
    mainCtx.beginPath();
    mainCtx.strokeStyle = config.gridColor;
    mainCtx.lineWidth = 1;
    for (let x = ox; x < mainCanvas.width; x += gs) { mainCtx.moveTo(x, 0); mainCtx.lineTo(x, mainCanvas.height); }
    for (let y = oy; y < mainCanvas.height; y += gs) { mainCtx.moveTo(0, y); mainCtx.lineTo(mainCanvas.width, y); }
    mainCtx.stroke();
    
    const o = worldToScreen(0, 0);
    mainCtx.beginPath();
    mainCtx.fillStyle = '#ef4444';
    mainCtx.arc(o.x, o.y, 4, 0, Math.PI * 2);
    mainCtx.fill();
}

function drawNode(node) {
    const sel = state.selectedNode === node;
    mainCtx.shadowColor = 'rgba(0,0,0,0.1)';
    mainCtx.shadowBlur = 15;
    mainCtx.shadowOffsetY = 5;
    mainCtx.fillStyle = config.nodeColor;
    roundRect(mainCtx, node.x, node.y, node.width, node.height, 8);
    mainCtx.fill();
    mainCtx.shadowColor = 'transparent';
    mainCtx.shadowBlur = 0;
    mainCtx.shadowOffsetY = 0;
    
    mainCtx.lineWidth = sel ? 2.5 : 1.5;
    mainCtx.strokeStyle = sel ? config.nodeBorderSelected : config.nodeBorder;
    mainCtx.stroke();
    
    mainCtx.fillStyle = '#1e293b';
    mainCtx.font = 'bold 14px Segoe UI';
    mainCtx.fillText(node.title, node.x + 15, node.y + 25);
    mainCtx.fillStyle = '#64748b';
    mainCtx.font = '12px Segoe UI';
    mainCtx.fillText(node.content, node.x + 15, node.y + 45);
    
    node.inputs.forEach(p => drawPort(getPortPos(node, p), false));
    node.outputs.forEach(p => drawPort(getPortPos(node, p), false));
}

function drawPort(pos, active) {
    const sp = worldToScreen(pos.x, pos.y);
    const r = active ? 7 : 5;
    mainCtx.beginPath();
    mainCtx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
    mainCtx.fillStyle = active ? '#eff6ff' : '#fff';
    mainCtx.fill();
    mainCtx.lineWidth = active ? 2 : 1.5;
    mainCtx.strokeStyle = active ? config.portHoverColor : config.portColor;
    if (active) { mainCtx.shadowColor = config.portHoverColor; mainCtx.shadowBlur = 10; }
    mainCtx.stroke();
    mainCtx.shadowBlur = 0;
}

function drawConnections() {
    state.connections.forEach(c => {
        const fn = state.nodes.find(n => n.id === c.fromNodeId);
        const tn = state.nodes.find(n => n.id === c.toNodeId);
        if (!fn || !tn) return;
        const fp = fn.outputs.find(p => p.id === c.fromPortId);
        const tp = tn.inputs.find(p => p.id === c.toPortId);
        if (!fp || !tp) return;
        drawBezier(getPortPos(fn, fp), getPortPos(tn, tp), false);
    });
}

function drawActiveConnection() {
    const fn = state.nodes.find(n => n.id === state.connectingFrom.nodeId);
    const fp = fn?.outputs.find(p => p.id === state.connectingFrom.portId);
    if (!fp) return;
    const start = getPortPos(fn, fp);
    const mw = screenToWorld(state.currentMousePos.x, state.currentMousePos.y);
    const snap = findNearestPort(mw.x, mw.y, fn.id);
    drawBezier(start, snap ? snap.pos : mw, true, true);
}

function drawBezier(s, e, sel, preview) {
    const ss = worldToScreen(s.x, s.y), es = worldToScreen(e.x, e.y);
    const dx = Math.abs(es.x - ss.x) * 0.5;
    mainCtx.beginPath();
    mainCtx.moveTo(ss.x, ss.y);
    mainCtx.bezierCurveTo(ss.x + dx, ss.y, es.x - dx, es.y, es.x, es.y);
    mainCtx.lineWidth = sel ? 3 : 2;
    mainCtx.strokeStyle = preview ? '#22c55e' : (sel ? config.connectionSelected : config.connectionColor);
    mainCtx.setLineDash(preview ? [5, 5] : []);
    mainCtx.stroke();
    mainCtx.setLineDash([]);
    
    if (!preview) {
        const a = Math.atan2(es.y - (es.x - dx), es.x - (es.x - dx));
        mainCtx.save();
        mainCtx.translate(es.x, es.y);
        mainCtx.rotate(a);
        mainCtx.beginPath();
        mainCtx.moveTo(0, 0);
        mainCtx.lineTo(-10, -5);
        mainCtx.lineTo(-10, 5);
        mainCtx.fillStyle = mainCtx.strokeStyle;
        mainCtx.fill();
        mainCtx.restore();
    }
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

mainCanvas.addEventListener('mousedown', e => {
    const rect = mainCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wp = screenToWorld(mx, my);
    state.currentMousePos = { x: mx, y: my };
    
    for (let i = state.nodes.length - 1; i >= 0; i--) {
        const n = state.nodes[i];
        for (let p of n.outputs) {
            const pos = getPortPos(n, p);
            if (Math.hypot(pos.x - wp.x, pos.y - wp.y) < 10) {
                state.connectingFrom = { nodeId: n.id, portId: p.id };
                state.isDragging = true;
                return;
            }
        }
        if (wp.x >= n.x && wp.x <= n.x + n.width && wp.y >= n.y && wp.y <= n.y + n.height) {
            state.selectedNode = n;
            state.isDragging = true;
            state.nodes.splice(i, 1);
            state.nodes.push(n);
            render();
            return;
        }
    }
    state.selectedNode = null;
    render();
});

mainCanvas.addEventListener('mousemove', e => {
    const rect = mainCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wp = screenToWorld(mx, my);
    state.currentMousePos = { x: mx, y: my };
    state.hoveredPort = null;
    mainCanvas.style.cursor = 'default';
    
    if (!state.isDragging) {
        state.nodes.forEach(n => {
            [...n.inputs, ...n.outputs].forEach(p => {
                if (Math.hypot(getPortPos(n, p).x - wp.x, getPortPos(n, p).y - wp.y) < 10) {
                    state.hoveredPort = p;
                    mainCanvas.style.cursor = 'crosshair';
                }
            });
            if (wp.x >= n.x && wp.x <= n.x + n.width && wp.y >= n.y && wp.y <= n.y + n.height && !state.hoveredPort)
                mainCanvas.style.cursor = 'move';
        });
    }
    
    if (state.isDragging && state.selectedNode) {
        state.selectedNode.x += e.movementX / state.scale;
        state.selectedNode.y += e.movementY / state.scale;
        render();
    } else if (state.connectingFrom) {
        render();
    }
});

mainCanvas.addEventListener('mouseup', e => {
    if (state.connectingFrom) {
        const rect = mainCanvas.getBoundingClientRect();
        const wp = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
        const target = findNearestPort(wp.x, wp.y, state.connectingFrom.nodeId);
        if (target) {
            const exists = state.connections.some(c => 
                c.fromNodeId === state.connectingFrom.nodeId && c.toNodeId === target.node.id);
            if (!exists) {
                state.connections.push({
                    fromNodeId: state.connectingFrom.nodeId,
                    fromPortId: state.connectingFrom.portId,
                    toNodeId: target.node.id,
                    toPortId: target.port.id
                });
            }
        }
        state.connectingFrom = null;
        render();
    }
    state.isDragging = false;
});

mainCanvas.addEventListener('wheel', e => {
    e.preventDefault();
    const d = -Math.sign(e.deltaY) * 0.1;
    const ns = Math.min(Math.max(0.2, state.scale + d), 5);
    const rect = mainCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wx = (mx - state.offsetX) / state.scale, wy = (my - state.offsetY) / state.scale;
    state.scale = ns;
    state.offsetX = mx - wx * state.scale;
    state.offsetY = my - wy * state.scale;
    render();
}, { passive: false });

mainCanvas.addEventListener('contextmenu', e => { e.preventDefault(); addNode(e.clientX, e.clientY); });

function loop(ts) {
    drawEKG(ts - lastTime);
    lastTime = ts;
    requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
addNode(window.innerWidth/2, window.innerHeight/2);
requestAnimationFrame(loop);
</script>
</body>
</html>
