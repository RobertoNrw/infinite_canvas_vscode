function renderClItems(items) {
  updateClProgress(items);
  
  const list = $('#cl-items-list');
  if (!list) return;
  
  list.innerHTML = '';
  
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'cl-row';
    row.setAttribute('role', 'listitem');
    
    // Checkbox
    const chk = document.createElement('div');
    chk.className = 'cl-check' + (item.checked ? ' done' : '');
    chk.setAttribute('role', 'checkbox');
    chk.setAttribute('aria-checked', item.checked);
    chk.setAttribute('tabindex', '0');
    chk.onclick = () => {
      item.checked = !item.checked;
      chk.classList.toggle('done', item.checked);
      chk.setAttribute('aria-checked', item.checked);
      updateClProgress(items);
    };
    chk.onkeydown = (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        chk.click();
      }
    };
    
    // Input
    const inp = document.createElement('input');
    inp.className = 'cl-input' + (item.checked ? ' done-text' : '');
    inp.value = item.text || '';
    inp.placeholder = 'Aufgabe…';
    inp.setAttribute('aria-label', `Aufgabe ${i + 1}`);
    inp.oninput = () => { item.text = inp.value; };
    inp.onkeydown = (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        items.splice(i + 1, 0, { text: '', checked: false });
        renderClItems(items);
        setTimeout(() => {
          const rows = list.querySelectorAll('.cl-input');
          if (rows[i + 1]) rows[i + 1].focus();
        }, 0);
      }
      if (ev.key === 'Backspace' && inp.value === '' && items.length > 1) {
        ev.preventDefault();
        items.splice(i, 1);
        renderClItems(items);
        setTimeout(() => {
          const rows = list.querySelectorAll('.cl-input');
          if (rows[i - 1]) rows[i - 1].focus();
        }, 0);
      }
    };
    
    // Delete button
    const del = document.createElement('button');
    del.className = 'cl-del';
    del.textContent = '✕';
    del.setAttribute('aria-label', 'Aufgabe löschen');
    del.onclick = () => {
      if (items.length > 1) {
        items.splice(i, 1);
        renderClItems(items);
      }
    };
    
    row.appendChild(chk);
    row.appendChild(inp);
    row.appendChild(del);
    list.appendChild(row);
  });
}

function closeChecklistEditor() {
  const el = $('#cl-editor');
  if (el) {
    el.style.display = 'none';
    el.close?.();
  }
  State.clNode = null;
}

// ─────────────────────────────────────────────────────────────
// 🔍 SPOTLIGHT SEARCH
// ─────────────────────────────────────────────────────────────

function openSpotlight() {
  const el = $('#spotlight');
  if (!el) return;
  
  el.classList.add('open');
  
  const inp = $('#spotlight-input');
  if (inp) {
    inp.value = '';
    inp.focus();
  }
  
  renderSpotlight('');
}

function closeSpotlight() {
  const el = $('#spotlight');
  if (el) {
    el.classList.remove('open');
  }
}

function renderSpotlight(query) {
  const results = $('#spotlight-results');
  if (!results) return;
  
  const q = query.toLowerCase().trim();
  
  // Fuzzy search
  const matches = q 
    ? State.nodes.filter(n => {
        const t = (n.text || '').toLowerCase();
        const items = n.typeData?.items?.map(it => it.text.toLowerCase()).join(' ') || '';
        return t.includes(q) || items.includes(q);
      }).slice(0, 12)
    : State.nodes.slice(0, 8);
  
  if (!matches.length) {
    results.innerHTML = `<div id="spotlight-empty">
      ${q ? `Keine Ergebnisse für „${query}"` : 'Keine Nodes vorhanden'}
    </div>`;
    return;
  }
  
  results.innerHTML = '';
  
  const typeIcons = { text: '📄', sticky: '🗒', checklist: '✅', group: '▣' };
  const typeLabels = { text: 'Text', sticky: 'Sticky', checklist: 'To-Do', group: 'Gruppe' };
  
  matches.forEach((n, i) => {
    const item = document.createElement('div');
    item.className = 'sp-item' + (i === 0 ? ' active' : '');
    item.setAttribute('role', 'option');
    item.setAttribute('tabindex', i === 0 ? '0' : '-1');
    
    const preview = (n.text || '').replace(/[#*`]/g, '').trim().slice(0, 60);
    
    item.innerHTML = `
      <div class="sp-item-icon" aria-hidden="true">${typeIcons[n.type] || '📄'}</div>
      <div class="sp-item-text">
        <div class="sp-item-title">${preview || '(Leer)'}</div>
        <div class="sp-item-sub">
          ${n.type === 'checklist' 
            ? (n.typeData?.items?.length || 0) + ' Aufgaben' 
            : typeLabels[n.type] || ''}
        </div>
      </div>
      <div class="sp-item-type">${typeLabels[n.type] || ''}</div>
    `;
    
    item.onclick = () => {
      closeSpotlight();
      
      // Navigate to node
      const cx = n.x + n.width / 2;
      const cy = n.y + n.height / 2;
      
      State.vx = Canvas.element.width / 2 - cx * State.vs;
      State.vy = Canvas.element.height / 2 - cy * State.vs;
      
      State.selectNode(n);
      scheduleRender();
      
      toast(`→ ${preview.slice(0, 30) || 'Node'}`, 'info');
    };
    
    results.appendChild(item);
  });
}

// ─────────────────────────────────────────────────────────────
// 📋 CONTEXT MENU
// ─────────────────────────────────────────────────────────────

function showContextMenu(screenX, screenY, node) {
  const menu = $('#ctx-menu');
  if (!menu) return;
  
  menu.innerHTML = '';
  menu.setAttribute('aria-label', node ? 'Node-Menü' : 'Canvas-Menü');
  
  const mkItem = (icon, label, action, danger = false) => {
    const d = document.createElement('div');
    d.className = 'ctx-item' + (danger ? ' danger' : '');
    d.setAttribute('role', 'menuitem');
    d.innerHTML = `
      <svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
        ${icon}
      </svg>
      <span>${label}</span>
    `;
    d.onclick = () => {
      action();
      closeContextMenu();
    };
    return d;
  };
  
  const mkSep = () => {
    const d = document.createElement('div');
    d.className = 'ctx-sep';
    d.setAttribute('role', 'separator');
    return d;
  };
  
  const mkLabel = (t) => {
    const d = document.createElement('div');
    d.className = 'ctx-label';
    d.textContent = t;
    return d;
  };
  
  if (node) {
    // Select node first
    State.selectNode(node);
    
    // Type selector
    menu.appendChild(mkLabel('Typ'));
    const trow = document.createElement('div');
    trow.className = 'type-row';
    
    NODE_TYPES.forEach(t => {
      const d = document.createElement('div');
      d.className = 'type-dot' + (node.type === t.type ? ' active' : '');
      d.textContent = t.icon;
      d.title = t.label;
      d.setAttribute('role', 'radio');
      d.setAttribute('aria-checked', node.type === t.type);
      d.onclick = () => {
        if (node.type === t.type) {
          closeContextMenu();
          return;
        }
        const old = cleanNode(node);
        const fresh = makeNode(t.type, old.text, old.x, old.y);
        Object.assign(node, {
          type: fresh.type,
          width: fresh.width,
          height: fresh.height,
          bg: fresh.bg,
          textColor: fresh.textColor,
          border: fresh.border,
          typeData: fresh.typeData,
          scrollY: 0
        });
        pushHistory();
        autosave();
        scheduleRender();
        toast(`Typ → ${t.label}`, 'success');
      };
      trow.appendChild(d);
    });
    menu.appendChild(trow);
    
    // Color picker (not for groups)
    if (node.type !== 'group') {
      menu.appendChild(mkSep());
      menu.appendChild(mkLabel(node.type === 'sticky' ? 'Sticky-Farbe' : 'Farbe'));
      
      const row = document.createElement('div');
      row.className = 'color-row';
      const colors = node.type === 'sticky' 
        ? Object.values(STICKY_COLORS) 
        : Object.values(NODE_COLORS);
      
      colors.forEach(c => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.background = c.bg;
        dot.style.borderColor = c.border;
        dot.title = c.label;
        dot.setAttribute('role', 'radio');
        dot.setAttribute('aria-label', c.label);
        dot.onclick = () => {
          node.bg = c.bg;
          node.border = c.border;
          if (c.textColor) node.textColor = c.textColor;
          pushHistory();
          autosave();
          scheduleRender();
        };
        row.appendChild(dot);
      });
      menu.appendChild(row);
    }
    
    // Actions
    menu.appendChild(mkSep());
    menu.appendChild(mkItem(
      '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
      'Bearbeiten',
      () => {
        if (node.type === 'checklist') {
          openChecklistEditor(node);
        } else {
          editNodeText(node);
        }
      }
    ));
    menu.appendChild(mkItem(
      '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
      'Kopieren',
      () => {
        State.clipboard = [cleanNode(node)];
        toast('Kopiert', 'info');
      }
    ));
    menu.appendChild(mkItem(
      '<polyline points="18 15 12 9 6 15"/>',
      'Nach vorne',
      () => {
        const i = State.nodes.indexOf(node);
        if (i < State.nodes.length - 1) {
          State.nodes.splice(i, 1);
          State.nodes.push(node);
          pushHistory();
          scheduleRender();
        }
      }
    ));
    menu.appendChild(mkItem(
      '<polyline points="6 9 12 15 18 9"/>',
      'Nach hinten',
      () => {
        const i = State.nodes.indexOf(node);
        if (i > 0) {
          State.nodes.splice(i, 1);
          State.nodes.unshift(node);
          pushHistory();
          scheduleRender();
        }
      }
    ));
    menu.appendChild(mkSep());
    menu.appendChild(mkItem(
      '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
      'Löschen',
      () => deleteNode(node),
      true
    ));
    
  } else {
    // Canvas context menu
    const canvasPos = () => {
      const rect = Canvas.element.getBoundingClientRect();
      return Canvas.s2c(screenX - rect.left, screenY - rect.top);
    };
    
    menu.appendChild(mkItem(
      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
      'Text-Node',
      () => {
        const { x, y } = canvasPos();
        createNode('text', x - 130, y - 65);
      }
    ));
    menu.appendChild(mkItem(
      '<path d="M15.5 2H4a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8.5L15.5 2z"/>',
      'Sticky Note',
      () => {
        const { x, y } = canvasPos();
        createNode('sticky', x - 95, y - 95);
      }
    ));
    menu.appendChild(mkItem(
      '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
      'To-Do Liste',
      () => {
        const { x, y } = canvasPos();
        createNode('checklist', x - 130, y - 100);
      }
    ));
    menu.appendChild(mkItem(
      '<rect x="2" y="3" width="20" height="14" rx="2"/>',
      'Gruppe',
      () => {
        const { x, y } = canvasPos();
        createNode('group', x - 200, y - 150);
      }
    ));
    
    if (State.clipboard.length) {
      menu.appendChild(mkSep());
      menu.appendChild(mkItem(
        '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
        `Einfügen (${State.clipboard.length})`,
        () => {
          State.clearSelection();
          State.clipboard.forEach((nd, i) => {
            const nn = createNode(nd.type || 'text', nd.x + 40 + i * 30, nd.y + 40 + i * 30, nd.text);
            nn.width = nd.width;
            nn.height = nd.height;
            nn.bg = nd.bg;
            nn.textColor = nd.textColor;
            nn.border = nd.border;
            if (nd.typeData) {
              nn.typeData = JSON.parse(JSON.stringify(nd.typeData));
            }
            State.addSelection(nn);
          });
        }
      ));
    }
  }
  
  // Show menu
  menu.style.display = 'block';
  
  // Position menu
  const mw = menu.offsetWidth;
  const mh = menu.offsetHeight;
  let mx = screenX + 4;
  let my = screenY + 4;
  
  if (mx + mw > window.innerWidth - 8) mx = screenX - mw - 4;
  if (my + mh > window.innerHeight - 36) my = screenY - mh - 4;
  
  menu.style.left = mx + 'px';
  menu.style.top = my + 'px';
  
  scheduleRender();
}

function closeContextMenu() {
  const menu = $('#ctx-menu');
  if (menu) {
    menu.style.display = 'none';
  }
}

function closeDropdown() {
  const dropdown = $('#add-dropdown');
  const btn = $('#btn-add');
  if (dropdown) {
    dropdown.classList.remove('open');
  }
  if (btn) {
    btn.setAttribute('aria-expanded', 'false');
  }
}

// ─────────────────────────────────────────────────────────────
// 🎛️ TOOLBAR ACTIONS
// ─────────────────────────────────────────────────────────────

function initToolbar() {
  // Add button dropdown
  const btnAdd = $('#btn-add');
  const dropdown = $('#add-dropdown');
  
  if (btnAdd && dropdown) {
    btnAdd.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = dropdown.classList.toggle('open');
      btnAdd.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    
    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!btnAdd.contains(e.target) && !dropdown.contains(e.target)) {
        closeDropdown();
      }
    });
  }
  
  // Dropdown items
  document.querySelectorAll('#add-dropdown .dd-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const type = item.dataset.type;
      const cx = (Canvas.element.width / 2 - State.vx) / State.vs;
      const cy = (Canvas.element.height / 2 - State.vy) / State.vs;
      
      let x = cx - 130, y = cy - 65;
      if (type === 'sticky') { x = cx - 95; y = cy - 95; }
      if (type === 'checklist') { x = cx - 130; y = cy - 100; }
      if (type === 'group') { x = cx - 200; y = cy - 150; }
      
      createNode(type, x, y);
      closeDropdown();
      
      const labels = { text: 'Text-Node', sticky: 'Sticky Note', checklist: 'To-Do Liste', group: 'Gruppe' };
      toast(`${labels[type] || 'Node'} erstellt`, 'success');
    });
    
    // Keyboard navigation
    item.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        item.click();
      }
    });
  });
  
  // Undo/Redo
  $('#btn-undo')?.addEventListener('click', undo);
  $('#btn-redo')?.addEventListener('click', redo);
  
  // Snap toggle
  $('#btn-snap')?.addEventListener('click', () => {
    State.snapEnabled = !State.snapEnabled;
    const btn = $('#btn-snap');
    if (btn) {
      btn.classList.toggle('active', State.snapEnabled);
      btn.setAttribute('aria-pressed', State.snapEnabled ? 'true' : 'false');
    }
    toast(State.snapEnabled ? 'Snap aktiviert' : 'Snap deaktiviert', 'info');
    scheduleRender();
  });
  
  // Search/Spotlight
  $('#btn-search')?.addEventListener('click', openSpotlight);
  
  // Export
  $('#btn-export')?.addEventListener('click', () => {
    try {
      const data = exportData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `canvas-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('Exportiert ✓', 'success');
    } catch (e) {
      console.error('Export failed:', e);
      toast('Export fehlgeschlagen', 'error');
    }
  });
  
  // Import
  $('#btn-import')?.addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.json,.canvas';
    inp.onchange = (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      
      const r = new FileReader();
      r.onload = (ev) => {
        try {
          const data = safeJSONParse(ev.target?.result);
          if (data) {
            importData(data);
            autosave();
            toast('Importiert ✓', 'success');
          } else {
            throw new Error('Invalid JSON');
          }
        } catch (err) {
          console.error('Import failed:', err);
          toast('Ungültige Datei', 'error');
        }
      };
      r.readAsText(f);
    };
    inp.click();
  });
  
  // Clear
  $('#btn-clear')?.addEventListener('click', () => {
    if (confirm('Canvas wirklich leeren?')) {
      State.reset();
      pushHistory();
      autosave();
      updateStatusBar();
      scheduleRender();
      toast('Canvas geleert', 'info');
    }
  });
  
  // Reset view
  const resetView = () => {
    State.vx = 0;
    State.vy = 0;
    State.vs = 1;
    scheduleRender();
  };
  
  $('#btn-reset')?.addEventListener('click', resetView);
  $('#zoom-display')?.addEventListener('click', resetView);
  $('#zoom-display')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      resetView();
    }
  });
}

// ─────────────────────────────────────────────────────────────
// 🚀 INITIALIZATION
// ─────────────────────────────────────────────────────────────

function init() {
  // Initialize theme first
  Theme.init();
  
  // Initialize canvas
  if (!Canvas.init()) {
    console.error('Canvas initialization failed');
    return;
  }
  
  // Initialize events
  initEvents();
  
  // Initialize toolbar
  initToolbar();
  
  // Setup checklist editor buttons
  $('#cl-add-btn')?.addEventListener('click', () => {
    if (!State.clNode) return;
    const items = State.clNode.typeData?.items || [];
    items.push({ text: '', checked: false });
    renderClItems(items);
    setTimeout(() => {
      const rows = document.querySelectorAll('.cl-input');
      if (rows.length) rows[rows.length - 1].focus();
    }, 0);
  });
  
  $('#cl-save')?.addEventListener('click', () => {
    if (!State.clNode) return;
    const titleInput = $('#cl-title-input');
    if (titleInput) {
      State.clNode.text = titleInput.value || 'To-Do';
    }
    pushHistory();
    autosave();
    scheduleRender();
    closeChecklistEditor();
    toast('✓ Liste gespeichert', 'success');
  });
  
  $('#cl-cancel')?.addEventListener('click', closeChecklistEditor);
  $('#cl-close')?.addEventListener('click', closeChecklistEditor);
  
  // Spotlight events
  $('#spotlight-input')?.addEventListener('input', (e) => {
    renderSpotlight(e.target.value);
  });
  
  $('#spotlight-input')?.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeSpotlight();
      return;
    }
    
    const items = document.querySelectorAll('.sp-item');
    const active = document.querySelector('.sp-item.active');
    const idx = active ? [...items].indexOf(active) : -1;
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (idx < items.length - 1) {
        active?.classList.remove('active');
        active?.setAttribute('tabindex', '-1');
        items[idx + 1].classList.add('active');
        items[idx + 1].setAttribute('tabindex', '0');
        items[idx + 1].focus();
      }
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (idx > 0) {
        active?.classList.remove('active');
        active?.setAttribute('tabindex', '-1');
        items[idx - 1].classList.add('active');
        items[idx - 1].setAttribute('tabindex', '0');
        items[idx - 1].focus();
      }
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      active?.click();
    }
  });
  
  $('#spotlight')?.addEventListener('click', (e) => {
    if (e.target === document.getElementById('spotlight')) {
      closeSpotlight();
    }
  });
  
  // Load saved data or create demo
  try {
    const saved = localStorage.getItem('ic_v3') || localStorage.getItem('ic_v2');
    
    if (saved) {
      const data = safeJSONParse(saved);
      if (data) {
        importData(data);
      }
    } else {
      // Create demo content
      State.suppressHistory = true;
      
      const n1 = createNode('text', 0, 0, '');
      n1.x = 80; n1.y = 110; n1.width = 280; n1.height = 170;
      n1.bg = Theme.color('#001633', '#E5F0FF');
      n1.border = Theme.color('#003380', '#1a73e8');
      n1.textColor = Theme.color('rgba(255,255,255,0.88)', 'rgba(0,0,0,0.85)');
      n1.text = '# Willkommen 👋\n\nDoppelklick = Node\nShift+Drag = verbinden\nRechtsklick = Menü\nStrg+Z = Undo\nStrg+F = Suche';
      
      const s1 = createNode('sticky', 0, 0, '');
      s1.x = 430; s1.y = 90; s1.width = 185; s1.height = 185;
      s1.text = 'Schnelle Notizen mit Sticky Notes!';
      
      const c1 = createNode('checklist', 0, 0, '');
      c1.x = 430; c1.y = 320; c1.width = 240; c1.height = 200;
      c1.text = 'Erste Schritte';
      c1.typeData = { items: [
        { text: 'Canvas erkunden', checked: true },
        { text: 'Nodes verbinden', checked: false },
        { text: 'Light Mode testen', checked: false },
        { text: 'JSON exportieren', checked: false },
      ]};
      
      const g1 = createNode('group', 0, 0, '');
      g1.x = 55; g1.y = 320; g1.width = 340; g1.height = 210;
      g1.text = 'Mein Bereich';
      
      const n2 = createNode('text', 0, 0, '');
      n2.x = 85; n2.y = 370; n2.width = 270; n2.height = 120;
      n2.bg = Theme.color('#0D2616', '#E8F8EE');
      n2.border = Theme.color('#1A4D2E', '#34a853');
      n2.textColor = Theme.color('rgba(255,255,255,0.88)', 'rgba(0,0,0,0.85)');
      n2.text = '# Shortcuts\n\nN = Neu · Strg+A = Alle\nPfeile = Bewegen · Entf = Löschen';
      
      State.connections.push(
        { id: 'c1', from: n1.id, to: s1.id, fromSide: 'right', toSide: 'left' },
        { id: 'c2', from: n1.id, to: c1.id, fromSide: 'right', toSide: 'top' },
        { id: 'c3', from: n2.id, to: c1.id, fromSide: 'right', toSide: 'left' },
      );
      
      State.suppressHistory = false;
      pushHistory();
      autosave();
      updateStatusBar();
    }
  } catch (e) {
    console.warn('Bootstrap error:', e);
    toast('Fehler beim Laden', 'error');
  }
  
  // Initial render
  updateStatusBar();
  scheduleRender();
  
  // Accessibility: focus management
  document.addEventListener('focusin', (e) => {
    // Close dropdowns when focus moves outside
    if (!e.target.closest('#toolbar') && !e.target.closest('#add-dropdown')) {
      closeDropdown();
    }
  });
  
  console.log('✅ Infinite Canvas Pro v3.1 initialized');
}

// Start the app when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
