<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Canvas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a1a;color:#ccc;font-family:'Segoe UI',system-ui,sans-serif;user-select:none}
#canvas{display:block;position:absolute;top:0;left:0;touch-action:none}

/* ── Toolbar ── */
#toolbar{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;align-items:center;
  background:rgba(24,24,24,0.95);border:1px solid rgba(255,255,255,0.09);
  border-radius:14px;padding:6px 12px;z-index:9100;
  backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,0.6);
  flex-wrap:nowrap;
}
.tb-logo{font-size:13px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:.6px;padding-right:4px;white-space:nowrap}
.tb-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  border-radius:8px;color:rgba(255,255,255,0.75);padding:5px 10px;
  font-size:12px;cursor:pointer;transition:background .12s,color .12s,border-color .12s;
  white-space:nowrap;outline:none;
}
.tb-btn:hover{background:rgba(255,255,255,0.13);color:#fff;border-color:rgba(255,255,255,0.2)}
.tb-btn.active{background:rgba(74,158,255,0.2);border-color:rgba(74,158,255,0.5);color:#7bc0ff}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,0.08);margin:0 2px;flex-shrink:0}

/* ── Status bar (bottom) ── */
#statusbar{
  position:fixed;bottom:0;left:0;right:0;height:28px;
  background:rgba(18,18,18,0.92);border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;padding:0 14px;gap:16px;z-index:9100;
  font-size:11px;color:rgba(255,255,255,0.35);backdrop-filter:blur(10px);
}
#statusbar b{color:rgba(255,255,255,0.52)}
#zoom-display{
  margin-left:auto;cursor:pointer;padding:2px 8px;
  border-radius:4px;transition:background .12s;
}
#zoom-display:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7)}

/* ── Context Menu ── */
#ctx-menu{
  position:fixed;z-index:9500;display:none;
  background:rgba(22,22,22,0.97);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:5px 0;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,0.7);backdrop-filter:blur(20px);
}
.ctx-item{
  padding:7px 14px;font-size:12px;color:rgba(255,255,255,0.78);
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:background .1s;
}
.ctx-item:hover{background:rgba(255,255,255,0.08)}
.ctx-item.danger{color:#f87171}
.ctx-item.danger:hover{background:rgba(248,113,113,0.1)}
.ctx-sep{height:1px;background:rgba(255,255,255,0.07);margin:3px 0}
.ctx-label{padding:4px 14px;font-size:10px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.7px}
.color-row{display:flex;gap:6px;padding:6px 14px}
.color-dot{
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .12s,border-color .12s;
}
.color-dot:hover{transform:scale(1.25);border-color:rgba(255,255,255,0.5)}

/* ── Toast ── */
#toast{
  position:fixed;bottom:42px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(30,30,30,0.95);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:7px 16px;font-size:12px;color:rgba(255,255,255,0.8);
  z-index:9600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
  backdrop-filter:blur(16px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="toolbar">
  <span class="tb-logo">✦ Infinite Canvas</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-add" title="Node hinzufügen (N)">＋ Node</button>
  <button class="tb-btn" id="btn-undo" title="Rückgängig (Ctrl+Z)">↩ Undo</button>
  <button class="tb-btn" id="btn-redo" title="Wiederholen (Ctrl+Y)">↪ Redo</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-snap" title="Snap to Grid">⊞ Snap</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-export" title="Als JSON exportieren">⬇ Export</button>
  <button class="tb-btn" id="btn-import" title="JSON importieren">⬆ Import</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-clear" title="Canvas leeren">🗑</button>
  <button class="tb-btn" id="btn-reset" title="Ansicht zurücksetzen">⌖ Reset</button>
</div>

<div id="statusbar">
  <span><b id="node-count">0</b> Nodes</span>
  <span><b id="conn-count">0</b> Verbindungen</span>
  <span id="hint"><b>Doppelklick</b> = Node &nbsp;·&nbsp; <b>Shift+Drag</b> = verbinden &nbsp;·&nbsp; <b>Alt+Drag</b> = Panning &nbsp;·&nbsp; <b>Del</b> = löschen &nbsp;·&nbsp; <b>Ctrl+Z</b> = Undo</span>
  <span id="zoom-display" title="Klick zum Zurücksetzen">100%</span>
</div>

<div id="ctx-menu"></div>
<div id="toast"></div>

<script>
'use strict';
// ╔══════════════════════════════════════════════════════════════╗
// ║  INFINITE CANVAS  –  Stage 1  –  Bug-Fixed + Quality Base   ║
// ╚══════════════════════════════════════════════════════════════╝

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ━━━ Constants ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SNAP_SIZE   = 25;
const GRID_SIZE   = 50;
const MAX_HISTORY = 60;
const MIN_W = 80, MIN_H = 60;
const NODE_COLORS = [
  {bg:'#2d2d2d', border:'#444',    label:'Standard'},
  {bg:'#1e3a2f', border:'#2d6a4f', label:'Grün'},
  {bg:'#1e2d3a', border:'#2d5a8a', label:'Blau'},
  {bg:'#3a1e2d', border:'#7a2d5a', label:'Lila'},
  {bg:'#3a2a1e', border:'#8a5a2d', label:'Orange'},
  {bg:'#2a1e1e', border:'#7a3a3a', label:'Rot'},
];

// ━━━ State ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let nodes       = [];
let connections = [];
let nodeCounter = 0;
let selectedNodes = [];
let selectedConn  = null;

let vx = 0, vy = 0, vs = 1;   // viewport: offsetX, offsetY, scale

// Input
let isDragging   = false;
let isPanning    = false;
let isNodeDrag   = false;
let isConnecting = false;
let isSelecting  = false;
let isResizing   = false;
let isScrollDrag = false;

let dragNode      = null;
let dragOffX      = 0, dragOffY = 0;
let lastMX        = 0, lastMY  = 0;
let hasMoved      = false;
let mouseIsOnCanvas = true;

let connStart     = null;
let connStartPt   = null;

let selStart      = {x:0,y:0};
let selRect       = null;

let hoverNode     = null;
let hoverConnPt   = null;

let rzNode = null, rzHandle = null;
let rzSX=0, rzSY=0, rzSW=0, rzSH=0, rzNX=0, rzNY=0;

let sbNode = null, sbDragOffset = 0;

let clipboard     = [];
let snapEnabled   = false;

// Undo / Redo
let history       = [];   // array of JSON strings
let historyIdx    = -1;
let suppressHistory = false;

// RAF
let rafPending    = false;

// ━━━ Utilities ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const s2c = (sx,sy) => ({x:(sx-vx)/vs, y:(sy-vy)/vs});
const snap = v => snapEnabled ? Math.round(v/SNAP_SIZE)*SNAP_SIZE : v;

function scheduleRender(){
  if(!rafPending){ rafPending=true; requestAnimationFrame(()=>{ rafPending=false; render(); }); }
}

function toast(msg, ms=1800){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), ms);
}

function updateStatusBar(){
  document.getElementById('node-count').textContent = nodes.length;
  document.getElementById('conn-count').textContent = connections.length;
  document.getElementById('zoom-display').textContent = Math.round(vs*100)+'%';
}

// ━━━ History (Undo/Redo) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function pushHistory(){
  if(suppressHistory) return;
  const snap = JSON.stringify({nodes: nodes.map(cleanNode), connections});
  // Truncate forward history
  history = history.slice(0, historyIdx+1);
  history.push(snap);
  if(history.length > MAX_HISTORY) history.shift();
  historyIdx = history.length-1;
}

function applyHistory(snap){
  suppressHistory = true;
  const d = JSON.parse(snap);
  nodes = d.nodes.map(nd => Object.assign(freshNode(nd.text,nd.x,nd.y), nd));
  connections = d.connections;
  clearSelection();
  suppressHistory = false;
  autosave(); scheduleRender(); updateStatusBar();
}

function undo(){
  if(historyIdx <= 0){ toast('Nichts zum Rückgängigmachen'); return; }
  historyIdx--;
  applyHistory(history[historyIdx]);
  toast('↩ Rückgängig');
}

function redo(){
  if(historyIdx >= history.length-1){ toast('Nichts zum Wiederholen'); return; }
  historyIdx++;
  applyHistory(history[historyIdx]);
  toast('↪ Wiederholt');
}

// ━━━ Node Factories ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function freshNode(text='New Node', x=100, y=100){
  return {
    id: 'n'+(++nodeCounter),
    type:'text', text,
    x, y, width:250, height:120,
    scrollY:0, isSelected:false,
    bg:'#2d2d2d', textColor:'#e0e0e0', border:'#444'
  };
}

function cleanNode(n){
  // Strip runtime-only props before serialisation
  const {_resizeHandles,_scrollbarBounds,_contentHeight,_maxScroll,isEditing,...rest} = n;
  return rest;
}

function createNode(text,x,y){
  const n = freshNode(text, snap(x), snap(y));
  nodes.push(n);
  pushHistory();
  autosave(); updateStatusBar(); scheduleRender();
  return n;
}

function deleteNode(n){
  nodes = nodes.filter(nd=>nd!==n);
  connections = connections.filter(c=>c.from!==n.id && c.to!==n.id);
  selectedNodes = selectedNodes.filter(s=>s!==n);
  pushHistory();
  autosave(); updateStatusBar(); scheduleRender();
}

function deleteConn(c){
  connections = connections.filter(x=>x!==c);
  if(selectedConn===c) selectedConn=null;
  pushHistory();
  autosave(); updateStatusBar(); scheduleRender();
}

// ━━━ Selection ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function clearSelection(){
  nodes.forEach(n=>n.isSelected=false);
  selectedNodes=[]; selectedConn=null;
}
function selectNode(n){ clearSelection(); n.isSelected=true; selectedNodes=[n]; }
function addSel(n){ if(!n.isSelected){n.isSelected=true; selectedNodes.push(n);} }
function toggleSel(n){ n.isSelected ? (n.isSelected=false, selectedNodes=selectedNodes.filter(s=>s!==n)) : addSel(n); }

// ━━━ Geometry ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getNodeAt(cx,cy){
  for(let i=nodes.length-1;i>=0;i--){
    const n=nodes[i];
    if(cx>=n.x&&cx<=n.x+n.width&&cy>=n.y&&cy<=n.y+n.height) return n;
  }
  return null;
}

function getNodesInRect(rx,ry,rw,rh){
  return nodes.filter(n=>!(n.x>rx+rw||n.x+n.width<rx||n.y>ry+rh||n.y+n.height<ry));
}

function connPts(n){
  return [
    {x:n.x+n.width/2, y:n.y,             side:'top'},
    {x:n.x+n.width,   y:n.y+n.height/2,  side:'right'},
    {x:n.x+n.width/2, y:n.y+n.height,    side:'bottom'},
    {x:n.x,           y:n.y+n.height/2,  side:'left'}
  ];
}

function connPtAt(n,cx,cy){
  for(const p of connPts(n)) if(Math.hypot(cx-p.x,cy-p.y)<=16) return p;
  return null;
}

function distSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;
  if(!l2) return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

function getConnAt(cx,cy){
  for(const c of connections){
    const fn=nodes.find(n=>n.id===c.from), tn=nodes.find(n=>n.id===c.to);
    if(!fn||!tn) continue;
    const fp=connPts(fn).find(p=>p.side===c.fromSide)||connPts(fn)[1];
    const tp=connPts(tn).find(p=>p.side===c.toSide)||connPts(tn)[3];
    if(distSeg(cx,cy,fp.x,fp.y,tp.x,tp.y)<=8) return c;
  }
  return null;
}

// Best auto connection sides
function bestSides(fn,tn){
  const fcx=fn.x+fn.width/2, fcy=fn.y+fn.height/2;
  const tcx=tn.x+tn.width/2, tcy=tn.y+tn.height/2;
  const dx=tcx-fcx, dy=tcy-fcy;
  const fromSide = Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'bottom':'top');
  const toSide   = Math.abs(dx)>Math.abs(dy) ? (dx>0?'left':'right') : (dy>0?'top':'bottom');
  return {fromSide,toSide};
}

// ━━━ Drawing ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

const MD_FONTS = {
  h1:'bold 19px Segoe UI,sans-serif', h2:'bold 17px Segoe UI,sans-serif',
  h3:'bold 15px Segoe UI,sans-serif', h4:'bold 14px Segoe UI,sans-serif',
  bold:'bold 13px Segoe UI,sans-serif', italic:'italic 13px Segoe UI,sans-serif',
  code:'13px Consolas,monospace', list:'13px Segoe UI,sans-serif',
  normal:'13px Segoe UI,sans-serif'
};
const MD_LH = {h1:26,h2:23,h3:21,h4:19,bold:19,italic:19,code:19,list:19,normal:19};
const MD_CLR = {h1:'#7ab8f5',h2:'#7ab8f5',h3:'#7ab8f5',h4:'#7ab8f5',code:'#e5c07b'};

function parseMdLine(line){
  const t=line.trim();
  if(t.startsWith('####')) return {text:t.slice(4).trim(),style:'h4'};
  if(t.startsWith('###'))  return {text:t.slice(3).trim(),style:'h3'};
  if(t.startsWith('##'))   return {text:t.slice(2).trim(),style:'h2'};
  if(t.startsWith('#'))    return {text:t.slice(1).trim(),style:'h1'};
  if(t.startsWith('**')&&t.endsWith('**')&&t.length>4) return {text:t.slice(2,-2),style:'bold'};
  if(t.startsWith('*')&&t.endsWith('*')&&t.length>2)  return {text:t.slice(1,-1),style:'italic'};
  if(t.startsWith('`')&&t.endsWith('`')&&t.length>2)  return {text:t.slice(1,-1),style:'code'};
  if(t.startsWith('- ')||t.startsWith('* ')) return {text:'• '+t.slice(2),style:'list'};
  if(/^\d+\.\s/.test(t)) return {text:t,style:'list'};
  return {text:line,style:'normal'};
}

function drawNode(n){
  if(n.isEditing) return;
  if(n.scrollY===undefined) n.scrollY=0;

  // Shadow for selected
  if(n.isSelected){
    ctx.shadowColor='rgba(74,158,255,0.35)'; ctx.shadowBlur=18;
  }
  ctx.fillStyle=n.bg;
  roundRect(n.x,n.y,n.width,n.height,12); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowColor='transparent';

  ctx.strokeStyle=n.isSelected?'#4a9eff':n.border;
  ctx.lineWidth=n.isSelected?2:1;
  roundRect(n.x,n.y,n.width,n.height,12); ctx.stroke();

  // ── Text content with clipping
  ctx.save();
  roundRect(n.x+2,n.y+2,n.width-4,n.height-4,10); ctx.clip();

  const pad=10;
  const lines=n.text.split('\n');
  const fmt=[]; const lhs=[];

  lines.forEach(line=>{
    if(!line.trim()){fmt.push({text:'',style:'normal'});lhs.push(18);return;}
    const ls=parseMdLine(line);
    ctx.font=MD_FONTS[ls.style]||MD_FONTS.normal;
    const words=ls.text.split(' ');
    let cur=words[0]||'';
    for(let i=1;i<words.length;i++){
      const test=cur+' '+words[i];
      ctx.measureText(test).width < n.width-pad*2-6 ? cur=test : (fmt.push({text:cur,style:ls.style}),lhs.push(MD_LH[ls.style]||19),cur=words[i]);
    }
    fmt.push({text:cur,style:ls.style}); lhs.push(MD_LH[ls.style]||19);
  });

  let totalH=pad; lhs.forEach(h=>totalH+=h); totalH+=pad;
  n._contentHeight=totalH;
  n._maxScroll=Math.max(0,totalH-n.height);
  n.scrollY=Math.max(0,Math.min(n.scrollY,n._maxScroll));

  let cy=n.y+pad-n.scrollY;
  fmt.forEach((line,i)=>{
    const lh=lhs[i];
    if(cy+lh>=n.y && cy<=n.y+n.height){
      ctx.font=MD_FONTS[line.style]||MD_FONTS.normal;
      ctx.fillStyle=MD_CLR[line.style]||n.textColor;
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(line.text,n.x+pad,cy);
    }
    cy+=lh;
  });
  ctx.restore();

  // Scrollbar
  if(n._maxScroll>0) drawScrollbar(n);

  // Connection points
  if(n.isSelected||(hoverNode===n&&hoverConnPt)||isConnecting) drawConnPts(n);

  // Resize handles
  if(n.isSelected) drawRzHandles(n);
}

function drawScrollbar(n){
  const sw=5,sx=n.x+n.width-sw-2,sy=n.y+4,sh=n.height-8;
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.beginPath(); ctx.roundRect(sx,sy,sw,sh,3); ctx.fill();
  const ratio=Math.min(1,n.height/n._contentHeight);
  const th=Math.max(20,sh*ratio);
  const maxT=sh-th;
  const ty=sy+(maxT>0?(n.scrollY/n._maxScroll)*maxT:0);
  ctx.fillStyle=n.isSelected?'rgba(74,158,255,0.6)':'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.roundRect(sx,ty,sw,th,3); ctx.fill();
  // Store accurate bounds for hit-test
  n._scrollbarBounds={x:sx,y:sy,w:sw,h:sh,thumbY:ty,thumbH:th};
}

function drawRzHandles(n){
  const s=8;
  const defs=[
    {dx:0,     dy:0,     type:'nw',cursor:'nw-resize'},
    {dx:n.width,dy:0,    type:'ne',cursor:'ne-resize'},
    {dx:0,     dy:n.height,type:'sw',cursor:'sw-resize'},
    {dx:n.width,dy:n.height,type:'se',cursor:'se-resize'},
    {dx:n.width/2,dy:0,  type:'n', cursor:'n-resize'},
    {dx:n.width/2,dy:n.height,type:'s',cursor:'s-resize'},
    {dx:0,     dy:n.height/2,type:'w',cursor:'w-resize'},
    {dx:n.width,dy:n.height/2,type:'e',cursor:'e-resize'},
  ];
  n._resizeHandles=defs.map(d=>({
    x:n.x+d.dx-s/2, y:n.y+d.dy-s/2, w:s, h:s, type:d.type, cursor:d.cursor
  }));
  defs.forEach(d=>{
    const hx=n.x+d.dx-s/2, hy=n.y+d.dy-s/2;
    ctx.fillStyle='#4a9eff'; ctx.fillRect(hx,hy,s,s);
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1; ctx.strokeRect(hx,hy,s,s);
  });
}

function drawConnPts(n){
  connPts(n).forEach(p=>{
    const hov=hoverConnPt&&hoverConnPt.side===p.side&&hoverNode===n;
    const r=hov?10:7;
    ctx.shadowColor='rgba(34,197,94,0.6)'; ctx.shadowBlur=hov?14:7;
    ctx.fillStyle=hov?'#10b981':'#22c55e';
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,2*Math.PI); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(p.x,p.y,hov?4:3,0,2*Math.PI); ctx.fill();
  });
  ctx.shadowColor='transparent';
}

function drawConnection(c,sel){
  const fn=nodes.find(n=>n.id===c.from), tn=nodes.find(n=>n.id===c.to);
  if(!fn||!tn) return;
  const fp=connPts(fn).find(p=>p.side===c.fromSide)||connPts(fn)[1];
  const tp=connPts(tn).find(p=>p.side===c.toSide)||connPts(tn)[3];

  // Bezier control points
  const dist=Math.max(60, Math.hypot(tp.x-fp.x,tp.y-fp.y)*0.45);
  const fc=sideOffset(fp,c.fromSide,dist);
  const tc=sideOffset(tp,c.toSide,dist);

  ctx.strokeStyle=sel?'#60a5fa':'#4a7fa0';
  ctx.lineWidth=sel?3:2;
  ctx.setLineDash(sel?[6,4]:[]);
  ctx.beginPath(); ctx.moveTo(fp.x,fp.y);
  ctx.bezierCurveTo(fc.x,fc.y,tc.x,tc.y,tp.x,tp.y);
  ctx.stroke(); ctx.setLineDash([]);

  // Arrowhead
  const ang=Math.atan2(tp.y-tc.y,tp.x-tc.x);
  const al=14, aa=Math.PI/6;
  ctx.fillStyle=sel?'#60a5fa':'#4a7fa0';
  ctx.beginPath();
  ctx.moveTo(tp.x,tp.y);
  ctx.lineTo(tp.x-al*Math.cos(ang-aa), tp.y-al*Math.sin(ang-aa));
  ctx.lineTo(tp.x-al*0.5*Math.cos(ang),tp.y-al*0.5*Math.sin(ang));
  ctx.lineTo(tp.x-al*Math.cos(ang+aa), tp.y-al*Math.sin(ang+aa));
  ctx.closePath(); ctx.fill();
}

function sideOffset(pt,side,dist){
  switch(side){
    case 'right':  return {x:pt.x+dist, y:pt.y};
    case 'left':   return {x:pt.x-dist, y:pt.y};
    case 'bottom': return {x:pt.x, y:pt.y+dist};
    case 'top':    return {x:pt.x, y:pt.y-dist};
    default:       return {x:pt.x+dist, y:pt.y};
  }
}

function drawGrid(){
  const sx=-vx/vs, sy=-vy/vs;
  const ex=sx+canvas.width/vs, ey=sy+canvas.height/vs;
  // Minor grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1/vs;
  ctx.beginPath();
  for(let x=Math.floor(sx/GRID_SIZE)*GRID_SIZE;x<=ex;x+=GRID_SIZE){ctx.moveTo(x,sy);ctx.lineTo(x,ey);}
  for(let y=Math.floor(sy/GRID_SIZE)*GRID_SIZE;y<=ey;y+=GRID_SIZE){ctx.moveTo(sx,y);ctx.lineTo(ex,y);}
  ctx.stroke();
  // Snap dots
  if(snapEnabled){
    ctx.fillStyle='rgba(74,158,255,0.18)';
    for(let x=Math.floor(sx/SNAP_SIZE)*SNAP_SIZE;x<=ex;x+=SNAP_SIZE)
      for(let y=Math.floor(sy/SNAP_SIZE)*SNAP_SIZE;y<=ey;y+=SNAP_SIZE){
        ctx.beginPath(); ctx.arc(x,y,1.2,0,2*Math.PI); ctx.fill();
      }
  }
}

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(vx,vy);
  ctx.scale(vs,vs);

  drawGrid();
  connections.forEach(c=>drawConnection(c,selectedConn&&selectedConn.id===c.id));
  nodes.forEach(n=>drawNode(n));

  // Connection preview
  if(isConnecting&&connStart){
    const cp=connStartPt||{x:connStart.x+connStart.width/2,y:connStart.y+connStart.height/2};
    const mx=(lastMX-vx)/vs, my=(lastMY-vy)/vs;
    ctx.strokeStyle='#22c55e'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(cp.x,cp.y); ctx.lineTo(mx,my); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Selection rectangle
  if(isSelecting&&selRect){
    ctx.fillStyle='rgba(59,130,246,0.07)';
    ctx.fillRect(selRect.x,selRect.y,selRect.w,selRect.h);
    ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1/vs; ctx.setLineDash([4/vs,3/vs]);
    ctx.strokeRect(selRect.x,selRect.y,selRect.w,selRect.h);
    ctx.setLineDash([]);
  }

  ctx.restore();
  updateStatusBar();
}

// ━━━ Resize Canvas ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  scheduleRender();
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ━━━ Mouse / Pointer Events ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const {x:cx,y:cy}=s2c(e.clientX-rect.left,e.clientY-rect.top);
  const n=getNodeAt(cx,cy);
  showContextMenu(e.clientX,e.clientY,n);
});

canvas.addEventListener('mousedown',e=>{
  closeContextMenu();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {x:cx,y:cy}=s2c(mx,my);
  mouseIsOnCanvas=true;

  const node=getNodeAt(cx,cy);

  if(!node){
    const c=getConnAt(cx,cy);
    if(c){clearSelection();selectedConn=c;scheduleRender();return;}
  }

  if(node){
    // Check connection point (Shift)
    const cp=connPtAt(node,cx,cy);
    if(e.shiftKey&&cp){
      isConnecting=true; connStart=node; connStartPt=cp;
      clearSelection(); isDragging=false;
      lastMX=mx; lastMY=my; scheduleRender(); return;
    }
    // Resize handle
    const rh=node._resizeHandles?.find(h=>cx>=h.x&&cx<=h.x+h.w&&cy>=h.y&&cy<=h.y+h.h);
    if(rh&&!e.shiftKey){
      isResizing=true; rzNode=node; rzHandle=rh;
      rzSX=cx; rzSY=cy; rzSW=node.width; rzSH=node.height;
      rzNX=node.x; rzNY=node.y;
      isDragging=false; lastMX=mx; lastMY=my; return;
    }
    // Scrollbar
    if(node._scrollbarBounds){
      const sb=node._scrollbarBounds;
      if(cx>=sb.x&&cx<=sb.x+sb.w&&cy>=sb.y&&cy<=sb.y+sb.h){
        // BUG FIX: store offset from thumb top, not absolute
        isScrollDrag=true; sbNode=node;
        sbDragOffset=cy-sb.thumbY;
        isDragging=false; lastMX=mx; lastMY=my; return;
      }
    }
    // Selection
    if(e.ctrlKey||e.metaKey) toggleSel(node);
    else if(e.shiftKey&&selectedNodes.length>0) addSel(node);
    else selectNode(node);

    if(node.isSelected){
      isNodeDrag=true; dragNode=node;
      dragOffX=cx-node.x; dragOffY=cy-node.y;
    }
  } else {
    if(e.button===1||e.altKey){
      isPanning=true;
      if(!e.ctrlKey&&!e.metaKey&&!e.shiftKey&&!e.altKey) clearSelection();
    } else {
      if(!e.ctrlKey&&!e.metaKey&&!e.shiftKey) clearSelection();
      isSelecting=true;
      selStart={x:cx,y:cy}; selRect=null;
    }
  }
  lastMX=mx; lastMY=my;
  isDragging=true; hasMoved=false;
  scheduleRender();
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {x:cx,y:cy}=s2c(mx,my);

  hoverNode=getNodeAt(cx,cy);
  hoverConnPt=hoverNode?connPtAt(hoverNode,cx,cy):null;

  // Cursor
  if(isResizing) canvas.style.cursor=rzHandle.cursor;
  else if(isScrollDrag) canvas.style.cursor='ns-resize';
  else if(isConnecting) canvas.style.cursor='crosshair';
  else if(hoverConnPt&&e.shiftKey) canvas.style.cursor='copy';
  else if(hoverNode){
    const rh=hoverNode._resizeHandles?.find(h=>cx>=h.x&&cx<=h.x+h.w&&cy>=h.y&&cy<=h.y+h.h);
    canvas.style.cursor=rh?rh.cursor:'grab';
  } else canvas.style.cursor='default';

  const dx=mx-lastMX, dy=my-lastMY;
  if(Math.abs(dx)>1||Math.abs(dy)>1) hasMoved=true;

  // ── BUG FIX: Resize correctly updates x/y for NW/NE/SW etc.
  if(isResizing&&rzNode&&rzHandle){
    const ddx=cx-rzSX, ddy=cy-rzSY;
    let nx=rzNX, ny=rzNY, nw=rzSW, nh=rzSH;
    switch(rzHandle.type){
      case 'se': nw=Math.max(MIN_W,rzSW+ddx); nh=Math.max(MIN_H,rzSH+ddy); break;
      case 'sw': nw=Math.max(MIN_W,rzSW-ddx); nh=Math.max(MIN_H,rzSH+ddy);
                 nx=rzNX+rzSW-nw; break;
      case 'ne': nw=Math.max(MIN_W,rzSW+ddx); nh=Math.max(MIN_H,rzSH-ddy);
                 ny=rzNY+rzSH-nh; break;
      case 'nw': nw=Math.max(MIN_W,rzSW-ddx); nh=Math.max(MIN_H,rzSH-ddy);
                 nx=rzNX+rzSW-nw; ny=rzNY+rzSH-nh; break;
      case 'e':  nw=Math.max(MIN_W,rzSW+ddx); break;
      case 'w':  nw=Math.max(MIN_W,rzSW-ddx); nx=rzNX+rzSW-nw; break;
      case 's':  nh=Math.max(MIN_H,rzSH+ddy); break;
      case 'n':  nh=Math.max(MIN_H,rzSH-ddy); ny=rzNY+rzSH-nh; break;
    }
    rzNode.x=nx; rzNode.y=ny; rzNode.width=nw; rzNode.height=nh;
  }
  // ── Scrollbar drag fix
  else if(isScrollDrag&&sbNode){
    const sb=sbNode._scrollbarBounds;
    if(sb){
      const thumbTopRelToTrack=cy-sbDragOffset-sb.y;
      const maxT=sb.h-sb.thumbH;
      const clamped=Math.max(0,Math.min(thumbTopRelToTrack,maxT));
      sbNode.scrollY=maxT>0?(clamped/maxT)*sbNode._maxScroll:0;
    }
  }
  else if(isDragging){
    if(isSelecting){
      const minX=Math.min(selStart.x,cx), minY=Math.min(selStart.y,cy);
      selRect={x:minX,y:minY,w:Math.abs(cx-selStart.x),h:Math.abs(cy-selStart.y)};
    } else if(isNodeDrag&&dragNode){
      const ndx=(cx-dragOffX)-dragNode.x, ndy=(cy-dragOffY)-dragNode.y;
      selectedNodes.forEach(n=>{ n.x=snap(n.x+ndx); n.y=snap(n.y+ndy); });
    } else if(isPanning){
      vx+=dx; vy+=dy;
    }
  }

  lastMX=mx; lastMY=my;
  scheduleRender();
});

// BUG FIX: mouseleave no longer kills active operations
canvas.addEventListener('mouseleave',()=>{
  mouseIsOnCanvas=false;
  hoverNode=null; hoverConnPt=null;
  scheduleRender();
});

// Continue drag even outside canvas
document.addEventListener('mousemove',e=>{
  if(mouseIsOnCanvas) return; // handled by canvas listener
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {x:cx,y:cy}=s2c(mx,my);
  const dx=mx-lastMX, dy=my-lastMY;
  if(Math.abs(dx)>1||Math.abs(dy)>1) hasMoved=true;

  if(isResizing&&rzNode&&rzHandle){
    const ddx=cx-rzSX, ddy=cy-rzSY;
    let nx=rzNX,ny=rzNY,nw=rzSW,nh=rzSH;
    switch(rzHandle.type){
      case 'se': nw=Math.max(MIN_W,rzSW+ddx);nh=Math.max(MIN_H,rzSH+ddy);break;
      case 'sw': nw=Math.max(MIN_W,rzSW-ddx);nh=Math.max(MIN_H,rzSH+ddy);nx=rzNX+rzSW-nw;break;
      case 'ne': nw=Math.max(MIN_W,rzSW+ddx);nh=Math.max(MIN_H,rzSH-ddy);ny=rzNY+rzSH-nh;break;
      case 'nw': nw=Math.max(MIN_W,rzSW-ddx);nh=Math.max(MIN_H,rzSH-ddy);nx=rzNX+rzSW-nw;ny=rzNY+rzSH-nh;break;
      case 'e':  nw=Math.max(MIN_W,rzSW+ddx);break;
      case 'w':  nw=Math.max(MIN_W,rzSW-ddx);nx=rzNX+rzSW-nw;break;
      case 's':  nh=Math.max(MIN_H,rzSH+ddy);break;
      case 'n':  nh=Math.max(MIN_H,rzSH-ddy);ny=rzNY+rzSH-nh;break;
    }
    rzNode.x=nx;rzNode.y=ny;rzNode.width=nw;rzNode.height=nh;
  } else if(isNodeDrag&&dragNode){
    const ndx=(cx-dragOffX)-dragNode.x, ndy=(cy-dragOffY)-dragNode.y;
    selectedNodes.forEach(n=>{n.x=snap(n.x+ndx);n.y=snap(n.y+ndy);});
  } else if(isPanning){
    vx+=dx; vy+=dy;
  }
  lastMX=mx; lastMY=my;
  scheduleRender();
});

document.addEventListener('mouseup',e=>{
  if(isResizing){isResizing=false;if(rzNode){pushHistory();autosave();}rzNode=null;rzHandle=null;scheduleRender();return;}
  if(isScrollDrag){isScrollDrag=false;sbNode=null;scheduleRender();return;}

  if(isConnecting&&connStart){
    const rect=canvas.getBoundingClientRect();
    const {x:cx,y:cy}=s2c(e.clientX-rect.left,e.clientY-rect.top);
    const target=getNodeAt(cx,cy);
    if(target&&target!==connStart){
      const tp=connPtAt(target,cx,cy);
      const {fromSide,toSide}=bestSides(connStart,target);
      connections.push({id:'c'+Date.now(),from:connStart.id,to:target.id,
        fromSide:connStartPt?.side||fromSide, toSide:tp?.side||toSide});
      pushHistory(); autosave(); updateStatusBar();
    }
    isConnecting=false; connStart=null; connStartPt=null;
    canvas.style.cursor='default';
  }

  if(isSelecting){
    if(selRect&&(selRect.w>4||selRect.h>4)){
      const sel=getNodesInRect(selRect.x,selRect.y,selRect.w,selRect.h);
      if(e.ctrlKey||e.metaKey||e.shiftKey) sel.forEach(n=>addSel(n));
      else{clearSelection();sel.forEach(n=>addSel(n));}
    }
    isSelecting=false; selRect=null;
  }

  if(dragNode&&!hasMoved) selectNode(dragNode);
  if(isNodeDrag&&hasMoved){pushHistory();autosave();}

  isDragging=false; isNodeDrag=false; isPanning=false; dragNode=null; hasMoved=false;
  scheduleRender();
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const {x:cx,y:cy}=s2c(mx,my);

  const hn=getNodeAt(cx,cy);
  if(hn&&hn._maxScroll>0&&!e.ctrlKey&&!e.metaKey&&Math.abs(e.deltaX)<Math.abs(e.deltaY)){
    hn.scrollY=Math.max(0,Math.min(hn.scrollY+e.deltaY*0.35,hn._maxScroll));
    scheduleRender(); return;
  }
  // Trackpad 2-finger pan
  if(!e.ctrlKey&&!e.metaKey&&Math.abs(e.deltaX)>0&&Math.abs(e.deltaX)<80&&Math.abs(e.deltaY)<80){
    vx-=e.deltaX; vy-=e.deltaY; scheduleRender(); return;
  }
  // Zoom
  if(e.ctrlKey||e.metaKey||Math.abs(e.deltaY)>5){
    const factor=e.deltaY>0?0.92:1.09;
    const ns=Math.max(0.08,Math.min(6,vs*factor));
    vx-=(mx-vx)*(ns-vs)/vs;
    vy-=(my-vy)*(ns-vs)/vs;
    vs=ns;
    scheduleRender();
  }
},{passive:false});

// ── BUG FIX: dblclick — guard against accidental new node after edit
let _lastDblTarget = null;
canvas.addEventListener('dblclick',e=>{
  const rect=canvas.getBoundingClientRect();
  const {x:cx,y:cy}=s2c(e.clientX-rect.left,e.clientY-rect.top);
  const n=getNodeAt(cx,cy);
  if(n){ _lastDblTarget=n; editNodeText(n); }
  else if(_lastDblTarget===null){ createNode('New Node',cx-125,cy-60); }
  _lastDblTarget=null;
});
canvas.addEventListener('mousedown',()=>{ _lastDblTarget=null; },{capture:true});

// ━━━ Keyboard ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT') return;

  const step=e.shiftKey?10:1;

  switch(e.key){
    case 'Delete': case 'Backspace':
      if(selectedConn){deleteConn(selectedConn);e.preventDefault();return;}
      if(selectedNodes.length){[...selectedNodes].forEach(n=>deleteNode(n));e.preventDefault();}break;
    case 'Escape':
      if(isConnecting){isConnecting=false;connStart=null;connStartPt=null;canvas.style.cursor='default';scheduleRender();}
      closeContextMenu(); e.preventDefault(); break;
    case 'a': case 'A':
      if(e.ctrlKey||e.metaKey){clearSelection();nodes.forEach(n=>addSel(n));scheduleRender();e.preventDefault();}break;
    case 'z': case 'Z':
      if(e.ctrlKey||e.metaKey){e.shiftKey?redo():undo();e.preventDefault();}break;
    case 'y': case 'Y':
      if(e.ctrlKey||e.metaKey){redo();e.preventDefault();}break;
    case 'c': case 'C':
      if((e.ctrlKey||e.metaKey)&&selectedNodes.length){
        // Deep copy — strip runtime props
        clipboard=selectedNodes.map(n=>({...cleanNode(n)}));
        toast(`📋 ${clipboard.length} Node(s) kopiert`); e.preventDefault();
      }break;
    case 'v': case 'V':
      if((e.ctrlKey||e.metaKey)&&clipboard.length){
        clearSelection();
        clipboard.forEach((nd,i)=>{
          const nn=createNode(nd.text,nd.x+40+i*30,nd.y+40+i*30);
          nn.width=nd.width; nn.height=nd.height;
          nn.bg=nd.bg; nn.textColor=nd.textColor; nn.border=nd.border;
          addSel(nn);
        });
        toast(`📌 ${clipboard.length} Node(s) eingefügt`); e.preventDefault();
      }break;
    case 'n': case 'N':
      if(!e.ctrlKey&&!e.metaKey){
        const cx=(canvas.width/2-vx)/vs, cy=(canvas.height/2-vy)/vs;
        createNode('New Node',cx-125,cy-60); e.preventDefault();
      }break;
    case 'ArrowLeft':  if(selectedNodes.length){selectedNodes.forEach(n=>n.x-=step);pushHistory();scheduleRender();e.preventDefault();}break;
    case 'ArrowRight': if(selectedNodes.length){selectedNodes.forEach(n=>n.x+=step);pushHistory();scheduleRender();e.preventDefault();}break;
    case 'ArrowUp':    if(selectedNodes.length){selectedNodes.forEach(n=>n.y-=step);pushHistory();scheduleRender();e.preventDefault();}break;
    case 'ArrowDown':  if(selectedNodes.length){selectedNodes.forEach(n=>n.y+=step);pushHistory();scheduleRender();e.preventDefault();}break;
  }
});

// ━━━ Inline Text Editor ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function editNodeText(n){
  const rect=canvas.getBoundingClientRect();
  const sx=rect.left+n.x*vs+vx;
  const sy=rect.top+n.y*vs+vy;
  const sw=n.width*vs, sh=n.height*vs;

  const ta=document.createElement('textarea');
  ta.value=n.text;
  ta.dataset.nodeId=n.id;
  ta.style.cssText=`position:fixed;left:${sx}px;top:${sy}px;width:${sw}px;height:${sh}px;
    z-index:9999;background:${n.bg};color:${n.textColor};
    border:2px solid #4a9eff;border-radius:12px;padding:8px;
    font-size:${Math.max(10,13*vs)}px;font-family:'Segoe UI',sans-serif;
    line-height:1.5;resize:none;outline:none;box-shadow:0 4px 24px rgba(0,0,0,0.6);
    caret-color:#7bc0ff;`;
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  n.isEditing=true; scheduleRender();

  let finished=false;
  const finish=()=>{
    if(finished||!document.body.contains(ta)) return;
    finished=true;
    n.text=ta.value||'New Node';
    n.isEditing=false;
    document.body.removeChild(ta);
    pushHistory(); autosave(); scheduleRender();
  };
  const cancel=()=>{
    if(finished||!document.body.contains(ta)) return;
    finished=true;
    n.isEditing=false;
    document.body.removeChild(ta);
    scheduleRender();
  };

  ta.addEventListener('keydown',ev=>{
    if(ev.key==='Enter'&&ev.ctrlKey){ev.preventDefault();ev.stopPropagation();finish();}
    else if(ev.key==='Escape'){ev.preventDefault();ev.stopPropagation();cancel();}
    else if(ev.key==='Tab'){ev.preventDefault();ev.stopPropagation();
      const s=ta.selectionStart;
      ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(ta.selectionEnd);
      ta.selectionStart=ta.selectionEnd=s+2;
    } else ev.stopPropagation();
  });
  // BUG FIX: blur only triggers finish once via `finished` guard
  ta.addEventListener('blur',finish);
}

// ━━━ Context Menu ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showContextMenu(screenX,screenY,node){
  const menu=document.getElementById('ctx-menu');
  menu.innerHTML='';

  if(node){
    selectNode(node);
    // Color picker
    const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent='Farbe';
    menu.appendChild(lbl);
    const row=document.createElement('div'); row.className='color-row';
    NODE_COLORS.forEach(c=>{
      const dot=document.createElement('div'); dot.className='color-dot';
      dot.style.background=c.bg; dot.style.borderColor=c.border;
      dot.title=c.label;
      dot.onclick=()=>{ node.bg=c.bg; node.border=c.border; pushHistory(); autosave(); closeContextMenu(); scheduleRender(); };
      row.appendChild(dot);
    });
    menu.appendChild(row);
    const sep1=document.createElement('div'); sep1.className='ctx-sep'; menu.appendChild(sep1);

    const items=[
      {icon:'✏️', label:'Bearbeiten', action:()=>{ closeContextMenu(); editNodeText(node); }},
      {icon:'📋', label:'Kopieren',   action:()=>{ clipboard=[{...cleanNode(node)}]; toast('📋 Kopiert'); closeContextMenu(); }},
      {icon:'🔼', label:'Nach vorne', action:()=>{ const i=nodes.indexOf(node); if(i<nodes.length-1){nodes.splice(i,1);nodes.push(node);pushHistory();scheduleRender();} closeContextMenu(); }},
      {icon:'🔽', label:'Nach hinten',action:()=>{ const i=nodes.indexOf(node); if(i>0){nodes.splice(i,1);nodes.unshift(node);pushHistory();scheduleRender();} closeContextMenu(); }},
    ];
    items.forEach(it=>{
      const d=document.createElement('div'); d.className='ctx-item';
      d.innerHTML=`<span>${it.icon}</span><span>${it.label}</span>`;
      d.onclick=it.action; menu.appendChild(d);
    });
    const sep2=document.createElement('div'); sep2.className='ctx-sep'; menu.appendChild(sep2);
    const del=document.createElement('div'); del.className='ctx-item danger';
    del.innerHTML='<span>🗑️</span><span>Löschen</span>';
    del.onclick=()=>{ deleteNode(node); closeContextMenu(); };
    menu.appendChild(del);
  } else {
    const items=[
      {icon:'➕', label:'Neuer Node hier', action:()=>{ const rect=canvas.getBoundingClientRect(); const {x,y}=s2c(screenX-rect.left,screenY-rect.top); createNode('New Node',x-125,y-60); closeContextMenu(); }},
      {icon:'📋', label:'Einfügen', action:()=>{ if(!clipboard.length){toast('Kein Inhalt');return;} clearSelection(); clipboard.forEach((nd,i)=>{ const nn=createNode(nd.text,nd.x+40+i*30,nd.y+40+i*30); nn.width=nd.width;nn.height=nd.height;nn.bg=nd.bg;nn.textColor=nd.textColor;nn.border=nd.border;addSel(nn);}); closeContextMenu(); }},
    ];
    items.forEach(it=>{
      const d=document.createElement('div'); d.className='ctx-item';
      d.innerHTML=`<span>${it.icon}</span><span>${it.label}</span>`;
      d.onclick=it.action; menu.appendChild(d);
    });
  }

  // Position
  menu.style.display='block';
  const mw=menu.offsetWidth, mh=menu.offsetHeight;
  let mx=screenX+4, my=screenY+4;
  if(mx+mw>window.innerWidth) mx=screenX-mw-4;
  if(my+mh>window.innerHeight-28) my=screenY-mh-4;
  menu.style.left=mx+'px'; menu.style.top=my+'px';
  scheduleRender();
}

function closeContextMenu(){
  document.getElementById('ctx-menu').style.display='none';
}
document.addEventListener('mousedown',e=>{
  if(!document.getElementById('ctx-menu').contains(e.target)) closeContextMenu();
});

// ━━━ Toolbar Buttons ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.getElementById('btn-add').onclick=()=>{
  const cx=(canvas.width/2-vx)/vs, cy=(canvas.height/2-vy)/vs;
  createNode('New Node',cx-125,cy-60);
};

document.getElementById('btn-undo').onclick=undo;
document.getElementById('btn-redo').onclick=redo;

document.getElementById('btn-snap').onclick=()=>{
  snapEnabled=!snapEnabled;
  document.getElementById('btn-snap').classList.toggle('active',snapEnabled);
  toast(snapEnabled?'⊞ Snap aktiviert':'Snap deaktiviert');
  scheduleRender();
};

document.getElementById('btn-export').onclick=()=>{
  const blob=new Blob([JSON.stringify(exportData(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='canvas-'+Date.now()+'.json'; a.click();
  URL.revokeObjectURL(url);
  toast('⬇ Exportiert');
};

document.getElementById('btn-import').onclick=()=>{
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.canvas';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{ importData(JSON.parse(ev.target.result)); autosave(); toast('⬆ Importiert'); }catch(err){toast('❌ Ungültige Datei');} };
    r.readAsText(f);
  };
  inp.click();
};

document.getElementById('btn-clear').onclick=()=>{
  if(confirm('Canvas leeren? Diese Aktion kann nicht rückgängig gemacht werden.')){
    nodes=[]; connections=[]; clearSelection(); // BUG FIX: selectedConn reset via clearSelection
    nodeCounter=0; pushHistory(); autosave(); updateStatusBar(); scheduleRender();
    toast('🗑 Canvas geleert');
  }
};

document.getElementById('btn-reset').onclick=()=>{ vx=0;vy=0;vs=1; scheduleRender(); };
document.getElementById('zoom-display').onclick=()=>{ vx=0;vy=0;vs=1; scheduleRender(); };

// ━━━ Export / Import / Autosave ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function exportData(){
  return {
    nodes: nodes.map(cleanNode),
    edges: connections.map(c=>({id:c.id,fromNode:c.from,toNode:c.to,fromSide:c.fromSide,toSide:c.toSide}))
  };
}

function importData(data){
  nodes=[]; connections=[]; nodeCounter=0; clearSelection();
  (data.nodes||[]).forEach(nd=>{
    // BUG FIX: preserve saved colors instead of hardcoding defaults
    const n={
      id:nd.id, type:nd.type||'text', text:nd.text||'Node',
      x:nd.x||100, y:nd.y||100, width:nd.width||250, height:nd.height||120,
      scrollY:0, isSelected:false,
      bg:      nd.bg||nd.backgroundColor||'#2d2d2d',
      textColor:nd.textColor||'#e0e0e0',
      border:  nd.border||nd.borderColor||'#444'
    };
    const num=parseInt(n.id.replace(/\D/g,''));
    if(!isNaN(num)&&num>nodeCounter) nodeCounter=num;
    nodes.push(n);
  });
  (data.edges||[]).forEach(e=>{
    connections.push({id:e.id,from:e.fromNode,to:e.toNode,
      fromSide:e.fromSide||'right',toSide:e.toSide||'left'});
  });
  pushHistory(); updateStatusBar(); scheduleRender();
}

let _autosaveTimer=null;
function autosave(){
  clearTimeout(_autosaveTimer);
  _autosaveTimer=setTimeout(()=>{
    try{ localStorage.setItem('ic_v2',JSON.stringify(exportData())); }catch(e){}
  },400);
}

// ━━━ Bootstrap ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
try{
  const saved=localStorage.getItem('ic_v2');
  if(saved){ importData(JSON.parse(saved)); }
  else {
    const n1=createNode('# Willkommen 👋\n\nDoppelklick = neuer Node\nShift+Drag = verbinden\nRechtsklick = Menü\nCtrl+Z = Undo',160,140);
    n1.width=270; n1.height=165; n1.bg='#1e2d3a'; n1.border='#2d5a8a';

    const n2=createNode('# Shortcuts\n\nN = Neuer Node\nCtrl+A = Alle wählen\nPfeiltasten = Bewegen\nDel = Löschen\nCtrl+C/V = Kopieren',510,160);
    n2.width=240; n2.height=165; n2.bg='#1e3a2f'; n2.border='#2d6a4f';

    const n3=createNode('# Verbindungen\n\nShift+Drag von\neinem Verbindungspunkt\nzu einem anderen Node',390,380);
    n3.width=230; n3.height=130;

    connections.push({id:'c1',from:n1.id,to:n2.id,fromSide:'right',toSide:'left'});
    connections.push({id:'c2',from:n1.id,to:n3.id,fromSide:'bottom',toSide:'top'});
    connections.push({id:'c3',from:n2.id,to:n3.id,fromSide:'bottom',toSide:'top'});
    autosave(); pushHistory(); updateStatusBar();
  }
}catch(e){ scheduleRender(); }
</script>
</body>
