<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Canvas v3.2-v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#1c1c1e;--surface:rgba(44,44,46,0.92);--glass:rgba(30,30,32,0.78);--glass-border:rgba(255,255,255,0.08);--text:#f5f5f7;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.3);--accent:#007AFF;--green:#30D158;--red:#FF453A;--accent-soft:rgba(0,122,255,0.15);--shadow:0 8px 32px rgba(0,0,0,0.45);--shadow-lg:0 16px 64px rgba(0,0,0,0.6);--r:12px;--rs:8px;--font:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;--node-bg:#2c2c2e;--node-border:#48484a;--node-text:#f5f5f7;--canvas-bg:#1c1c1e}
:root.light{--bg:#f2f2f7;--surface:rgba(255,255,255,0.92);--glass:rgba(255,255,255,0.78);--glass-border:rgba(0,0,0,0.06);--text:#1c1c1e;--text2:rgba(0,0,0,0.5);--text3:rgba(0,0,0,0.25);--accent-soft:rgba(0,122,255,0.1);--shadow:0 8px 32px rgba(0,0,0,0.08);--shadow-lg:0 16px 64px rgba(0,0,0,0.12);--node-bg:#fff;--node-border:#d1d1d6;--node-text:#1c1c1e;--canvas-bg:#f2f2f7}
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden;background:var(--canvas-bg);color:var(--text);font-family:var(--font);user-select:none;-webkit-font-smoothing:antialiased}
#pw-screen{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#pw-screen.hidden{display:none}.pw-box{background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:40px;width:320px;text-align:center;backdrop-filter:blur(40px);box-shadow:var(--shadow-lg)}
.pw-box h2{font-size:20px;font-weight:600;margin-bottom:4px}.pw-box p{font-size:13px;color:var(--text2);margin-bottom:20px}
.pw-input{width:100%;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--glass-border);background:var(--bg);color:var(--text);font-size:15px;font-family:var(--font);text-align:center;letter-spacing:4px;outline:none;transition:border-color .2s}
.pw-input:focus{border-color:var(--accent)}.pw-input.error{border-color:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.pw-btn{width:100%;padding:10px;margin-top:12px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .15s}.pw-btn:hover{opacity:.85}
.pw-error{color:var(--red);font-size:12px;height:16px;margin-top:8px}.pw-logo{font-size:28px;font-weight:700;letter-spacing:-1px}.pw-logo span{color:var(--accent)}
#canvas{display:block;position:absolute;top:0;left:0;touch-action:none}
#toolbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:center;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:5px 10px;z-index:9100;backdrop-filter:blur(40px) saturate(180%);box-shadow:var(--shadow);flex-wrap:nowrap}
.tb-logo{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.3px;padding-right:6px;white-space:nowrap}
.tb-btn{background:transparent;border:1px solid transparent;border-radius:var(--rs);color:var(--text2);padding:5px 8px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;outline:none;display:flex;align-items:center;gap:4px;font-family:var(--font)}
.tb-btn:hover{background:var(--accent-soft);color:var(--text);border-color:var(--glass-border)}.tb-btn.active{background:var(--accent-soft);border-color:rgba(0,122,255,0.3);color:var(--accent)}
.tb-sep{width:1px;height:18px;background:var(--glass-border);margin:0 3px;flex-shrink:0}
#add-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:4px 0;min-width:180px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px);display:none;z-index:9200}
#add-dropdown.open{display:block}.dd-item{padding:8px 12px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}.dd-item:hover{background:var(--accent-soft)}
.dd-sub{font-size:10px;color:var(--text3);margin-top:1px}
#statusbar{position:fixed;bottom:0;left:0;right:0;height:30px;background:var(--glass);border-top:1px solid var(--glass-border);display:flex;align-items:center;padding:0 14px;gap:16px;z-index:9100;font-size:11px;color:var(--text3);backdrop-filter:blur(20px)}
#statusbar b{color:var(--text2);font-weight:600}#zoom-display{margin-left:auto;cursor:pointer;padding:2px 8px;border-radius:4px;transition:all .15s}#zoom-display:hover{background:var(--accent-soft);color:var(--text)}
.zoom-controls{display:flex;align-items:center;gap:2px;margin-left:8px}.zoom-controls button{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:13px;font-family:var(--font);transition:all .12s}.zoom-controls button:hover{background:var(--accent-soft);color:var(--text)}
#ctx-menu{position:fixed;z-index:9500;display:none;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);padding:4px 0;min-width:180px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px)}
.ctx-item{padding:7px 12px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}.ctx-item:hover{background:var(--accent-soft)}
.ctx-item.danger{color:var(--red)}.ctx-item.danger:hover{background:rgba(255,69,58,0.1)}.ctx-item .shortcut{margin-left:auto;font-size:10px;color:var(--text3);font-weight:500}
.ctx-sep{height:1px;background:var(--glass-border);margin:3px 0}.ctx-label{padding:5px 12px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.color-row{display:flex;gap:6px;padding:6px 12px}.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s}.color-dot:hover{transform:scale(1.25);border-color:var(--text2)}
.type-row{display:flex;gap:5px;padding:6px 12px}.type-dot{width:28px;height:28px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);border:1px solid var(--glass-border);transition:all .12s}.type-dot:hover{border-color:var(--accent)}.type-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
#toast{position:fixed;bottom:42px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--rs);padding:8px 16px;font-size:12px;color:var(--text);z-index:9600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;backdrop-filter:blur(20px);font-weight:500}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#cl-editor{position:fixed;z-index:9999;display:none;background:var(--glass);border:2px solid var(--accent);border-radius:16px;padding:0;min-width:280px;max-width:420px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px);overflow:hidden}
#cl-editor-header{padding:10px 14px;background:var(--accent-soft);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--accent)}
#cl-editor-header button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}#cl-editor-header button:hover{background:var(--accent-soft);color:var(--text)}
#cl-title-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font);padding:10px 14px 6px;border-bottom:1px solid var(--glass-border);font-weight:600}
#cl-items-list{max-height:260px;overflow-y:auto;padding:6px 0}.cl-row{display:flex;align-items:center;gap:8px;padding:4px 14px;border-radius:6px;margin:0 4px}.cl-row:hover{background:var(--accent-soft)}
.cl-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--text3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cl-check.done{background:var(--green);border-color:var(--green)}.cl-check.done::after{content:'';display:block;width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px)}
.cl-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:var(--font);padding:3px 0}.cl-input.done-text{color:var(--text3);text-decoration:line-through}
.cl-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;opacity:0;transition:opacity .1s}.cl-row:hover .cl-del{opacity:1}.cl-del:hover{color:var(--red)}
#cl-add-btn{width:100%;background:none;border:none;border-top:1px solid var(--glass-border);color:var(--text3);cursor:pointer;padding:8px 14px;font-size:12px;font-family:var(--font);text-align:left;transition:all .1s;display:flex;align-items:center;gap:6px}#cl-add-btn:hover{background:var(--accent-soft);color:var(--text)}
#cl-footer{padding:8px 14px;border-top:1px solid var(--glass-border);display:flex;gap:6px;justify-content:flex-end}#cl-footer button{padding:5px 14px;border-radius:var(--rs);border:1px solid var(--glass-border);font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all .12s}
#cl-save{background:var(--accent);color:#fff;border-color:var(--accent)}#cl-save:hover{opacity:.85}#cl-cancel{background:transparent;color:var(--text2)}#cl-cancel:hover{background:var(--accent-soft)}
#spotlight{position:fixed;inset:0;z-index:9800;display:none;align-items:flex-start;justify-content:center;padding-top:min(20vh,160px);background:rgba(0,0,0,0.4);backdrop-filter:blur(8px)}#spotlight.open{display:flex}
#spotlight-box{width:min(520px,90vw);background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px);overflow:hidden}
#spotlight-input{width:100%;padding:14px 18px;border:none;outline:none;background:transparent;color:var(--text);font-size:16px;font-family:var(--font);border-bottom:1px solid var(--glass-border)}#spotlight-input::placeholder{color:var(--text3)}
#spotlight-results{max-height:320px;overflow-y:auto;padding:4px 0}.sp-item{padding:10px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s;font-size:13px}.sp-item:hover,.sp-item.active{background:var(--accent-soft)}
.sp-icon{width:28px;height:28px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:var(--accent-soft);color:var(--accent);flex-shrink:0}
.sp-title{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sp-sub{font-size:11px;color:var(--text3)}.sp-hint{padding:8px 18px;font-size:11px;color:var(--text3);text-align:center}
#minimap{position:fixed;bottom:40px;right:12px;z-index:9090;width:180px;height:120px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--rs);overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(20px);cursor:pointer}
#minimap-canvas{width:100%;height:100%;display:block}
#conn-label-editor{position:fixed;z-index:9700;display:none;background:var(--glass);border:1px solid var(--accent);border-radius:var(--rs);padding:8px;min-width:200px;box-shadow:var(--shadow);backdrop-filter:blur(40px)}
#conn-label-input{width:100%;padding:6px 10px;border:1px solid var(--glass-border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}#conn-label-input:focus{border-color:var(--accent)}
.conn-style-row{display:flex;gap:4px;margin-top:6px}.conn-style-btn{flex:1;padding:4px;border:1px solid var(--glass-border);border-radius:6px;background:transparent;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;text-align:center;font-family:var(--font);transition:all .12s}
.conn-style-btn:hover{border-color:var(--accent);color:var(--text)}.conn-style-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
#tbl-editor{position:fixed;z-index:9999;display:none;background:var(--glass);border:2px solid var(--accent);border-radius:16px;padding:0;min-width:320px;max-width:560px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px);overflow:hidden}
#tbl-editor-header{padding:10px 14px;background:var(--accent-soft);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--accent)}
#tbl-editor-header button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}#tbl-editor-header button:hover{background:var(--accent-soft);color:var(--text)}
#tbl-grid{padding:8px;overflow:auto;max-height:320px}
#tbl-grid table{width:100%;border-collapse:collapse;font-size:12px}
#tbl-grid th,#tbl-grid td{border:1px solid var(--glass-border);padding:4px 8px;min-width:60px}
#tbl-grid th{background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:11px}
#tbl-grid td{background:transparent;color:var(--text)}
#tbl-grid input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:var(--font);padding:2px 0}
#tbl-grid input:focus{background:var(--accent-soft);border-radius:3px}
#tbl-footer{padding:8px 14px;border-top:1px solid var(--glass-border);display:flex;gap:6px;justify-content:space-between;align-items:center}
#tbl-footer button{padding:4px 12px;border-radius:var(--rs);border:1px solid var(--glass-border);font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;transition:all .12px;background:transparent;color:var(--text2)}
#tbl-footer button:hover{background:var(--accent-soft);color:var(--text)}
#tbl-footer .tbl-save{background:var(--accent);color:#fff;border-color:var(--accent)}
#tpl-picker{position:fixed;inset:0;z-index:9850;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px)}#tpl-picker.open{display:flex}
#tpl-box{width:min(600px,92vw);background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;box-shadow:var(--shadow-lg);backdrop-filter:blur(40px);overflow:hidden;max-height:80vh}
#tpl-header{padding:14px 18px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:600}
#tpl-header button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:4px}#tpl-header button:hover{color:var(--text)}
#tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:14px 18px;overflow-y:auto;max-height:calc(80vh - 60px)}
.tpl-card{background:var(--accent-soft);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;text-align:center}
.tpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.tpl-card .tpl-icon{font-size:24px;margin-bottom:6px}.tpl-card .tpl-name{font-size:13px;font-weight:600;color:var(--text)}.tpl-card .tpl-desc{font-size:11px;color:var(--text3);margin-top:3px}
#save-indicator{display:inline-flex;align-items:center;gap:6px;font-weight:500;opacity:.95}
</style>
</head>
<body>
<div id="pw-screen"><div class="pw-logo">&#8734; <span>Canvas</span></div><div class="pw-box"><h2>Zugang</h2><p>Bitte PIN eingeben</p><input type="password" id="pw-input" class="pw-input" maxlength="8" placeholder="&#xB7;&#xB7;&#xB7;&#xB7;" autofocus><button class="pw-btn" id="pw-btn">&#214;ffnen</button><div class="pw-error" id="pw-error"></div></div></div>
<canvas id="canvas"></canvas>
<div id="toolbar" style="display:none">
<span class="tb-logo">&#8734; Canvas</span><div class="tb-sep"></div>
<button class="tb-btn" id="btn-add" title="Node hinzuf&#252;gen">&#65291; Node &#9662;<div id="add-dropdown"><div class="dd-item" data-type="text"><b>T</b><div><div>Text-Node</div><div class="dd-sub">Markdown</div></div></div><div class="dd-item" data-type="sticky"><b>S</b><div><div>Sticky Note</div><div class="dd-sub">Post-it</div></div></div><div class="dd-item" data-type="checklist"><b>&#10003;</b><div><div>Checkliste</div><div class="dd-sub">To-dos</div></div></div><div class="dd-item" data-type="group"><b>&#9633;</b><div><div>Gruppe</div><div class="dd-sub">Container</div></div></div><div class="dd-item" data-type="table"><b>&#8862;</b><div><div>Tabelle</div><div class="dd-sub">Zeilen &amp; Spalten</div></div></div><div class="dd-item" data-type="link"><b>&#128279;</b><div><div>Link-Bubble</div><div class="dd-sub">URL / Weblink</div></div></div><div class="dd-item" data-type="diamond"><b>&#9671;</b><div><div>Raute</div><div class="dd-sub">Entscheidung</div></div></div><div class="dd-item" data-type="ellipse"><b>&#11053;</b><div><div>Ellipse</div><div class="dd-sub">Prozess</div></div></div><div class="dd-item" data-type="hexagon"><b>&#11041;</b><div><div>Hexagon</div><div class="dd-sub">Modul</div></div></div></div></button>
<button class="tb-btn" id="btn-undo" title="Undo">&#8617;</button><button class="tb-btn" id="btn-redo" title="Redo">&#8618;</button><div class="tb-sep"></div>
<button class="tb-btn" id="btn-snap" title="Snap">&#8862;</button><button class="tb-btn" id="btn-fit" title="Fit to Screen">&#8865;</button><div class="tb-sep"></div>
<button class="tb-btn" id="btn-search" title="Suche &#8984;K">&#8981;</button><button class="tb-btn" id="btn-tpl" title="Templates">&#8862; Tpl</button><div class="tb-sep"></div>
<button class="tb-btn" id="btn-png" title="PNG Export">&#8595; PNG</button><button class="tb-btn" id="btn-export" title="JSON Export">&#8595; JSON</button><button class="tb-btn" id="btn-import" title="Import">&#8593;</button><div class="tb-sep"></div>
<button class="tb-btn" id="btn-theme" title="Theme">&#9681;</button><button class="tb-btn" id="btn-clear" title="Leeren">&#128465;</button>
</div>
<div id="statusbar" style="display:none"><span><b id="node-count">0</b> Nodes</span><span><b id="conn-count">0</b> Conn</span><span id="hint"><b>Dblclick</b>=Node &middot; <b>Shift+Drag</b>=Connect &middot; <b>&#8984;K</b>=Suche &middot; <b>D</b>=Dup</span><span id="zoom-display" title="Reset">100%</span><span class="zoom-controls"><button id="zoom-out">&#8722;</button><button id="zoom-in">+</button></span></div>
<div id="ctx-menu"></div><div id="toast"></div>
<div id="cl-editor"><div id="cl-editor-header"><span>Checkliste</span><button id="cl-close">&#10005;</button></div><input id="cl-title-input" placeholder="Titel&#8230;" spellcheck="false"><div id="cl-items-list"></div><button id="cl-add-btn">+ Element</button><div id="cl-footer"><button id="cl-cancel">Abbrechen</button><button id="cl-save">Speichern</button></div></div>
<div id="spotlight"><div id="spotlight-box"><input id="spotlight-input" placeholder="Nodes suchen&#8230; (Esc)"><div id="spotlight-results"></div></div></div>
<div id="conn-label-editor"><input id="conn-label-input" placeholder="Label&#8230;" spellcheck="false"><div class="conn-style-row"><button class="conn-style-btn active" data-style="solid">Solid</button><button class="conn-style-btn" data-style="dashed">Dashed</button><button class="conn-style-btn" data-style="dotted">Dotted</button></div></div>
<div id="tbl-editor"><div id="tbl-editor-header"><span>Tabelle bearbeiten</span><button id="tbl-close">&#10005;</button></div><div id="tbl-grid"></div><div id="tbl-footer"><div><button id="tbl-add-row">+ Zeile</button><button id="tbl-add-col">+ Spalte</button><button id="tbl-del-row">&#8722; Zeile</button><button id="tbl-del-col">&#8722; Spalte</button></div><button class="tbl-save" id="tbl-save">Speichern</button></div></div>
<div id="tpl-picker"><div id="tpl-box"><div id="tpl-header"><span>Canvas-Template w&#228;hlen</span><button id="tpl-close">&#10005;</button></div><div id="tpl-grid"></div></div></div>
<div id="minimap" style="display:none"><canvas id="minimap-canvas"></canvas></div>

<script>
'use strict';
// ═══ PASSWORD ═══
const PW='2287';if(sessionStorage.getItem('ic_auth')==='1')unlockApp();
document.getElementById('pw-btn').onclick=checkPw;document.getElementById('pw-input').onkeydown=e=>{if(e.key==='Enter')checkPw();};
function checkPw(){const v=document.getElementById('pw-input').value;if(v===PW){sessionStorage.setItem('ic_auth','1');unlockApp();}else{document.getElementById('pw-input').classList.add('error');document.getElementById('pw-error').textContent='Falscher PIN';setTimeout(()=>{document.getElementById('pw-input').classList.remove('error');document.getElementById('pw-error').textContent='';},1200);}}
function unlockApp(){document.getElementById('pw-screen').classList.add('hidden');document.getElementById('toolbar').style.display='flex';document.getElementById('statusbar').style.display='flex';document.getElementById('minimap').style.display='block';initCanvas();}

// ═══ CORE ═══
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const mmC=document.getElementById('minimap-canvas'),mmX=mmC.getContext('2d');

function getCanvasCssSize(){const dpr=window.devicePixelRatio||1;return{w:canvas.width/dpr,h:canvas.height/dpr};}
let currentCursor='default',mmTimer=0,lastMM=0,activePointerId=null;function setCursor(cur){if(currentCursor!==cur){currentCursor=cur;canvas.style.cursor=cur;}}function scheduleMM(){const now=performance.now();if(now-lastMM>33){lastMM=now;renderMM();return;}clearTimeout(mmTimer);mmTimer=setTimeout(()=>{lastMM=performance.now();renderMM();},34);}function getLocalPoint(e){const r=canvas.getBoundingClientRect();return{mx:e.clientX-r.left,my:e.clientY-r.top};}function canHandlePointer(e){return e.isPrimary!==false&&(activePointerId===null||activePointerId===e.pointerId);}function resetInteractionState(){isRz=false;isSB=false;isConn=false;isSel=false;isDrag=false;isND=false;isPan=false;dNode=null;rzN=null;rzH=null;sbN=null;cStart=null;cStartPt=null;moved=false;activePointerId=null;setCursor('default');sR();}
function D(){return!document.documentElement.classList.contains('light');}

function fmtSaveTime(ts){const d=new Date(ts),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');return hh+':'+mm;}

const API_URL='api.php';
function getCanvasId(){let id=localStorage.getItem('ic_canvas_id');if(!id){id='default';localStorage.setItem('ic_canvas_id',id);}return id;}
async function apiGet(action,id){const u=id?`${API_URL}?action=${action}&id=${encodeURIComponent(id)}`:`${API_URL}?action=${action}`;const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function apiPost(action,id,payload){const u=id?`${API_URL}?action=${action}&id=${encodeURIComponent(id)}`:`${API_URL}?action=${action}`;const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function loadFromBackend(){try{const res=await apiGet('load',getCanvasId());if(res&&res.ok&&res.exists&&res.data){impD(res.data);if(res.updatedAt){const ts=Date.parse(res.updatedAt)||Date.now();try{localStorage.setItem('ic_v3_saved_at',String(ts));}catch(e){}setSaveIndicator('Server geladen · '+fmtSaveTime(ts),'#30D158');}return true;}}catch(e){}return false;}

// ═══ HISTORY ═══
function pH(){if(supH)return;const s=JSON.stringify({nodes:nodes.map(cN),conns});hist=hist.slice(0,hIdx+1);hist.push(s);if(hist.length>MAXH)hist.shift();hIdx=hist.length-1;}
function aH(s){supH=true;const d=JSON.parse(s);nodes=d.nodes.map(n=>Object.assign(mN(n.type||'text',n.text,n.x,n.y),n));conns=d.conns;clrS();supH=false;aS();sR();uSB();}
function undo(){if(hIdx<=0){toast('—');return;}hIdx--;aH(hist[hIdx]);toast('↩ Undo');}
function redo(){if(hIdx>=hist.length-1){toast('—');return;}hIdx++;aH(hist[hIdx]);toast('↪ Redo');}

// ═══ NODE FACTORY ═══
function mN(type,text,x,y){const id='n'+(++nc);const b={id,type:type||'text',text:text||'',x:x||100,y:y||100,scrollY:0,isSelected:false,locked:false};
switch(type){case'sticky':return{...b,text:text||'Notiz…',width:180,height:180,bg:'#FFD60A',textColor:'#1a1200',border:'#CCB000',typeData:{}};
case'checklist':return{...b,text:text||'Aufgaben',width:240,height:180,bg:C('#1e2a1e','#e8f5e9'),textColor:C('#d4f0d4','#1b5e20'),border:C('#2d5a2d','#81c784'),typeData:{items:[{text:'Erstes Element',checked:false}]}};
case'group':return{...b,text:text||'Bereich',width:380,height:280,bg:C('rgba(255,255,255,0.03)','rgba(0,0,0,0.03)'),textColor:C('rgba(255,255,255,0.5)','rgba(0,0,0,0.4)'),border:C('rgba(255,255,255,0.12)','rgba(0,0,0,0.1)'),typeData:{}};
case'table':return{...b,text:text||'Tabelle',width:300,height:200,bg:C('#2c2c2e','#fff'),textColor:C('#f5f5f7','#1c1c1e'),border:C('#48484a','#d1d1d6'),typeData:{headers:['Spalte 1','Spalte 2','Spalte 3'],rows:[['','',''],['','','']]}};
case'link':return{...b,text:text||'Link',width:120,height:120,bg:C('#1e2d3a','#e3f2fd'),textColor:C('#7ab8f5','#0055cc'),border:C('#2d5a8a','#64b5f6'),typeData:{url:'https://',icon:''}};
case'diamond':return{...b,text:text||'Entscheidung',width:180,height:140,bg:C('#3a2a1e','#fff3e0'),textColor:C('#ffb74d','#e65100'),border:C('#8a5a2d','#ffb74d'),typeData:{}};
case'ellipse':return{...b,text:text||'Prozess',width:200,height:120,bg:C('#1e2a3a','#e8eaf6'),textColor:C('#90caf9','#283593'),border:C('#2d4a7a','#7986cb'),typeData:{}};
case'hexagon':return{...b,text:text||'Modul',width:180,height:160,bg:C('#2a1e3a','#f3e5f5'),textColor:C('#ce93d8','#6a1b9a'),border:C('#6a3a8a','#ab47bc'),typeData:{}};
default:return{...b,text:text||'New Node',width:250,height:120,bg:C('#2c2c2e','#fff'),textColor:C('#f5f5f7','#1c1c1e'),border:C('#48484a','#d1d1d6'),typeData:{}};}}
function cN(n){const{_rh,_sb,_ch,_ms,_ca,isEditing,...r}=n;return r;}
// ── FIX 1 ANGEWENDET: x!=null&&x!=='' verhindert falsy-zero-Problem ────────
function addN(type,x,y,text){const n=mN(type,text,snV(x!=null&&x!==''?+x:100),snV(y!=null&&y!==''?+y:100));nodes.push(n);pH();aS();uSB();sR();return n;}
function delN(n){nodes=nodes.filter(x=>x!==n);conns=conns.filter(c=>c.from!==n.id&&c.to!==n.id);selN=selN.filter(s=>s!==n);pH();aS();uSB();sR();}
function delC(c){conns=conns.filter(x=>x!==c);if(selC===c)selC=null;pH();aS();uSB();sR();}

// ═══ SELECTION ═══
function clrS(){nodes.forEach(n=>n.isSelected=false);selN=[];selC=null;}
function selOne(n){clrS();n.isSelected=true;selN=[n];}
function addS(n){if(!n.isSelected){n.isSelected=true;selN.push(n);}}
function togS(n){n.isSelected?(n.isSelected=false,selN=selN.filter(s=>s!==n)):addS(n);}

// ═══ DUPLICATE ═══
function dupN(arr){if(!arr.length)return;clrS();arr.forEach(nd=>{const nn=addN(nd.type||'text',nd.x+30,nd.y+30,nd.text);nn.width=nd.width;nn.height=nd.height;nn.bg=nd.bg;nn.textColor=nd.textColor;nn.border=nd.border;if(nd.typeData)nn.typeData=JSON.parse(JSON.stringify(nd.typeData));addS(nn);});toast(arr.length+' dupliziert');}

// ═══ GEOMETRY ═══
function nAt(cx,cy){let g=null;for(let i=nodes.length-1;i>=0;i--){const n=nodes[i];if(n.type==='link'){const dx=cx-(n.x+n.width/2),dy=cy-(n.y+n.height/2),r=Math.min(n.width,n.height)/2;if(dx*dx+dy*dy<=r*r)return n;continue;}if(cx>=n.x&&cx<=n.x+n.width&&cy>=n.y&&cy<=n.y+n.height){if(n.type==='group'){if(!g)g=n;}else return n;}}return g;}
function nInR(rx,ry,rw,rh){return nodes.filter(n=>!(n.x>rx+rw||n.x+n.width<rx||n.y>ry+rh||n.y+n.height<ry));}
function cPts(n){const cx=n.x+n.width/2,cy=n.y+n.height/2;
if(n.type==='link'){const r=Math.min(n.width,n.height)/2;return[{x:cx,y:cy-r,side:'top'},{x:cx+r,y:cy,side:'right'},{x:cx,y:cy+r,side:'bottom'},{x:cx-r,y:cy,side:'left'}];}
if(n.type==='ellipse'){const rx=n.width/2,ry=n.height/2;return[{x:cx,y:n.y,side:'top'},{x:n.x+n.width,y:cy,side:'right'},{x:cx,y:n.y+n.height,side:'bottom'},{x:n.x,y:cy,side:'left'}];}
if(n.type==='diamond')return[{x:cx,y:n.y,side:'top'},{x:n.x+n.width,y:cy,side:'right'},{x:cx,y:n.y+n.height,side:'bottom'},{x:n.x,y:cy,side:'left'}];
if(n.type==='hexagon'){const rx=n.width/2,ry=n.height/2;return[{x:cx,y:n.y,side:'top'},{x:n.x+n.width,y:cy,side:'right'},{x:cx,y:n.y+n.height,side:'bottom'},{x:n.x,y:cy,side:'left'}];}
return[{x:cx,y:n.y,side:'top'},{x:n.x+n.width,y:cy,side:'right'},{x:cx,y:n.y+n.height,side:'bottom'},{x:n.x,y:cy,side:'left'}];}
function cpAt(n,cx,cy){for(const p of cPts(n))if(Math.hypot(cx-p.x,cy-p.y)<=16)return p;return null;}
function dSeg(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(!l2)return Math.hypot(px-x1,py-y1);const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
// ── FIX 4: Connection-Klick zoom-unabhängig ────────────────────────────────
// dSeg liefert Weltkoordinaten; bei vs=0.1 wären 8 Einheiten = 0.8 CSS-px → unklickbar
function cAt(cx,cy){const hitR=Math.max(6,8/vs);for(const c of conns){const fn=nodes.find(n=>n.id===c.from),tn=nodes.find(n=>n.id===c.to);if(!fn||!tn)continue;const fp=cPts(fn).find(p=>p.side===c.fromSide)||cPts(fn)[1];const tp=cPts(tn).find(p=>p.side===c.toSide)||cPts(tn)[3];if(dSeg(cx,cy,fp.x,fp.y,tp.x,tp.y)<=hitR)return c;}return null;}
function bSides(fn,tn){const dx=(tn.x+tn.width/2)-(fn.x+fn.width/2),dy=(tn.y+tn.height/2)-(fn.y+fn.height/2);return{fromSide:Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'bottom':'top'),toSide:Math.abs(dx)>Math.abs(dy)?(dx>0?'left':'right'):(dy>0?'top':'bottom')};}
function chkAt(n,cx,cy){if(!n._ca)return-1;for(const h of n._ca)if(cy>=h.y1&&cy<=h.y2&&cx>=h.x1&&cx<=h.x2)return h.idx;return-1;}

// ═══ FIT TO SCREEN ═══
function fitAll(){if(!nodes.length){vx=0;vy=0;vs=1;sR();return;}let mX=Infinity,mY=Infinity,MX=-Infinity,MY=-Infinity;nodes.forEach(n=>{mX=Math.min(mX,n.x);mY=Math.min(mY,n.y);MX=Math.max(MX,n.x+n.width);MY=Math.max(MY,n.y+n.height);});const p=80,bw=MX-mX+p*2,bh=MY-mY+p*2;vs=Math.max(0.1,Math.min(Math.min(canvas.width/bw,(canvas.height-30)/bh),2));vx=canvas.width/2-(mX+MX)/2*vs;vy=(canvas.height-30)/2-(mY+MY)/2*vs;sR();toast('Fit');}

// ═══ DRAWING ═══
function rR(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
const FB='Inter,SF Pro Display,-apple-system,sans-serif';
const MF={h1:`bold 18px ${FB}`,h2:`bold 16px ${FB}`,h3:`bold 14px ${FB}`,h4:`600 13px ${FB}`,bold:`600 13px ${FB}`,italic:`italic 13px ${FB}`,code:`13px SF Mono,Menlo,Consolas,monospace`,list:`13px ${FB}`,normal:`13px ${FB}`};
const ML={h1:26,h2:23,h3:21,h4:19,bold:19,italic:19,code:19,list:19,normal:19};
function pML(l){const t=l.trim();if(t.startsWith('####'))return{text:t.slice(4).trim(),style:'h4'};if(t.startsWith('###'))return{text:t.slice(3).trim(),style:'h3'};if(t.startsWith('##'))return{text:t.slice(2).trim(),style:'h2'};if(t.startsWith('#'))return{text:t.slice(1).trim(),style:'h1'};if(t.startsWith('**')&&t.endsWith('**')&&t.length>4)return{text:t.slice(2,-2),style:'bold'};if(t.startsWith('*')&&t.endsWith('*')&&t.length>2)return{text:t.slice(1,-1),style:'italic'};if(t.startsWith('`')&&t.endsWith('`')&&t.length>2)return{text:t.slice(1,-1),style:'code'};if(t.startsWith('- ')||t.startsWith('* '))return{text:'  •  '+t.slice(2),style:'list'};if(/^\d+\.\s/.test(t))return{text:'  '+t,style:'list'};return{text:l,style:'normal'};}

function drawNode(n){if(n.isEditing)return;if(n.type==='group'){drawGroup(n);return;}if(n.type==='link'){drawLink(n);return;}if(n.type==='diamond'){drawShape(n,'diamond');return;}if(n.type==='ellipse'){drawShape(n,'ellipse');return;}if(n.type==='hexagon'){drawShape(n,'hexagon');return;}
if(n.isSelected){ctx.shadowColor=C('rgba(0,122,255,0.3)','rgba(0,122,255,0.2)');ctx.shadowBlur=20;}
ctx.fillStyle=n.bg;rR(n.x,n.y,n.width,n.height,n.type==='sticky'?6:12);ctx.fill();ctx.shadowBlur=0;ctx.shadowColor='transparent';
ctx.strokeStyle=n.isSelected?'#007AFF':n.border;ctx.lineWidth=n.isSelected?2:1;rR(n.x,n.y,n.width,n.height,n.type==='sticky'?6:12);ctx.stroke();
if(n.locked){ctx.font=`10px ${FB}`;ctx.fillStyle=C('rgba(255,255,255,0.3)','rgba(0,0,0,0.2)');ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('🔒',n.x+n.width-8,n.y+6);}
switch(n.type){case'sticky':drawSticky(n);break;case'checklist':drawCL(n);break;case'table':drawTbl(n);break;default:drawText(n);}
if(n._ms>0&&n.type!=='checklist')drawSB(n);
if(n.isSelected||(hNode===n&&hCP)||isConn)drawCPs(n);
if(n.isSelected&&!n.locked)drawRH(n);}

function drawText(n){if(n.scrollY===undefined)n.scrollY=0;ctx.save();rR(n.x+2,n.y+2,n.width-4,n.height-4,10);ctx.clip();
const p=12,lines=n.text.split('\n'),fmt=[],lhs=[];
lines.forEach(l=>{if(!l.trim()){fmt.push({text:'',style:'normal'});lhs.push(16);return;}const ls=pML(l);ctx.font=MF[ls.style]||MF.normal;const words=ls.text.split(' ');let cur=words[0]||'';for(let i=1;i<words.length;i++){const t=cur+' '+words[i];ctx.measureText(t).width<n.width-p*2-6?cur=t:(fmt.push({text:cur,style:ls.style}),lhs.push(ML[ls.style]||19),cur=words[i]);}fmt.push({text:cur,style:ls.style});lhs.push(ML[ls.style]||19);});
let tH=p;lhs.forEach(h=>tH+=h);tH+=p;n._ch=tH;n._ms=Math.max(0,tH-n.height);n.scrollY=Math.max(0,Math.min(n.scrollY,n._ms));
let cy=n.y+p-n.scrollY;const hC={h1:'#007AFF',h2:'#007AFF',h3:'#5AC8FA',h4:'#5AC8FA',code:C('#e5c07b','#d4760a')};
fmt.forEach((l,i)=>{const lh=lhs[i];if(cy+lh>=n.y&&cy<=n.y+n.height){ctx.font=MF[l.style]||MF.normal;ctx.fillStyle=hC[l.style]||n.textColor;ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(l.text,n.x+p,cy);}cy+=lh;});ctx.restore();}

function drawSticky(n){const de=20;ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.moveTo(n.x+n.width-de,n.y);ctx.lineTo(n.x+n.width,n.y+de);ctx.lineTo(n.x+n.width-de,n.y+de);ctx.closePath();ctx.fill();
ctx.save();rR(n.x+2,n.y+2,n.width-de-4,n.height-4,4);ctx.clip();const p=10,lh=20;ctx.font=`15px ${FB}`;ctx.fillStyle=n.textColor;ctx.textAlign='left';ctx.textBaseline='top';
const words=n.text.split(' ');let line='',cy=n.y+p;const mW=n.width-de-p*2;
words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>mW&&line){if(cy+lh>n.y+n.height-4){ctx.restore();return;}ctx.fillText(line,n.x+p,cy);cy+=lh;line=w;}else line=t;});
if(cy+lh<=n.y+n.height-4)ctx.fillText(line,n.x+p,cy);ctx.restore();n._ms=0;}

function drawCL(n){if(n.scrollY===undefined)n.scrollY=0;const items=(n.typeData&&n.typeData.items)||[];n._ca=[];
ctx.save();rR(n.x+2,n.y+2,n.width-4,n.height-4,10);ctx.clip();const p=10,rH=24,cS=16,tH=28;
ctx.fillStyle=C('rgba(255,255,255,0.05)','rgba(0,0,0,0.04)');ctx.fillRect(n.x,n.y,n.width,tH);
ctx.font=`600 12px ${FB}`;ctx.fillStyle=n.textColor;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(n.text||'Aufgaben',n.x+p,n.y+tH/2);
const done=items.filter(i=>i.checked).length;ctx.font=`11px ${FB}`;ctx.fillStyle=C('rgba(255,255,255,0.3)','rgba(0,0,0,0.3)');ctx.textAlign='right';ctx.fillText(`${done}/${items.length}`,n.x+n.width-p,n.y+tH/2);
const totH=tH+items.length*rH+p;n._ch=totH;n._ms=Math.max(0,totH-n.height);n.scrollY=Math.max(0,Math.min(n.scrollY||0,n._ms));
let iy=n.y+tH-n.scrollY;
items.forEach((item,idx)=>{const rowY=iy+idx*rH;if(rowY+rH<n.y+tH||rowY>n.y+n.height)return;
const cbX=n.x+p,cbY=rowY+(rH-cS)/2;ctx.beginPath();ctx.arc(cbX+cS/2,cbY+cS/2,cS/2,0,2*Math.PI);ctx.fillStyle=item.checked?'#30D158':'transparent';ctx.fill();ctx.strokeStyle=item.checked?'#30D158':C('rgba(255,255,255,0.2)','rgba(0,0,0,0.2)');ctx.lineWidth=1.5;ctx.stroke();

function expPNG(){
  if(!nodes.length){toast('Leer');return;}
  let mX=Infinity,mY=Infinity,MX=-Infinity,MY=-Infinity;
  nodes.forEach(n=>{
    mX=Math.min(mX,n.x); mY=Math.min(mY,n.y);
    MX=Math.max(MX,n.x+n.width); MY=Math.max(MY,n.y+n.height);
  });
  const pad=60, expW=MX-mX+pad*2, expH=MY-mY+pad*2, expScale=2;

  const _vx=vx,_vy=vy,_vs=vs,_sg=showGrid;
  rafP=true;

  canvas.width  = Math.round(expW * expScale);
  canvas.height = Math.round(expH * expScale);

  ctx.setTransform(1,0,0,1,0,0);

  vx = pad * expScale - mX * expScale;
  vy = pad * expScale - mY * expScale;
  vs = expScale;
  showGrid = false;

  // ── FIX 3: HiDPI-Hintergrund ──────────────────────────────────────────────

function editLink(n){
if(n.locked){toast('Gesperrt');return;}
const url=n.typeData&&n.typeData.url||'https://';
const iconSrc=n.typeData&&n.typeData.icon||'';
const rect=canvas.getBoundingClientRect();
const sx=rect.left+n.x*vs+vx,sy=rect.top+(n.y+n.height)*vs+vy+6;
const wrap=document.createElement('div');
wrap.style.cssText=`position:fixed;left:${Math.max(4,sx-40)}px;top:${sy}px;z-index:9999;background:var(--glass);border:2px solid #007AFF;border-radius:12px;padding:10px;min-width:280px;box-shadow:0 4px 24px rgba(0,0,0,0.4);backdrop-filter:blur(40px);display:flex;flex-direction:column;gap:6px;`;
const mkInp=(val,ph,extra)=>{const i=document.createElement('input');i.value=val;i.placeholder=ph;Object.assign(i.style,{background:'transparent',border:'1px solid var(--glass-border)',borderRadius:'6px',color:'var(--text)',fontSize:'12px',fontFamily:'var(--font)',padding:'6px 10px',outline:'none'});if(extra)Object.assign(i.style,extra);return i;};
const lbl=mkInp(n.text||'','Label…',{fontWeight:'600',fontSize:'13px'});
const urlIn=mkInp(url,'https://…',{color:'var(--accent)'});urlIn.type='url';
const icoIn=mkInp(iconSrc,'Icon-URL (optional)…',{color:'var(--text2)',fontSize:'11px'});
const hint=document.createElement('div');hint.style.cssText='font-size:10px;color:var(--text3);padding:0 2px;';
hint.textContent='Icon: URL zu PNG/SVG, oder leer = automatisches Favicon';
const btns=document.createElement('div');btns.style.cssText='display:flex;gap:6px;justify-content:flex-end;';
const openBtn=document.createElement('button');openBtn.textContent='↗ Öffnen';openBtn.style.cssText=`padding:4px 10px;border-radius:6px;border:1px solid var(--glass-border);background:transparent;color:var(--text2);font-size:11px;font-family:var(--font);cursor:pointer;`;
openBtn.onclick=()=>{const u=urlIn.value;if(u&&u!=='https://')window.open(u,'_blank');};
const saveBtn=document.createElement('button');saveBtn.textContent='Speichern';saveBtn.style.cssText=`padding:4px 10px;border-radius:6px;border:1px solid #007AFF;background:#007AFF;color:#fff;font-size:11px;font-family:var(--font);cursor:pointer;`;
saveBtn.onclick=finish;
btns.appendChild(openBtn);btns.appendChild(saveBtn);
wrap.appendChild(lbl);wrap.appendChild(urlIn);wrap.appendChild(icoIn);wrap.appendChild(hint);wrap.appendChild(btns);
document.body.appendChild(wrap);lbl.focus();lbl.select();
let done=false;
function finish(){if(done)return;done=true;n.text=lbl.value||'Link';if(!n.typeData)n.typeData={};n.typeData.url=urlIn.value;n.typeData.icon=icoIn.value;delete n['_ico_'+n.id];document.body.removeChild(wrap);pH();aS();sR();}
function cancel(){if(done)return;done=true;document.body.removeChild(wrap);sR();}
[lbl,urlIn,icoIn].forEach(inp=>{inp.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault();finish();}if(ev.key==='Escape'){ev.preventDefault();cancel();}ev.stopPropagation();};});
wrap.addEventListener('mousedown',e=>e.stopPropagation());}
