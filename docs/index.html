<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Canvas Pro</title>
<link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
<style>
/* ═══════════════════════════════════════════════════════════════ */
/* 🎨 DESIGN SYSTEM – Google Material 3 Inspired + Apple Fluency    */
/* ═══════════════════════════════════════════════════════════════ */

/* ── CSS Custom Properties (Design Tokens) ── */
:root {
  /* ── Colors: Semantic & System ── */
  --sys-primary: #1a73e8;
  --sys-primary-container: #d0e0fd;
  --sys-on-primary: #ffffff;
  --sys-secondary: #6750a4;
  --sys-tertiary: #7d5260;
  --sys-error: #b3261e;
  --sys-surface: #141414;
  --sys-surface-variant: #2a2a2a;
  --sys-background: #0a0a0a;
  --sys-on-background: #e8eaed;
  --sys-on-surface: #e8eaed;
  --sys-on-surface-variant: #b4b8bd;
  --sys-outline: #444746;
  --sys-outline-variant: #333635;
  
  /* ── Elevation & Shadows (Material 3) ── */
  --elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
  --elevation-2: 0 1px 3px rgba(0,0,0,0.3), 0 4px 8px 3px rgba(0,0,0,0.15);
  --elevation-3: 0 4px 8px 3px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15);
  --elevation-4: 0 6px 12px 4px rgba(0,0,0,0.3), 0 4px 8px 3px rgba(0,0,0,0.15);
  
  /* ── Shape & Radius ── */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  
  /* ── Typography ── */
  --font-sans: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Roboto Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
  --text-display: 57px/64px;
  --text-headline: 32px/40px;
  --text-title: 22px/28px;
  --text-body: 14px/20px;
  --text-label: 12px/16px;
  --text-small: 11px/14px;
  
  /* ── Motion & Timing ── */
  --motion-short: 150ms;
  --motion-standard: 250ms;
  --motion-long: 400ms;
  --easing-standard: cubic-bezier(0.2, 0, 0, 1);
  --easing-emphasized: cubic-bezier(0.3, 0, 0.8, 1);
  
  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  
  /* ── Canvas Specific ── */
  --grid-major: rgba(255,255,255,0.06);
  --grid-minor: rgba(255,255,255,0.03);
  --grid-dot: rgba(255,255,255,0.12);
  --connection-default: rgba(138,180,248,0.6);
  --connection-selected: #8ab4f8;
  --connection-glow: rgba(138,180,248,0.4);
  --handle-default: #8ab4f8;
  --handle-hover: #a0c4ff;
  --selection-ring: rgba(138,180,248,0.5);
  
  /* ── Scrollbar ── */
  --scrollbar-size: 6px;
  --scrollbar-track: rgba(255,255,255,0.06);
  --scrollbar-thumb: rgba(255,255,255,0.24);
  --scrollbar-thumb-hover: rgba(255,255,255,0.36);
}

/* ── Light Theme Overrides ── */
[data-theme="light"] {
  --sys-primary: #1a73e8;
  --sys-primary-container: #d0e0fd;
  --sys-on-primary: #ffffff;
  --sys-surface: #ffffff;
  --sys-surface-variant: #f1f3f4;
  --sys-background: #f8f9fa;
  --sys-on-background: #1f1f1f;
  --sys-on-surface: #1f1f1f;
  --sys-on-surface-variant: #444746;
  --sys-outline: #c4c7c5;
  --sys-outline-variant: #e0e3e2;
  
  --grid-major: rgba(0,0,0,0.08);
  --grid-minor: rgba(0,0,0,0.04);
  --grid-dot: rgba(0,0,0,0.18);
  --connection-default: rgba(26,115,232,0.5);
  --connection-selected: #1a73e8;
  --connection-glow: rgba(26,115,232,0.3);
  --handle-default: #1a73e8;
  --handle-hover: #4285f4;
  --selection-ring: rgba(26,115,232,0.4);
  
  --scrollbar-track: rgba(0,0,0,0.06);
  --scrollbar-thumb: rgba(0,0,0,0.24);
  --scrollbar-thumb-hover: rgba(0,0,0,0.36);
}

/* ── Reset & Base ── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--sys-background);
  color: var(--sys-on-background);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.43;
  user-select: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ── Canvas ── */
#canvas {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  touch-action: none;
  cursor: default;
}

/* ── Toolbar ── */
#toolbar {
  position: fixed;
  top: var(--space-3);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: var(--space-1);
  align-items: center;
  padding: var(--space-2) var(--space-3);
  background: var(--sys-surface);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-xl);
  z-index: 1000;
  box-shadow: var(--elevation-2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.tb-logo {
  font-weight: 600;
  font-size: 13px;
  color: var(--sys-on-surface-variant);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding-right: var(--space-2);
  white-space: nowrap;
}

.tb-logo-icon {
  font-size: 16px;
  color: var(--sys-primary);
}

.tb-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-2) var(--space-3);
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--sys-on-surface-variant);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--motion-short) var(--easing-standard),
              color var(--motion-short) var(--easing-standard),
              transform var(--motion-short) var(--easing-standard);
  white-space: nowrap;
  outline: none;
}

.tb-btn:hover {
  background: var(--sys-surface-variant);
  color: var(--sys-on-surface);
}

.tb-btn:active {
  transform: scale(0.98);
  background: var(--sys-primary-container);
  color: var(--sys-primary);
}

.tb-btn.active {
  background: var(--sys-primary-container);
  color: var(--sys-primary);
}

.tb-btn .lucide {
  width: 16px;
  height: 16px;
  stroke-width: 2;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--sys-outline-variant);
  margin: 0 var(--space-1);
  flex-shrink: 0;
}

/* ── Add Dropdown ── */
#add-dropdown {
  position: absolute;
  top: calc(100% + var(--space-2));
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--sys-surface);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-lg);
  padding: var(--space-2);
  min-width: 220px;
  box-shadow: var(--elevation-3);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: none;
  z-index: 1001;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--motion-short) var(--easing-standard),
              transform var(--motion-short) var(--easing-emphasized);
}

#add-dropdown.open {
  display: block;
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

.dd-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--motion-short) var(--easing-standard);
}

.dd-item:hover {
  background: var(--sys-surface-variant);
}

.dd-item:active {
  background: var(--sys-primary-container);
}

.dd-icon-wrap {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}

.dd-icon-wrap.text { background: rgba(26,115,232,0.12); color: #1a73e8; }
.dd-icon-wrap.sticky { background: rgba(251,191,36,0.12); color: #f9a825; }
.dd-icon-wrap.checklist { background: rgba(52,168,83,0.12); color: #34a853; }
.dd-icon-wrap.group { background: rgba(156,39,176,0.12); color: #9c27b0; }

.dd-content {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dd-title {
  font-weight: 500;
  font-size: 13px;
  color: var(--sys-on-surface);
}

.dd-desc {
  font-size: 11px;
  color: var(--sys-on-surface-variant);
}

/* ── Statusbar ── */
#statusbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 32px;
  background: var(--sys-surface);
  border-top: 1px solid var(--sys-outline-variant);
  display: flex;
  align-items: center;
  padding: 0 var(--space-4);
  gap: var(--space-4);
  z-index: 1000;
  font-size: 11px;
  color: var(--sys-on-surface-variant);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#statusbar strong {
  color: var(--sys-on-surface);
  font-weight: 600;
}

#zoom-display {
  margin-left: auto;
  cursor: pointer;
  padding: 2px var(--space-2);
  border-radius: var(--radius-xs);
  transition: background var(--motion-short) var(--easing-standard);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

#zoom-display:hover {
  background: var(--sys-surface-variant);
  color: var(--sys-on-surface);
}

.sb-hint {
  display: flex;
  gap: var(--space-3);
  align-items: center;
}

.sb-hint kbd {
  background: var(--sys-surface-variant);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-xs);
  padding: 1px 6px;
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--sys-on-surface);
}

/* ── Context Menu ── */
#ctx-menu {
  position: fixed;
  z-index: 2000;
  display: none;
  background: var(--sys-surface);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-lg);
  padding: var(--space-2);
  min-width: 200px;
  box-shadow: var(--elevation-3);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  animation: menuEnter var(--motion-short) var(--easing-emphasized);
}

@keyframes menuEnter {
  from { opacity: 0; transform: scale(0.98) translateY(-4px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.ctx-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--sys-on-surface);
  cursor: pointer;
  transition: background var(--motion-short) var(--easing-standard);
}

.ctx-item:hover {
  background: var(--sys-surface-variant);
}

.ctx-item:active {
  background: var(--sys-primary-container);
  color: var(--sys-primary);
}

.ctx-item.danger {
  color: var(--sys-error);
}

.ctx-item.danger:hover {
  background: rgba(179,38,30,0.12);
}

.ctx-item .lucide {
  width: 16px;
  height: 16px;
  stroke-width: 2;
  flex-shrink: 0;
  color: var(--sys-on-surface-variant);
}

.ctx-item.danger .lucide {
  color: var(--sys-error);
}

.ctx-sep {
  height: 1px;
  background: var(--sys-outline-variant);
  margin: var(--space-1) 0;
}

.ctx-label {
  padding: var(--space-1) var(--space-3) var(--space-1);
  font-size: 10px;
  font-weight: 600;
  color: var(--sys-on-surface-variant);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Color & Type Pickers */
.color-row, .type-row {
  display: flex;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  flex-wrap: wrap;
}

.color-dot {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-full);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform var(--motion-short) var(--easing-standard),
              border-color var(--motion-short) var(--easing-standard),
              box-shadow var(--motion-short) var(--easing-standard);
  box-shadow: var(--elevation-1);
}

.color-dot:hover {
  transform: scale(1.15);
  border-color: var(--sys-on-surface);
  box-shadow: var(--elevation-2);
}

.type-dot {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sys-surface-variant);
  border: 2px solid transparent;
  transition: var(--motion-short) var(--easing-standard);
}

.type-dot:hover {
  background: var(--sys-primary-container);
  border-color: var(--sys-primary);
}

.type-dot.active {
  background: var(--sys-primary-container);
  border-color: var(--sys-primary);
  transform: scale(1.05);
}

/* ── Toast Notifications ── */
#toast {
  position: fixed;
  bottom: calc(32px + var(--space-3));
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--sys-surface);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-lg);
  padding: var(--space-2) var(--space-4);
  font-size: 13px;
  font-weight: 500;
  color: var(--sys-on-surface);
  z-index: 3000;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--motion-standard) var(--easing-emphasized),
              transform var(--motion-standard) var(--easing-emphasized);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--elevation-3);
  max-width: 90vw;
  white-space: nowrap;
  text-align: center;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#toast.success { border-left: 3px solid #34a853; }
#toast.error { border-left: 3px solid var(--sys-error); }
#toast.info { border-left: 3px solid var(--sys-primary); }

/* ── Checklist Editor ── */
#cl-editor {
  position: fixed;
  z-index: 2500;
  display: none;
  background: var(--sys-surface);
  border: 1px solid var(--sys-outline-variant);
  border-radius: var(--radius-xl);
  padding: 0;
  min-width: 320px;
  max-width: 480px;
  max-height: 80vh;
  box-shadow: var(--elevation-4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
  animation: panelEnter var(--motion-standard) var(--easing-emphasized);
}

@keyframes panelEnter {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

#cl-editor-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--sys-outline-variant);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}

#cl-editor-title {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-weight: 600;
  font-size: 14px;
  color: var(--sys-on-surface);
}

#cl-editor-title .lucide {
  width: 18px;
  height: 18px;
  color: #34a853;
}

#cl-close {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  border: none;
  background: var(--sys-surface-variant);
  color: var(--sys-on-surface-variant);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--motion-short) var(--easing-standard);
}

#cl-close:hover {
  background: var(--sys-error);
  color: white;
}

#cl-title-input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: none;
  border-bottom: 1px solid var(--sys-outline-variant);
  background: transparent;
  color: var(--sys-on-surface);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  outline: none;
}

#cl-title-input::placeholder {
  color: var(--sys-on-surface-variant);
  font-weight: 400;
}

#cl-progress {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-4);
}

#cl-progress-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--sys-surface-variant);
  border-radius: var(--radius-full);
  overflow: hidden;
}

#cl-progress-bar {
  height: 100%;
  background: #34a853;
  border-radius: var(--radius-full);
  transition: width var(--motion-standard) var(--easing-emphasized);
}

#cl-progress-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--sys-on-surface-variant);
  font-variant-numeric: tabular-nums;
  min-width: 40px;
  text-align: right;
}

#cl-items-list {
  max-height: 280px;
  overflow-y: auto;
  padding: var(--space-2);
}

#cl-items-list::-webkit-scrollbar {
  width: var(--scrollbar-size);
}

#cl-items-list::-webkit-scrollbar-track {
  background: transparent;
}

#cl-items-list::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: var(--radius-full);
}

#cl-items-list::-webkit-scrollbar-thumb:hover {
  background: var(--scrollbar-thumb-hover);
}

.cl-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  transition: background var(--motion-short) var(--easing-standard);
}

.cl-row:hover {
  background: var(--sys-surface-variant);
}

.cl-check {
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--sys-outline);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--motion-short) var(--easing-standard);
}

.cl-check:hover {
  border-color: var(--sys-primary);
}

.cl-check.done {
  background: #34a853;
  border-color: #34a853;
}

.cl-check.done::after {
  content: '';
  width: 10px;
  height: 5px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px);
}

.cl-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--sys-on-surface);
  font-size: 13px;
  font-family: var(--font-sans);
  padding: 2px 0;
}

.cl-input::placeholder {
  color: var(--sys-on-surface-variant);
}

.cl-input.done-text {
  color: var(--sys-on-surface-variant);
  text-decoration: line-through;
  opacity: 0.7;
}

.cl-del {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--sys-on-surface-variant);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: var(--motion-short) var(--easing-standard);
}

.cl-row:hover .cl-del {
  opacity: 1;
}

.cl-del:hover {
  background: rgba(179,38,30,0.12);
  color: var(--sys-error);
}

#cl-add-btn {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: none;
  border: none;
  border-top: 1px solid var(--sys-outline-variant);
  color: var(--sys-primary);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  transition: background var(--motion-short) var(--easing-standard);
}

#cl-add-btn:hover {
  background: var(--sys-primary-container);
}

#cl-footer {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--sys-outline-variant);
  display: flex;
  gap: var(--space-2);
  justify-content: flex-end;
}

#cl-footer button {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  border: none;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: var(--motion-short) var(--easing-standard);
}

}

  to { opacity: 1; transform: scale(1) translateY(0); }

#spotlight-results {

.sp-item {

  gap: var(--space-3);
  padding: var(--space-3);

.sp-item:hover,

.sp-item-icon {

.sp-item-text {

.sp-item-title {

.sp-item-sub {

.sp-item-type {

/* ── Utility Classes ── */
.hidden { display: none !important; }
.sr-only {

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {

/* ── High Contrast Mode ── */
@media (prefers-contrast: high) {

'use strict';

// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────

// ✅ roundRect Polyfill (kritisch für Safari < 16.4)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ✅ Debounce für Performance
function debounce(fn, delay) {
  let timeout;
  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn.apply(this, args), delay);
  };
}

// ✅ Throttle für RAF
function throttleRAF(fn) {
  let pending = false;
  return (...args) => {
    if (!pending) {
      pending = true;
      requestAnimationFrame(() => {
        fn.apply(this, args);
        pending = false;
      });
    }
  };
}

// ✅ Safe JSON Parse mit Fallback
function safeJSONParse(str, fallback = null) {
  try {
    return JSON.parse(str);
  } catch (e) {
    console.warn('JSON parse error:', e);
    return fallback;
  }
}

// ✅ Element-Finder mit Error-Handling
function $(selector, parent = document) {
  const el = parent.querySelector(selector);
  if (!el) console.warn(`Element nicht gefunden: ${selector}`);
  return el;
}

// ─────────────────────────────────────────────────────────────
// 🎨 THEME SYSTEM – Dynamisch & Persistent
// ─────────────────────────────────────────────────────────────

const Theme = {
  current: localStorage.getItem('ic_theme') || 
    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'),
  
  init() {
    this.apply(this.current);
    this.bindEvents();
  },
  
  apply(theme) {
    this.current = theme;
    document.documentElement.setAttribute('data-theme', theme);
    const btn = $('#btn-theme');
    if (btn) {
      btn.textContent = theme === 'dark' ? '☀' : '☾';
      btn.setAttribute('aria-label', `Theme umschalten (${theme === 'dark' ? 'Hell' : 'Dunkel'})`);
    }
    localStorage.setItem('ic_theme', theme);
    // Trigger re-render if app is loaded
    if (typeof scheduleRender === 'function') scheduleRender();
  },
  
  toggle() {
    this.apply(this.current === 'dark' ? 'light' : 'dark');
  },
  
  // ✅ Dynamische Color-Helper (wichtig für Theme-Wechsel)
  color(dark, light) {
    return this.current === 'dark' ? dark : light;
  },
  
  bindEvents() {
    const btn = $('#btn-theme');
    if (btn) {
      btn.addEventListener('click', () => this.toggle());
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.toggle();
        }
      });
    }
    
    // System theme change listener
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('ic_theme')) {
        this.apply(e.matches ? 'light' : 'dark');
      }
    });
  }
};

  rzNode: null,
  rzHandle: null,
  rzSX: 0, rzSY: 0, rzSW: 0, rzSH: 0, rzNX: 0, rzNY: 0,
  
  // Scrollbar State
  sbNode: null,
  sbDragOffset: 0,
  
  // Clipboard & Settings
  clipboard: [],
  snapEnabled: false,
  
  // History
  history: [],
  historyIdx: -1,
  suppressHistory: false,
  
  // Rendering
  rafPending: false,
  
  // Editor State
  clNode: null,
  
  // Touch Support
  touchStartDist: 0,
  touchStartZoom: 1,
  
  reset() {
    this.nodes = [];
    this.connections = [];
    this.nodeCounter = 0;
    this.clearSelection();
    this.vx = this.vy = 0;
    this.vs = 1;
    this.resetInteraction();
    this.history = [];
    this.historyIdx = -1;
    this.clipboard = [];
  },
  
  resetInteraction() {
    this.isDragging = false;
    this.isPanning = false;
    this.isNodeDrag = false;
    this.isConnecting = false;
    this.isSelecting = false;
    this.isResizing = false;
    this.isScrollDrag = false;
    this.dragNode = null;
    this.connStart = null;
    this.connStartPt = null;
    this.selRect = null;
    this.hoverNode = null;
    this.hoverConnPt = null;
    this.rzNode = null;
    this.rzHandle = null;
    this.sbNode = null;
  },
  
  clearSelection() {
    this.nodes.forEach(n => n.isSelected = false);
    this.selectedNodes = [];
    this.selectedConn = null;
  },
  
  selectNode(node) {
    this.clearSelection();
    node.isSelected = true;
    this.selectedNodes = [node];
  },
  
  addSelection(node) {
    if (!node.isSelected) {
      node.isSelected = true;
      this.selectedNodes.push(node);
    }
  },
  
  toggleSelection(node) {
    if (node.isSelected) {
      node.isSelected = false;
      this.selectedNodes = this.selectedNodes.filter(n => n !== node);
    } else {
      this.addSelection(node);
    }
  }
};

// ─────────────────────────────────────────────────────────────
// 🎨 RENDERING ENGINE
// ─────────────────────────────────────────────────────────────

const Canvas = {
  element: null,
  ctx: null,
  
  init() {
    this.element = $('#canvas');
    if (!this.element) {
      console.error('Canvas element not found');
      return false;
    }
    this.ctx = this.element.getContext('2d');
    if (!this.ctx) {
      console.error('Could not get 2D context');
      return false;
    }
    this.resize();
    return true;
  },
  
  resize() {
    if (!this.element) return;
    this.element.width = window.innerWidth;
    this.element.height = window.innerHeight;
    scheduleRender();
  },
  
  // ✅ Screen to Canvas coordinates
  s2c(sx, sy) {
    return {
      x: (sx - State.vx) / State.vs,
      y: (sy - State.vy) / State.vs
    };
  },
  
  // ✅ Canvas to Screen coordinates
  c2s(cx, cy) {
    return {
      x: cx * State.vs + State.vx,
      y: cy * State.vs + State.vy
    };
  },
  
  // ✅ Snap to grid if enabled
  snap(v) {
    return State.snapEnabled ? Math.round(v / CONFIG.SNAP_SIZE) * CONFIG.SNAP_SIZE : v;
  }
};

// ✅ Throttled render scheduler
const scheduleRender = throttleRAF(() => {
  if (!Canvas.ctx) return;
  render();
});

// ✅ Main render function
function render() {
  const { ctx } = Canvas;
  if (!ctx) return;
  
  ctx.clearRect(0, 0, Canvas.element.width, Canvas.element.height);
  ctx.save();
  ctx.translate(State.vx, State.vy);
  ctx.scale(State.vs, State.vs);
  
  drawGrid();
  
  // Draw groups first (background)
  State.nodes.filter(n => n.type === 'group').forEach(drawNode);
  
  // Draw connections
  State.connections.forEach(c => {
    const isSelected = State.selectedConn && State.selectedConn.id === c.id;
    drawConnection(c, isSelected);
  });
  
  // Draw other nodes
  State.nodes.filter(n => n.type !== 'group').forEach(drawNode);
  
  // Draw temporary connection line
  if (State.isConnecting && State.connStart) {
    drawTempConnection();
  }
  
  // Draw selection rectangle
  if (State.isSelecting && State.selRect) {
    drawSelectionRect();
  }
  
  ctx.restore();
  updateStatusBar();
}

// ✅ Grid drawing with culling for performance
function drawGrid() {
  const { ctx } = Canvas;
  const sx = -State.vx / State.vs;
  const sy = -State.vy / State.vs;
  const ex = sx + Canvas.element.width / State.vs;
  const ey = sy + Canvas.element.height / State.vs;
  
  // Minor grid
  ctx.strokeStyle = Theme.color('rgba(255,255,255,0.03)', 'rgba(0,0,0,0.04)');
  ctx.lineWidth = 1 / State.vs;
  ctx.beginPath();
  for (let x = Math.floor(sx / (CONFIG.GRID_SIZE / 5)) * (CONFIG.GRID_SIZE / 5); x <= ex; x += CONFIG.GRID_SIZE / 5) {
    ctx.moveTo(x, sy);
    ctx.lineTo(x, ey);
  }
  for (let y = Math.floor(sy / (CONFIG.GRID_SIZE / 5)) * (CONFIG.GRID_SIZE / 5); y <= ey; y += CONFIG.GRID_SIZE / 5) {
    ctx.moveTo(sx, y);
    ctx.lineTo(ex, y);
  }
  ctx.stroke();
  
  // Major grid
  ctx.strokeStyle = Theme.color('rgba(255,255,255,0.06)', 'rgba(0,0,0,0.08)');
  ctx.beginPath();
  for (let x = Math.floor(sx / CONFIG.GRID_SIZE) * CONFIG.GRID_SIZE; x <= ex; x += CONFIG.GRID_SIZE) {
    ctx.moveTo(x, sy);
    ctx.lineTo(x, ey);
  }
  for (let y = Math.floor(sy / CONFIG.GRID_SIZE) * CONFIG.GRID_SIZE; y <= ey; y += CONFIG.GRID_SIZE) {
    ctx.moveTo(sx, y);
    ctx.lineTo(ex, y);
  }
  ctx.stroke();
  
  // Snap dots
  if (State.snapEnabled) {
    ctx.fillStyle = Theme.color('rgba(26,115,232,0.2)', 'rgba(26,115,232,0.12)');
    for (let x = Math.floor(sx / CONFIG.SNAP_SIZE) * CONFIG.SNAP_SIZE; x <= ex; x += CONFIG.SNAP_SIZE) {
      for (let y = Math.floor(sy / CONFIG.SNAP_SIZE) * CONFIG.SNAP_SIZE; y <= ey; y += CONFIG.SNAP_SIZE) {
        ctx.beginPath();
        ctx.arc(x, y, 1.5 / State.vs, 0, 2 * Math.PI);
        ctx.fill();
      }
    }
  }
}

// ✅ Node drawing with culling
function drawNode(n) {
  // Culling: skip if completely off-screen
  const { width: cw, height: ch } = Canvas.element;
  const screenX = n.x * State.vs + State.vx;
  const screenY = n.y * State.vs + State.vy;
  const screenW = n.width * State.vs;
  const screenH = n.height * State.vs;
  
  if (screenX + screenW < 0 || screenX > cw || screenY + screenH < 0 || screenY > ch) {
    return;
  }
  
  if (n.isEditing) return;
  if (n.type === 'group') {
    drawGroupNode(n);
    return;
  }
  
  // Apple-style shadow for selected
  if (n.isSelected) {
    ctx.shadowColor = Theme.color('rgba(138,180,248,0.4)', 'rgba(26,115,232,0.3)');
    ctx.shadowBlur = 20 / State.vs;
    ctx.shadowOffsetY = 2 / State.vs;
  } else {
    ctx.shadowColor = Theme.color('rgba(0,0,0,0.4)', 'rgba(0,0,0,0.1)');
    ctx.shadowBlur = 10 / State.vs;
    ctx.shadowOffsetY = 4 / State.vs;
  }
  
  // Background
  ctx.fillStyle = n.bg;
  roundRectPath(n.x, n.y, n.width, n.height, n.type === 'sticky' ? 10 : 14);
  ctx.fill();
  
  // Reset shadow
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.shadowColor = 'transparent';
  
  // Border
  ctx.strokeStyle = n.isSelected ? '#1a73e8' : n.border;
  ctx.lineWidth = n.isSelected ? 2 / State.vs : 1 / State.vs;
  roundRectPath(n.x, n.y, n.width, n.height, n.type === 'sticky' ? 10 : 14);
  ctx.stroke();
  
  // Subtle inner highlight (vibrancy effect)
  if (!n.isSelected) {
    const grad = ctx.createLinearGradient(n.x, n.y, n.x, n.y + Math.min(40, n.height));
    grad.addColorStop(0, Theme.color('rgba(255,255,255,0.06)', 'rgba(255,255,255,0.7)'));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    roundRectPath(n.x, n.y, n.width, n.height, n.type === 'sticky' ? 10 : 14);
    ctx.fill();
  }
  
  // Content based on type
  switch (n.type) {
    case 'sticky':
      drawStickyContent(n);
      break;
    case 'checklist':
      drawChecklistContent(n);
      break;
    default:
      drawTextContent(n);
  }
  
  // Scrollbar if needed
  if (n._maxScroll > 0 && n.type !== 'checklist') {
    drawScrollbar(n);
  }
  
  // Connection points
  if (n.isSelected || (State.hoverNode === n && State.hoverConnPt) || State.isConnecting) {
    drawConnPts(n);
  }
  
  // Resize handles
  if (n.isSelected) {
    drawRzHandles(n);
  }
}

// ✅ Helper: rounded rect path
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

// ✅ Text Node Content with Markdown
function drawTextContent(n) {
  if (n.scrollY === undefined) n.scrollY = 0;
  
  ctx.save();
  roundRectPath(n.x + 2, n.y + 2, n.width - 4, n.height - 4, 12);
  ctx.clip();
  
  const pad = 14;
  const lines = (n.text || '').split('\n');
  const formatted = [];
  const lineHeights = [];
  
  // Parse markdown
  lines.forEach(line => {
    if (!line.trim()) {
      formatted.push({ text: '', style: 'normal' });
      lineHeights.push(16);
      return;
    }
    const parsed = parseMdLine(line);
    ctx.font = getMdFont(parsed.style);
    
    // Word wrap
    const words = parsed.text.split(' ');
    let current = words[0] || '';
    for (let i = 1; i < words.length; i++) {
      const test = current + ' ' + words[i];
      if (ctx.measureText(test).width < n.width - pad * 2 - 6) {
        current = test;
      } else {
        formatted.push({ text: current, style: parsed.style });
        lineHeights.push(getMdLineHeight(parsed.style));
        current = words[i];
      }
    }
    formatted.push({ text: current, style: parsed.style });
    lineHeights.push(getMdLineHeight(parsed.style));
  });
  
  // Calculate total height for scrolling
  let totalH = pad;
  lineHeights.forEach(h => totalH += h);
  totalH += pad;
  
  n._contentHeight = totalH;
  n._maxScroll = Math.max(0, totalH - n.height);
  n.scrollY = Math.max(0, Math.min(n.scrollY, n._maxScroll));
  
  // Draw lines
  let cy = n.y + pad - n.scrollY;
  formatted.forEach((line, i) => {
    const lh = lineHeights[i];
    if (cy + lh >= n.y && cy <= n.y + n.height) {
      ctx.font = getMdFont(line.style);
      ctx.fillStyle = getMdColor(line.style, n.textColor);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(line.text, n.x + pad, cy);
    }
    cy += lh;
  });
  
  ctx.restore();
}

// ✅ Sticky Note Content
function drawStickyContent(n) {
  const de = 22; // Dog ear size
  
  // Dog ear shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.moveTo(n.x + n.width - de, n.y);
  ctx.lineTo(n.x + n.width, n.y + de);
  ctx.lineTo(n.x + n.width - de, n.y + de);
  ctx.closePath();
  ctx.fill();
  
  // Dog ear fold
  ctx.fillStyle = Theme.color('rgba(0,0,0,0.2)', 'rgba(0,0,0,0.08)');
  ctx.beginPath();
  ctx.moveTo(n.x + n.width - de, n.y);
  ctx.lineTo(n.x + n.width, n.y + de);
  ctx.lineTo(n.x + n.width - de, n.y + de);
  ctx.closePath();
  ctx.fill();
  
  ctx.strokeStyle = Theme.color('rgba(0,0,0,0.2)', 'rgba(0,0,0,0.12)');
  ctx.lineWidth = 1 / State.vs;
  ctx.beginPath();
  ctx.moveTo(n.x + n.width - de, n.y);
  ctx.lineTo(n.x + n.width - de, n.y + de);
  ctx.lineTo(n.x + n.width, n.y + de);
  ctx.stroke();
  
  // Text content
  ctx.save();
  roundRectPath(n.x + 2, n.y + 2, n.width - de - 4, n.height - 4, 8);
  ctx.clip();
  
  const pad = 12;
  const lh = 21;
  ctx.font = `15px var(--font-sans)`;
  ctx.fillStyle = n.textColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  
  const words = (n.text || '').split(' ');
  let line = '';
  let cy = n.y + pad;
  const maxW = n.width - de - pad * 2;
  
  words.forEach(w => {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      if (cy + lh > n.y + n.height - 4) {
        ctx.restore();
        return;
      }
      ctx.fillText(line, n.x + pad, cy);
      cy += lh;
      line = w;
    } else {
      line = test;
    }
  });
  
  if (cy + lh <= n.y + n.height - 4) {
    ctx.fillText(line, n.x + pad, cy);
  }
  
  ctx.restore();
  n._maxScroll = 0;
}

// ✅ Checklist / To-Do Content
function drawChecklistContent(n) {
  if (n.scrollY === undefined) n.scrollY = 0;
  const items = (n.typeData?.items) || [];
  n._checkHitAreas = [];
  
  ctx.save();
  roundRectPath(n.x + 2, n.y + 2, n.width - 4, n.height - 4, 12);
  ctx.clip();
  
  const pad = 12;
  const rowH = 24;
  const checkR = 9;
  const titleH = 36;
  
  // Title bar
  ctx.fillStyle = Theme.color('rgba(52,168,83,0.10)', 'rgba(52,168,83,0.08)');
  roundRectPath(n.x, n.y, n.width, titleH, 12);
  ctx.fill();
  
  // Title text
  ctx.font = `600 13px var(--font-sans)`;
  ctx.fillStyle = n.textColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.text || 'To-Do', n.x + pad, n.y + titleH / 2);
  
  // Progress
  const done = items.filter(it => it.checked).length;
  const pct = items.length ? done / items.length : 0;
  
  ctx.font = `600 11px var(--font-sans)`;
  ctx.fillStyle = Theme.color('rgba(52,168,83,0.7)', 'rgba(52,168,83,0.8)');
  ctx.textAlign = 'right';
  ctx.fillText(`${done}/${items.length}`, n.x + n.width - pad, n.y + titleH / 2);
  
  // Mini progress bar
  const barW = 40;
  const barH = 3;
  const barX = n.x + n.width - pad - barW - 30;
  const barY = n.y + titleH / 2 + 7;
  
  ctx.fillStyle = Theme.color('rgba(255,255,255,0.1)', 'rgba(0,0,0,0.08)');
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 2);
  ctx.fill();
  
  if (pct > 0) {
    ctx.fillStyle = '#34a853';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * pct, barH, 2);
    ctx.fill();
  }
  
  // Items
  const totalH = titleH + items.length * rowH + pad;
  n._contentHeight = totalH;
  n._maxScroll = Math.max(0, totalH - n.height);
  n.scrollY = Math.max(0, Math.min(n.scrollY || 0, n._maxScroll));
  
  let iy = n.y + titleH - n.scrollY;
  
  items.forEach((item, idx) => {
    const rowY = iy + idx * rowH;
    if (rowY + rowH < n.y + titleH || rowY > n.y + n.height) return;
    
    const cbX = n.x + pad + checkR;
    const cbY = rowY + (rowH / 2);
    
    // Checkbox
    ctx.beginPath();
    ctx.arc(cbX, cbY, checkR, 0, 2 * Math.PI);
    
    if (item.checked) {
      ctx.fillStyle = '#34a853';
      ctx.fill();
      
      // Checkmark
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2 / State.vs;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cbX - 4, cbY);
      ctx.lineTo(cbX - 1, cbY + 4);
      ctx.lineTo(cbX + 5, cbY - 4);
      ctx.stroke();
    } else {
      ctx.strokeStyle = Theme.color('rgba(255,255,255,0.2)', 'rgba(0,0,0,0.15)');
      ctx.lineWidth = 1.5 / State.vs;
      ctx.stroke();
    }
    
    // Hit area for interaction
    n._checkHitAreas.push({
      idx,
      x1: cbX - checkR - 3,
      x2: cbX + checkR + 3,
      y1: rowY,
      y2: rowY + rowH
    });
    
    // Text
    ctx.font = `${item.checked ? 'italic ' : ''}12px var(--font-sans)`;
    ctx.fillStyle = item.checked 
      ? Theme.color('rgba(255,255,255,0.25)', 'rgba(0,0,0,0.22)')
      : n.textColor;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.text || '', n.x + pad + checkR * 2 + 8, rowY + rowH / 2);
    
    // Strikethrough for completed
    if (item.checked) {
      const tw = ctx.measureText(item.text || '').width;
      ctx.strokeStyle = Theme.color('rgba(255,255,255,0.22)', 'rgba(0,0,0,0.2)');
      ctx.lineWidth = 1 / State.vs;
      ctx.beginPath();
      const tx = n.x + pad + checkR * 2 + 8;
      ctx.moveTo(tx, rowY + rowH / 2 + 1);
      ctx.lineTo(tx + tw, rowY + rowH / 2 + 1);
      ctx.stroke();
    }
  });
  
  ctx.restore();
  
  if (n._maxScroll > 0) {
    drawScrollbar(n);
  }
}

// ✅ Group Node
function drawGroupNode(n) {
  if (n.isEditing) return;
  
  ctx.fillStyle = n.bg;
  roundRectPath(n.x, n.y, n.width, n.height, 18);
  ctx.fill();
  
  ctx.strokeStyle = n.isSelected ? '#1a73e8' : n.border;
  ctx.lineWidth = n.isSelected ? 2 / State.vs : 1.5 / State.vs;
  ctx.setLineDash([7 / State.vs, 5 / State.vs]);
  roundRectPath(n.x, n.y, n.width, n.height, 18);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Label
  ctx.font = `600 12px var(--font-sans)`;
  ctx.fillStyle = n.isSelected ? '#1a73e8' : n.textColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('▣  ' + (n.text || 'Bereich'), n.x + 14, n.y + 12);
  
  n._maxScroll = 0;
  
  if (n.isSelected || (State.hoverNode === n && State.hoverConnPt) || State.isConnecting) {
    drawConnPts(n);
  }
  if (n.isSelected) {
    drawRzHandles(n);
  }
}

// ✅ Scrollbar
function drawScrollbar(n) {
  const sw = 4 / State.vs;
  const sx = n.x + n.width - sw - 3 / State.vs;
  const sy = n.y + 6 / State.vs;
  const sh = n.height - 12 / State.vs;
  
  // Track
  ctx.fillStyle = Theme.color('rgba(255,255,255,0.04)', 'rgba(0,0,0,0.04)');
  ctx.beginPath();
  ctx.roundRect(sx, sy, sw, sh, 3 / State.vs);
  ctx.fill();
  
  // Thumb
  const ratio = Math.min(1, n.height / n._contentHeight);
  const th = Math.max(20 / State.vs, sh * ratio);
  const maxT = sh - th;
  const ty = sy + (maxT > 0 ? (n.scrollY / n._maxScroll) * maxT : 0);
  
  ctx.fillStyle = n.isSelected 
    ? 'rgba(138,180,248,0.55)' 
    : Theme.color('rgba(255,255,255,0.22)', 'rgba(0,0,0,0.18)');
  ctx.beginPath();
  ctx.roundRect(sx, ty, sw, th, 3 / State.vs);
  ctx.fill();
  
  // Store bounds for hit testing
  n._scrollbarBounds = { x: sx, y: sy, w: sw, h: sh, thumbY: ty, thumbH: th };
}

// ✅ Resize Handles
function drawRzHandles(n) {
  const s = 8 / State.vs;
  const defs = [
    { dx: 0, dy: 0, type: 'nw', cursor: 'nw-resize' },
    { dx: n.width, dy: 0, type: 'ne', cursor: 'ne-resize' },
    { dx: 0, dy: n.height, type: 'sw', cursor: 'sw-resize' },
    { dx: n.width, dy: n.height, type: 'se', cursor: 'se-resize' },
    { dx: n.width / 2, dy: 0, type: 'n', cursor: 'n-resize' },
    { dx: n.width / 2, dy: n.height, type: 's', cursor: 's-resize' },
    { dx: 0, dy: n.height / 2, type: 'w', cursor: 'w-resize' },
    { dx: n.width, dy: n.height / 2, type: 'e', cursor: 'e-resize' },
  ];
  
  n._resizeHandles = defs.map(d => ({
    x: n.x + d.dx - s / 2,
    y: n.y + d.dy - s / 2,
    w: s,
    h: s,
    type: d.type,
    cursor: d.cursor
  }));
  
  defs.forEach(d => {
    const hx = n.x + d.dx - s / 2;
    const hy = n.y + d.dy - s / 2;
    
    ctx.fillStyle = '#1a73e8';
    ctx.beginPath();
    ctx.roundRect(hx, hy, s, s, 2 / State.vs);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1 / State.vs;
    ctx.strokeRect(hx, hy, s, s);
  });
}

// ✅ Connection Points
function drawConnPts(n) {
  connPts(n).forEach(p => {
    const hov = State.hoverConnPt && State.hoverConnPt.side === p.side && State.hoverNode === n;
    const r = (hov ? 11 : 7) / State.vs;
    
    ctx.shadowColor = 'rgba(138,180,248,0.5)';
    ctx.shadowBlur = (hov ? 16 : 8) / State.vs;
    ctx.fillStyle = hov ? '#1a73e8' : 'rgba(138,180,248,0.8)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, hov ? 4.5 / State.vs : 3 / State.vs, 0, 2 * Math.PI);
    ctx.fill();
  });
  ctx.shadowColor = 'transparent';
}

// ✅ Connection Drawing
function drawConnection(c, isSelected) {
  const fn = State.nodes.find(n => n.id === c.from);
  const tn = State.nodes.find(n => n.id === c.to);
  if (!fn || !tn) return;
  
  const fp = connPts(fn).find(p => p.side === c.fromSide) || connPts(fn)[1];
  const tp = connPts(tn).find(p => p.side === c.toSide) || connPts(tn)[3];
  
  const dist = Math.max(60, Math.hypot(tp.x - fp.x, tp.y - fp.y) * 0.45);
  const fc = sideOff(fp, c.fromSide, dist);
  const tc2 = sideOff(tp, c.toSide, dist);
  
  // Glow for selected
  if (isSelected) {
    ctx.shadowColor = 'rgba(138,180,248,0.4)';
    ctx.shadowBlur = 12 / State.vs;
  }
  
  ctx.strokeStyle = isSelected ? '#1a73e8' : Theme.color('rgba(138,180,248,0.6)', 'rgba(26,115,232,0.5)');
  ctx.lineWidth = isSelected ? 2.5 / State.vs : 1.8 / State.vs;
  ctx.setLineDash(isSelected ? [6 / State.vs, 4 / State.vs] : []);
  ctx.lineCap = 'round';
  
  ctx.beginPath();
  ctx.moveTo(fp.x, fp.y);
  ctx.bezierCurveTo(fc.x, fc.y, tc2.x, tc2.y, tp.x, tp.y);
  ctx.stroke();
  
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
  
  // Arrow
  const ang = Math.atan2(tp.y - tc2.y, tp.x - tc2.x);
  const al = 13 / State.vs;
  const aa = Math.PI / 5.5;
  
  ctx.fillStyle = isSelected ? '#1a73e8' : Theme.color('rgba(138,180,248,0.7)', 'rgba(26,115,232,0.55)');
  ctx.beginPath();
  ctx.moveTo(tp.x, tp.y);
  ctx.lineTo(tp.x - al * Math.cos(ang - aa), tp.y - al * Math.sin(ang - aa));
  ctx.lineTo(tp.x - al * 0.45 * Math.cos(ang), tp.y - al * 0.45 * Math.sin(ang));
  ctx.lineTo(tp.x - al * Math.cos(ang + aa), tp.y - al * Math.sin(ang + aa));
  ctx.closePath();
  ctx.fill();
}

// ✅ Helper: side offset for bezier curves
function sideOff(pt, side, d) {
  switch (side) {
    case 'right': return { x: pt.x + d, y: pt.y };
    case 'left': return { x: pt.x - d, y: pt.y };
    case 'bottom': return { x: pt.x, y: pt.y + d };
    case 'top': return { x: pt.x, y: pt.y - d };
    default: return { x: pt.x + d, y: pt.y };
  }
}

// ✅ Connection points for a node
function connPts(n) {
  return [
    { x: n.x + n.width / 2, y: n.y, side: 'top' },
    { x: n.x + n.width, y: n.y + n.height / 2, side: 'right' },
    { x: n.x + n.width / 2, y: n.y + n.height, side: 'bottom' },
    { x: n.x, y: n.y + n.height / 2, side: 'left' }
  ];
}

// ✅ Temporary connection line during drag
function drawTempConnection() {
  const cp = State.connStartPt || {
    x: State.connStart.x + State.connStart.width / 2,
    y: State.connStart.y + State.connStart.height / 2
  };
  const mx = (State.lastMX - State.vx) / State.vs;
  const my = (State.lastMY - State.vy) / State.vs;
  
  ctx.strokeStyle = '#1a73e8';
  ctx.lineWidth = 2 / State.vs;
  ctx.setLineDash([5 / State.vs, 4 / State.vs]);
  ctx.beginPath();
  ctx.moveTo(cp.x, cp.y);
  ctx.lineTo(mx, my);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ✅ Selection rectangle
function drawSelectionRect() {
  ctx.fillStyle = Theme.color('rgba(26,115,232,0.06)', 'rgba(26,115,232,0.05)');
  ctx.fillRect(State.selRect.x, State.selRect.y, State.selRect.w, State.selRect.h);
  
  ctx.strokeStyle = '#1a73e8';
  ctx.lineWidth = 1 / State.vs;
  ctx.setLineDash([4 / State.vs, 3 / State.vs]);
  ctx.strokeRect(State.selRect.x, State.selRect.y, State.selRect.w, State.selRect.h);
  ctx.setLineDash([]);
}

// ─────────────────────────────────────────────────────────────
// 📝 MARKDOWN PARSING
// ─────────────────────────────────────────────────────────────

const MD_FONTS = {
  h1: `bold 18px var(--font-sans)`,
  h2: `bold 16px var(--font-sans)`,
  h3: `600 14px var(--font-sans)`,
  h4: `600 13px var(--font-sans)`,
  bold: `600 13px var(--font-sans)`,
  italic: `italic 13px var(--font-sans)`,
  code: `12px var(--font-mono)`,
  list: `13px var(--font-sans)`,
  normal: `13px var(--font-sans)`
};

const MD_LH = { h1: 26, h2: 23, h3: 20, h4: 19, bold: 19, italic: 19, code: 18, list: 19, normal: 19 };

function getMdFont(style) {
  return MD_FONTS[style] || MD_FONTS.normal;
}

function getMdLineHeight(style) {
  return MD_LH[style] || 19;
}

function getMdColor(style, nodeTextColor) {
  if (['h1', 'h2', 'h3', 'h4'].includes(style)) {
    return Theme.color('rgba(255,255,255,0.92)', 'rgba(0,0,0,0.88)');
  }
  if (style === 'code') {
    return Theme.color('#FF9500', '#B36200');
  }
  return nodeTextColor;
}

function parseMdLine(line) {
  const t = line.trim();
  
  if (t.startsWith('####')) return { text: t.slice(4).trim(), style: 'h4' };
  if (t.startsWith('###')) return { text: t.slice(3).trim(), style: 'h3' };
  if (t.startsWith('##')) return { text: t.slice(2).trim(), style: 'h2' };
  if (t.startsWith('#')) return { text: t.slice(1).trim(), style: 'h1' };
  if (t.startsWith('**') && t.endsWith('**') && t.length > 4) {
    return { text: t.slice(2, -2), style: 'bold' };
  }
  if (t.startsWith('*') && t.endsWith('*') && t.length > 2) {
    return { text: t.slice(1, -1), style: 'italic' };
  }
  if (t.startsWith('`') && t.endsWith('`') && t.length > 2) {
    return { text: t.slice(1, -1), style: 'code' };
  }
  if (t.startsWith('- ') || t.startsWith('* ')) {
    return { text: '•  ' + t.slice(2), style: 'list' };
  }
  if (/^\d+\.\s/.test(t)) {
    return { text: t, style: 'list' };
  }
  return { text: line, style: 'normal' };
}

// ─────────────────────────────────────────────────────────────
// 🎯 GEOMETRY & HIT TESTING
// ─────────────────────────────────────────────────────────────

function getNodeAt(cx, cy) {
  let group = null;
  
  // Check from top to bottom (last drawn = top)
  for (let i = State.nodes.length - 1; i >= 0; i--) {
    const n = State.nodes[i];
    if (cx >= n.x && cx <= n.x + n.width && cy >= n.y && cy <= n.y + n.height) {
      if (n.type === 'group') {
        if (!group) group = n;
      } else {
        return n;
      }
    }
  }
  return group;
}

function getNodesInRect(rx, ry, rw, rh) {
  return State.nodes.filter(n => 
    !(n.x > rx + rw || n.x + n.width < rx || n.y > ry + rh || n.y + n.height < ry)
  );
}

function connPtAt(n, cx, cy) {
  for (const p of connPts(n)) {
    if (Math.hypot(cx - p.x, cy - p.y) <= 16 / State.vs) {
      return p;
    }
  }
  return null;
}

function distSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const l2 = dx * dx + dy * dy;
  
  if (!l2) return Math.hypot(px - x1, py - y1);
  
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / l2));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function getConnAt(cx, cy) {
  for (const c of State.connections) {
    const fn = State.nodes.find(n => n.id === c.from);
    const tn = State.nodes.find(n => n.id === c.to);
    if (!fn || !tn) continue;
    
    const fp = connPts(fn).find(p => p.side === c.fromSide) || connPts(fn)[1];
    const tp = connPts(tn).find(p => p.side === c.toSide) || connPts(tn)[3];
    
    if (distSeg(cx, cy, fp.x, fp.y, tp.x, tp.y) <= 8 / State.vs) {
      return c;
    }
  }
  return null;
}

function bestSides(fn, tn) {
  const dx = (tn.x + tn.width / 2) - (fn.x + fn.width / 2);
  const dy = (tn.y + tn.height / 2) - (fn.y + fn.height / 2);
  
  const fromSide = Math.abs(dx) > Math.abs(dy) 
    ? (dx > 0 ? 'right' : 'left') 
    : (dy > 0 ? 'bottom' : 'top');
  
  const toSide = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? 'left' : 'right')
    : (dy > 0 ? 'top' : 'bottom');
  
  return { fromSide, toSide };
}

function getCheckItemAt(n, cx, cy) {
  if (!n._checkHitAreas) return -1;
  
  for (const h of n._checkHitAreas) {
    if (cy >= h.y1 && cy <= h.y2 && cx >= h.x1 && cx <= h.x2) {
      return h.idx;
    }
  }
  return -1;
}

// ─────────────────────────────────────────────────────────────
// 🗃️ NODE FACTORIES
// ─────────────────────────────────────────────────────────────

function makeNode(type, text, x, y) {
  const id = 'n' + (++State.nodeCounter);
  const base = {
    id,
    type: type || 'text',
    text: text || '',
    x: x || 100,
    y: y || 100,
    scrollY: 0,
    isSelected: false,
  };
  
  switch (type) {
    case 'sticky':
      return {
        ...base,
        text: text || 'Notiz…',
        width: 190,
        height: 190,
        bg: Theme.color('#332900', '#FFF9C4'),
        textColor: Theme.color('#FFE066', '#1A1200'),
        border: Theme.color('#665200', '#F5D800'),
        typeData: {}
      };
      
    case 'checklist':
      return {
        ...base,
        text: text || 'To-Do',
        width: 260,
        height: 200,
        bg: Theme.color('#0D1A0D', '#F0FFF4'),
        textColor: Theme.color('#D4F0D4', '#003D0F'),
        border: Theme.color('#1A4D1A', '#34a853'),
        typeData: { items: [{ text: 'Erstes Element', checked: false }] }
      };
      
    case 'group':
      return {
        ...base,
        text: text || 'Bereich',
        width: 400,
        height: 300,
        bg: Theme.color('rgba(255,255,255,0.02)', 'rgba(0,0,0,0.02)'),
        textColor: Theme.color('rgba(255,255,255,0.45)', 'rgba(0,0,0,0.35)'),
        border: Theme.color('rgba(255,255,255,0.14)', 'rgba(0,0,0,0.14)'),
        typeData: {}
      };
      
    default:
      return {
        ...base,
        text: text || 'Neue Notiz',
        width: 260,
        height: 130,
        bg: Theme.color('#1C1C1E', '#FFFFFF'),
        textColor: Theme.color('rgba(255,255,255,0.88)', 'rgba(0,0,0,0.85)'),
        border: Theme.color('rgba(255,255,255,0.10)', 'rgba(0,0,0,0.09)'),
        typeData: {}
      };
  }
}

// ✅ Clean node for serialization (remove runtime props)
function cleanNode(n) {
  const { _resizeHandles, _scrollbarBounds, _contentHeight, _maxScroll, 
          _checkHitAreas, isEditing, ...rest } = n;
  return rest;
}

function createNode(type, x, y, text) {
  const n = makeNode(type, text, Canvas.snap(x || 100), Canvas.snap(y || 100));
  State.nodes.push(n);
  pushHistory();
  autosave();
  updateStatusBar();
  scheduleRender();
  return n;
}

function deleteNode(n) {
  State.nodes = State.nodes.filter(nd => nd !== n);
  State.connections = State.connections.filter(c => c.from !== n.id && c.to !== n.id);
  State.selectedNodes = State.selectedNodes.filter(s => s !== n);
  if (State.selectedConn && (State.selectedConn.from === n.id || State.selectedConn.to === n.id)) {
    State.selectedConn = null;
  }
  pushHistory();
  autosave();
  updateStatusBar();
  scheduleRender();
}

function deleteConn(c) {
  State.connections = State.connections.filter(x => x !== c);
  if (State.selectedConn === c) {
    State.selectedConn = null;
  }
  pushHistory();
  autosave();
  updateStatusBar();
  scheduleRender();
}

// ─────────────────────────────────────────────────────────────
// 📜 HISTORY SYSTEM (Fixed Reference Issues)
// ─────────────────────────────────────────────────────────────

function pushHistory() {
  if (State.suppressHistory) return;
  
  const snap = JSON.stringify({
    nodes: State.nodes.map(cleanNode),
    connections: State.connections
  });
  
  State.history = State.history.slice(0, State.historyIdx + 1);
  State.history.push(snap);
  
  if (State.history.length > CONFIG.MAX_HISTORY) {
    State.history.shift();
  }
  State.historyIdx = State.history.length - 1;
}

function applyHistory(snap) {
  State.suppressHistory = true;
  
  const data = safeJSONParse(snap, { nodes: [], connections: [] });
  const oldIdMap = new Map(State.nodes.map(n => [n.id, n]));
  
  // Recreate nodes
  State.nodes = (data.nodes || []).map(nd => {
    const n = makeNode(nd.type || 'text', nd.text, nd.x, nd.y);
    Object.assign(n, nd);
    return n;
  });
  
  // Restore connections
  State.connections = data.connections || [];
  
  // ✅ Fix: Update selection references to new node objects
  State.selectedNodes = State.selectedNodes
    .map(sel => State.nodes.find(n => n.id === sel?.id))
    .filter(Boolean);
  
  if (State.selectedConn) {
    State.selectedConn = State.connections.find(c => c.id === State.selectedConn?.id) || null;
  }
  
  // Clear selection as fallback
  State.clearSelection();
  
  State.suppressHistory = false;
  autosave();
  scheduleRender();
  updateStatusBar();
}

function undo() {
  if (State.historyIdx <= 0) {
    toast('Nichts zum Rückgängigmachen', 'info');
    return;
  }
  State.historyIdx--;
  applyHistory(State.history[State.historyIdx]);
  toast('↩ Rückgängig', 'success');
}

function redo() {
  if (State.historyIdx >= State.history.length - 1) {
    toast('Nichts zum Wiederholen', 'info');
    return;
  }
  State.historyIdx++;
  applyHistory(State.history[State.historyIdx]);
  toast('↪ Wiederholt', 'success');
}

// ─────────────────────────────────────────────────────────────
// 🔔 TOAST NOTIFICATIONS
// ─────────────────────────────────────────────────────────────

function toast(message, type = 'info', duration = 2200) {
  const el = $('#toast');
  if (!el) return;
  
  el.textContent = message;
  el.className = `show ${type}`;
  el.setAttribute('data-type', type);
  
  clearTimeout(el._tid);
  el._tid = setTimeout(() => {
    el.classList.remove('show');
  }, duration);
}

// ─────────────────────────────────────────────────────────────
// 📊 STATUS BAR
// ─────────────────────────────────────────────────────────────

function updateStatusBar() {
  const nodeCount = $('#node-count');
  const connCount = $('#conn-count');
  const zoomDisplay = $('#zoom-display');
  
  if (nodeCount) nodeCount.textContent = State.nodes.length;
  if (connCount) connCount.textContent = State.connections.length;
  if (zoomDisplay) {
    const zoomPct = Math.round(State.vs * 100);
    zoomDisplay.textContent = `${zoomPct}%`;
    zoomDisplay.setAttribute('aria-label', `Zoom: ${zoomPct}%`);
  }
}

// ─────────────────────────────────────────────────────────────
// 💾 EXPORT / IMPORT / AUTOSAVE
// ─────────────────────────────────────────────────────────────

function exportData() {
  return {
    version: '3.1',
    timestamp: Date.now(),
    nodes: State.nodes.map(cleanNode),
    edges: State.connections.map(c => ({
      id: c.id,
      fromNode: c.from,
      toNode: c.to,
      fromSide: c.fromSide,
      toSide: c.toSide
    }))
  };
}

function importData(data) {
  // ✅ Schema validation
  if (!data || typeof data !== 'object') {
    throw new Error('Ungültiges Datenformat');
  }
  
  // ✅ Version migration
  if (data.version && data.version < '3.0') {
    console.log('Migrating from version', data.version);
    // Add migration logic here if needed
  }
  
  State.reset();
  
  // Import nodes
  (data.nodes || []).forEach(nd => {
    const n = makeNode(nd.type || 'text', nd.text || 'Node', nd.x || 100, nd.y || 100);
    Object.assign(n, {
      width: nd.width || 260,
      height: nd.height || 130,
      bg: nd.bg || n.bg,
      textColor: nd.textColor || n.textColor,
      border: nd.border || n.border,
      typeData: nd.typeData || (nd.type === 'checklist' ? { items: [] } : {})
    });
    
    // Update counter
    const num = parseInt(String(n.id).replace(/\D/g, ''));
    if (!isNaN(num) && num > State.nodeCounter) {
      State.nodeCounter = num;
    }
    
    State.nodes.push(n);
  });
  
  // Import connections
  (data.edges || data.connections || []).forEach(e => {
    State.connections.push({
      id: e.id || `c${Date.now()}`,
      from: e.fromNode || e.from,
      to: e.toNode || e.to,
      fromSide: e.fromSide || 'right',
      toSide: e.toSide || 'left'
    });
  });
  
  pushHistory();
  updateStatusBar();
  scheduleRender();
}

// ✅ Debounced autosave
const autosave = debounce(() => {
  try {
    localStorage.setItem('ic_v3', JSON.stringify(exportData()));
  } catch (e) {
    console.warn('Autosave failed:', e);
    if (e.name === 'QuotaExceededError') {
      toast('Speicher voll - bitte exportieren', 'error');
    }
  }
}, CONFIG.AUTOSAVE_DELAY);

// ─────────────────────────────────────────────────────────────
// 🎮 EVENT HANDLERS
// ─────────────────────────────────────────────────────────────

function initEvents() {
  const canvas = Canvas.element;
  if (!canvas) return;
  
  // Prevent context menu on canvas
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const { x: cx, y: cy } = Canvas.s2c(e.clientX - rect.left, e.clientY - rect.top);
    showContextMenu(e.clientX, e.clientY, getNodeAt(cx, cy));
  });
  
  // Mouse down
  canvas.addEventListener('mousedown', handleMouseDown);
  
  // Mouse move
  canvas.addEventListener('mousemove', handleMouseMove);
  
  // Mouse leave
  canvas.addEventListener('mouseleave', () => {
    State.mouseIsOnCanvas = false;
    State.hoverNode = null;
    State.hoverConnPt = null;
    scheduleRender();
  });
  
  // Mouse up (document-level for drag continuation)
  document.addEventListener('mouseup', handleMouseUp);
  
  // Wheel for zoom/scroll
  canvas.addEventListener('wheel', handleWheel, { passive: false });
  
  // Double click for quick create/edit
  canvas.addEventListener('dblclick', handleDoubleClick);
  
  // Touch events
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd);
  canvas.addEventListener('touchcancel', handleTouchEnd);
  
  // Keyboard
  document.addEventListener('keydown', handleKeyDown);
  
  // Window resize
  window.addEventListener('resize', () => {
    Canvas.resize();
  });
  
  // Close menus on outside click
  document.addEventListener('mousedown', (e) => {
    const menu = $('#ctx-menu');
    const dropdown = $('#add-dropdown');
    const btnAdd = $('#btn-add');
    
    if (menu && !menu.contains(e.target)) {
      closeContextMenu();
    }
    if (dropdown && !dropdown.contains(e.target) && btnAdd && !btnAdd.contains(e.target)) {
      closeDropdown();
    }
  });
}

function handleMouseDown(e) {
  closeDropdown();
  closeContextMenu();
  
  const rect = Canvas.element.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { x: cx, y: cy } = Canvas.s2c(mx, my);
  
  State.mouseIsOnCanvas = true;
  
  const node = getNodeAt(cx, cy);
  
  if (!node) {
    // Check for connection click
    const conn = getConnAt(cx, cy);
    if (conn) {
      State.clearSelection();
      State.selectedConn = conn;
      scheduleRender();
      return;
    }
  }
  
  if (node) {
    // Checklist checkbox click
    if (node.type === 'checklist' && !e.shiftKey) {
      const idx = getCheckItemAt(node, cx, cy);
      if (idx >= 0) {
        node.typeData.items[idx].checked = !node.typeData.items[idx].checked;
        pushHistory();
        autosave();
        scheduleRender();
        return;
      }
    }
    
    // Connection point click
    const cp = connPtAt(node, cx, cy);
    if (e.shiftKey && cp) {
      State.isConnecting = true;
      State.connStart = node;
      State.connStartPt = cp;
      State.clearSelection();
      State.isDragging = false;
      State.lastMX = mx;
      State.lastMY = my;
      scheduleRender();
      return;
    }
    
    // Resize handle click
    const rh = node._resizeHandles?.find(h => 
      cx >= h.x && cx <= h.x + h.w && cy >= h.y && cy <= h.y + h.h
    );
    if (rh && !e.shiftKey) {
      State.isResizing = true;
      State.rzNode = node;
      State.rzHandle = rh;
      State.rzSX = cx;
      State.rzSY = cy;
      State.rzSW = node.width;
      State.rzSH = node.height;
      State.rzNX = node.x;
      State.rzNY = node.y;
      State.isDragging = false;
      State.lastMX = mx;
      State.lastMY = my;
      return;
    }
    
    // Scrollbar click
    if (node._scrollbarBounds) {
      const sb = node._scrollbarBounds;
      if (cx >= sb.x && cx <= sb.x + sb.w && cy >= sb.y && cy <= sb.y + sb.h) {
        State.isScrollDrag = true;
        State.sbNode = node;
        State.sbDragOffset = cy - sb.thumbY;
        State.isDragging = false;
        State.lastMX = mx;
        State.lastMY = my;
        return;
      }
    }
    
    // Node selection
    if (e.ctrlKey || e.metaKey) {
      State.toggleSelection(node);
    } else if (e.shiftKey && State.selectedNodes.length > 0) {
      State.addSelection(node);
    } else {
      State.selectNode(node);
    }
    
    if (node.isSelected) {
      State.isNodeDrag = true;
      State.dragNode = node;
      State.dragOffX = cx - node.x;
      State.dragOffY = cy - node.y;
    }
  } else {
    // Canvas click
    if (e.button === 1 || e.altKey) {
      // Middle mouse or alt+drag = pan
      State.isPanning = true;
      if (!e.ctrlKey && !e.metaKey && !e.shiftKey && !e.altKey) {
        State.clearSelection();
      }
    } else {
      // Left click = selection or rect select
      if (!e.ctrlKey && !e.metaKey && !e.shiftKey) {
        State.clearSelection();
      }
      State.isSelecting = true;
      State.selStart = { x: cx, y: cy };
      State.selRect = null;
    }
  }
  
  State.lastMX = mx;
  State.lastMY = my;
  State.isDragging = true;
  State.hasMoved = false;
  scheduleRender();
}

function handleMouseMove(e) {
  const rect = Canvas.element.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { x: cx, y: cy } = Canvas.s2c(mx, my);
  
  // Update hover state
  State.hoverNode = getNodeAt(cx, cy);
  State.hoverConnPt = State.hoverNode ? connPtAt(State.hoverNode, cx, cy) : null;
  
  // Update cursor
  updateCursor(cx, cy, e);
  
  const dx = mx - State.lastMX;
  const dy = my - State.lastMY;
  
  if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
    State.hasMoved = true;
  }
  
  applyDrag(cx, cy, dx, dy);
  
  State.lastMX = mx;
  State.lastMY = my;
  scheduleRender();
}

function updateCursor(cx, cy, e) {
  const canvas = Canvas.element;
  if (!canvas) return;
  
  if (State.isResizing && State.rzHandle) {
    canvas.style.cursor = State.rzHandle.cursor;
  } else if (State.isScrollDrag) {
    canvas.style.cursor = 'ns-resize';
  } else if (State.isConnecting) {
    canvas.style.cursor = 'crosshair';
  } else if (State.hoverConnPt && e.shiftKey) {
    canvas.style.cursor = 'copy';
  } else if (State.hoverNode) {
    const rh = State.hoverNode._resizeHandles?.find(h => 
      cx >= h.x && cx <= h.x + h.w && cy >= h.y && cy <= h.y + h.h
    );
    canvas.style.cursor = rh ? rh.cursor : 'grab';
  } else {
    canvas.style.cursor = State.isPanning ? 'grabbing' : 'default';
  }
}

function handleMouseUp(e) {
  // Resize end
  if (State.isResizing) {
    State.isResizing = false;
    if (State.rzNode) {
      pushHistory();
      autosave();
    }
    State.rzNode = null;
    State.rzHandle = null;
    scheduleRender();
    return;
  }
  
  // Scroll drag end
  if (State.isScrollDrag) {
    State.isScrollDrag = false;
    State.sbNode = null;
    scheduleRender();
    return;
  }
  
  // Connection end
  if (State.isConnecting && State.connStart) {
    const rect = Canvas.element.getBoundingClientRect();
    const { x: cx, y: cy } = Canvas.s2c(e.clientX - rect.left, e.clientY - rect.top);
    const target = getNodeAt(cx, cy);
    
    if (target && target !== State.connStart) {
      const tp = connPtAt(target, cx, cy);
      const { fromSide, toSide } = bestSides(State.connStart, target);
      
      State.connections.push({
        id: 'c' + Date.now(),
        from: State.connStart.id,
        to: target.id,
        fromSide: State.connStartPt?.side || fromSide,
        toSide: tp?.side || toSide
      });
      
      pushHistory();
      autosave();
      updateStatusBar();
    }
    
    State.isConnecting = false;
    State.connStart = null;
    State.connStartPt = null;
    
    const canvas = Canvas.element;
    if (canvas) canvas.style.cursor = 'default';
  }
  
  // Selection rect end
  if (State.isSelecting) {
    if (State.selRect && (State.selRect.w > 4 || State.selRect.h > 4)) {
      const sel = getNodesInRect(State.selRect.x, State.selRect.y, State.selRect.w, State.selRect.h);
      
      if (e.ctrlKey || e.metaKey || e.shiftKey) {
        sel.forEach(n => State.addSelection(n));
      } else {
        State.clearSelection();
        sel.forEach(n => State.addSelection(n));
      }
    }
    State.isSelecting = false;
    State.selRect = null;
  }
  
  // Node drag end
  if (State.dragNode && !State.hasMoved) {
    State.selectNode(State.dragNode);
  }
  
  if (State.isNodeDrag && State.hasMoved) {
    pushHistory();
    autosave();
  }
  
  // Reset interaction flags
  State.isDragging = false;
  State.isNodeDrag = false;
  State.isPanning = false;
  State.dragNode = null;
  State.hasMoved = false;
  
  scheduleRender();
}

function handleWheel(e) {
  e.preventDefault();
  
  const rect = Canvas.element.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const { x: cx, y: cy } = Canvas.s2c(mx, my);
  
  const hn = getNodeAt(cx, cy);
  
  // Node scroll (when not zooming)
  if (hn && hn._maxScroll > 0 && !e.ctrlKey && !e.metaKey && Math.abs(e.deltaX) < Math.abs(e.deltaY)) {
    hn.scrollY = Math.max(0, Math.min(
      hn.scrollY + e.deltaY * CONFIG.SCROLL_SENSITIVITY,
      hn._maxScroll
    ));
    scheduleRender();
    return;
  }
  
  // Canvas pan (horizontal scroll or vertical without ctrl)
  if (!e.ctrlKey && !e.metaKey && Math.abs(e.deltaX) > 0 && Math.abs(e.deltaX) < 80 && Math.abs(e.deltaY) < 80) {
    State.vx -= e.deltaX;
    State.vy -= e.deltaY;
    scheduleRender();
    return;
  }
  
  // Zoom
  if (e.ctrlKey || e.metaKey || Math.abs(e.deltaY) > 5) {
    const factor = e.deltaY > 0 ? 1 / CONFIG.ZOOM_FACTOR : CONFIG.ZOOM_FACTOR;
    const newZoom = Math.max(CONFIG.ZOOM_MIN, Math.min(CONFIG.ZOOM_MAX, State.vs * factor));
    
    // Zoom towards mouse position
    State.vx -= (mx - State.vx) * (newZoom - State.vs) / State.vs;
    State.vy -= (my - State.vy) * (newZoom - State.vs) / State.vs;
    State.vs = newZoom;
    
    scheduleRender();
  }
}

function handleDoubleClick(e) {
  const rect = Canvas.element.getBoundingClientRect();
  const { x: cx, y: cy } = Canvas.s2c(e.clientX - rect.left, e.clientY - rect.top);
  const n = getNodeAt(cx, cy);
  
  if (n) {
    if (n.type === 'checklist') {
      openChecklistEditor(n);
    } else {
      editNodeText(n);
    }
  } else {
    createNode('text', cx - 130, cy - 65);
  }
}

function handleKeyDown(e) {
  // Ignore when typing in inputs
  const tag = document.activeElement?.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT' || document.activeElement?.isContentEditable) {
    return;
  }
  
  const step = e.shiftKey ? 10 : 1;
  
  switch (e.key) {
    case 'Delete':
    case 'Backspace':
      if (State.selectedConn) {
        deleteConn(State.selectedConn);
        e.preventDefault();
        return;
      }
      if (State.selectedNodes.length) {
        [...State.selectedNodes].forEach(n => deleteNode(n));
        e.preventDefault();
      }
      break;
      
    case 'Escape':
      if ($('#spotlight')?.classList.contains('open')) {
        closeSpotlight();
        e.preventDefault();
        return;
      }
      if (State.isConnecting) {
        State.isConnecting = false;
        State.connStart = null;
        State.connStartPt = null;
        const canvas = Canvas.element;
        if (canvas) canvas.style.cursor = 'default';
        scheduleRender();
      }
      closeContextMenu();
      closeDropdown();
      e.preventDefault();
      break;
      
    case 'f':
    case 'F':
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        openSpotlight();
      }
      break;
      
    case 'a':
    case 'A':
      if (e.ctrlKey || e.metaKey) {
        State.clearSelection();
        State.nodes.forEach(n => State.addSelection(n));
        scheduleRender();
        e.preventDefault();
      }
      break;
      
    case 'z':
    case 'Z':
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        if (e.shiftKey) {
          redo();
        } else {
          undo();
        }
      }
      break;
      
    case 'y':
    case 'Y':
      if (e.ctrlKey || e.metaKey) {
        redo();
        e.preventDefault();
      }
      break;
      
    case 'c':
    case 'C':
      if ((e.ctrlKey || e.metaKey) && State.selectedNodes.length) {
        State.clipboard = State.selectedNodes.map(n => cleanNode(n));
        toast(`Kopiert (${State.clipboard.length})`, 'info');
        e.preventDefault();
      }
      break;
      
    case 'v':
    case 'V':
      if ((e.ctrlKey || e.metaKey) && State.clipboard.length) {
        State.clearSelection();
        State.clipboard.forEach((nd, i) => {
          const nn = createNode(nd.type || 'text', nd.x + 40 + i * 30, nd.y + 40 + i * 30, nd.text);
          nn.width = nd.width;
          nn.height = nd.height;
          nn.bg = nd.bg;
          nn.textColor = nd.textColor;
          nn.border = nd.border;
          if (nd.typeData) {
            nn.typeData = JSON.parse(JSON.stringify(nd.typeData));
          }
          State.addSelection(nn);
        });
        toast(`Eingefügt (${State.clipboard.length})`, 'success');
        e.preventDefault();
      }
      break;
      
    case 'n':
    case 'N':
      if (!e.ctrlKey && !e.metaKey) {
        const cx = (Canvas.element.width / 2 - State.vx) / State.vs;
        const cy = (Canvas.element.height / 2 - State.vy) / State.vs;
        createNode('text', cx - 130, cy - 65);
        e.preventDefault();
      }
      break;
      
    case 'ArrowLeft':
      if (State.selectedNodes.length) {
        State.selectedNodes.forEach(n => n.x -= step);
        pushHistory();
        scheduleRender();
        e.preventDefault();
      }
      break;
      
    case 'ArrowRight':
      if (State.selectedNodes.length) {
        State.selectedNodes.forEach(n => n.x += step);
        pushHistory();
        scheduleRender();
        e.preventDefault();
      }
      break;
      
    case 'ArrowUp':
      if (State.selectedNodes.length) {
        State.selectedNodes.forEach(n => n.y -= step);
        pushHistory();
        scheduleRender();
        e.preventDefault();
      }
      break;
      
    case 'ArrowDown':
      if (State.selectedNodes.length) {
        State.selectedNodes.forEach(n => n.y += step);
        pushHistory();
        scheduleRender();
        e.preventDefault();
      }
      break;
  }
}

// Touch event handlers
function handleTouchStart(e) {
  e.preventDefault();
  
  if (e.touches.length === 2) {
    // Pinch zoom
    const touch1 = e.touches[0];
    const touch2 = e.touches[1];
    State.touchStartDist = Math.hypot(
      touch2.clientX - touch1.clientX,
      touch2.clientY - touch1.clientY
    );
    State.touchStartZoom = State.vs;
  } else if (e.touches.length === 1) {
    // Single touch = pan or select
    const touch = e.touches[0];
    const rect = Canvas.element.getBoundingClientRect();
    handleMouseDown({
      clientX: touch.clientX,
      clientY: touch.clientY,
      button: 0,
      ctrlKey: false,
      metaKey: false,
      shiftKey: false,
      altKey: false
    });
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  
  if (e.touches.length === 2) {
    // Pinch zoom
    const touch1 = e.touches[0];
    const touch2 = e.touches[1];
    const dist = Math.hypot(
      touch2.clientX - touch1.clientX,
      touch2.clientY - touch1.clientY
    );
    
    if (State.touchStartDist > 0) {
      const factor = dist / State.touchStartDist;
      const newZoom = Math.max(CONFIG.ZOOM_MIN, Math.min(CONFIG.ZOOM_MAX, State.touchStartZoom * factor));
      
      // Zoom towards center of pinch
      const rect = Canvas.element.getBoundingClientRect();
      const cx = (touch1.clientX + touch2.clientX) / 2 - rect.left;
      const cy = (touch1.clientY + touch2.clientY) / 2 - rect.top;
      
      State.vx -= (cx - State.vx) * (newZoom - State.vs) / State.vs;
      State.vy -= (cy - State.vy) * (newZoom - State.vs) / State.vs;
      State.vs = newZoom;
      
      scheduleRender();
    }
  } else if (e.touches.length === 1) {
    // Single touch drag
    const touch = e.touches[0];
    handleMouseMove({
      clientX: touch.clientX,
      clientY: touch.clientY
    });
  }
}

function handleTouchEnd(e) {
  if (State.isDragging) {
    handleMouseUp(e);
  }
  State.touchStartDist = 0;
}

function applyDrag(cx, cy, dx, dy) {
  if (State.isResizing && State.rzNode && State.rzHandle) {
    const ddx = cx - State.rzSX;
    const ddy = cy - State.rzSY;
    let nx = State.rzNX, ny = State.rzNY, nw = State.rzSW, nh = State.rzSH;
    
    switch (State.rzHandle.type) {
      case 'se':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW + ddx);
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH + ddy);
        break;
      case 'sw':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW - ddx);
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH + ddy);
        nx = State.rzNX + State.rzSW - nw;
        break;
      case 'ne':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW + ddx);
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH - ddy);
        ny = State.rzNY + State.rzSH - nh;
        break;
      case 'nw':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW - ddx);
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH - ddy);
        nx = State.rzNX + State.rzSW - nw;
        ny = State.rzNY + State.rzSH - nh;
        break;
      case 'e':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW + ddx);
        break;
      case 'w':
        nw = Math.max(CONFIG.MIN_NODE_W, State.rzSW - ddx);
        nx = State.rzNX + State.rzSW - nw;
        break;
      case 's':
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH + ddy);
        break;
      case 'n':
        nh = Math.max(CONFIG.MIN_NODE_H, State.rzSH - ddy);
        ny = State.rzNY + State.rzSH - nh;
        break;
    }
    
    State.rzNode.x = Canvas.snap(nx);
    State.rzNode.y = Canvas.snap(ny);
    State.rzNode.width = nw;
    State.rzNode.height = nh;
    
  } else if (State.isScrollDrag && State.sbNode) {
    const sb = State.sbNode._scrollbarBounds;
    if (sb) {
      const rel = cy - State.sbDragOffset - sb.y;
      const maxT = sb.h - sb.thumbH;
      State.sbNode.scrollY = maxT > 0 
        ? (Math.max(0, Math.min(rel, maxT)) / maxT) * State.sbNode._maxScroll 
        : 0;
    }
    
  } else if (State.isDragging) {
    if (State.isSelecting) {
      const minX = Math.min(State.selStart.x, cx);
      const minY = Math.min(State.selStart.y, cy);
      State.selRect = {
        x: minX,
        y: minY,
        w: Math.abs(cx - State.selStart.x),
        h: Math.abs(cy - State.selStart.y)
      };
    } else if (State.isNodeDrag && State.dragNode) {
      const ndx = (cx - State.dragOffX) - State.dragNode.x;
      const ndy = (cy - State.dragOffY) - State.dragNode.y;
      
      State.selectedNodes.forEach(n => {
        n.x = Canvas.snap(n.x + ndx);
        n.y = Canvas.snap(n.y + ndy);
      });
    } else if (State.isPanning) {
      State.vx += dx;
      State.vy += dy;
    }
  }
}

// ─────────────────────────────────────────────────────────────
// ✏️ INLINE TEXT EDITOR
// ─────────────────────────────────────────────────────────────

function editNodeText(n) {
  const rect = Canvas.element.getBoundingClientRect();
  const sx = rect.left + n.x * State.vs + State.vx;
  const sy = rect.top + n.y * State.vs + State.vy;
  const sw = n.width * State.vs;
  const sh = n.height * State.vs;
  
  const ta = document.createElement('textarea');
  ta.value = n.text || '';
  ta.style.cssText = `
    position:fixed;
    left:${sx}px;
    top:${sy}px;
    width:${sw}px;
    height:${sh}px;
    z-index:9999;
    background:${n.bg};
    color:${n.textColor};
    border:2px solid #1a73e8;
    border-radius:${n.type === 'sticky' ? 10 : 14}px;
    padding:12px;
    font-size:${Math.max(10, 13 * State.vs)}px;
    font-family:var(--font-sans);
    line-height:1.6;
    resize:none;
    outline:none;
    box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(26,115,232,0.3);
    caret-color:#1a73e8;
  `;
  ta.setAttribute('aria-label', 'Node-Text bearbeiten');
  
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  
  n.isEditing = true;
  scheduleRender();
  
  let done = false;
  
  const cleanup = () => {
    if (done || !document.body.contains(ta)) return;
    done = true;
    
    ta.removeEventListener('blur', onBlur);
    ta.removeEventListener('keydown', onKeyDown);
    
    if (document.body.contains(ta)) {
      document.body.removeChild(ta);
    }
  };
  
  const finish = () => {
    cleanup();
    n.text = ta.value || 'Node';
    n.isEditing = false;
    pushHistory();
    autosave();
    scheduleRender();
  };
  
  const cancel = () => {
    cleanup();
    n.isEditing = false;
    scheduleRender();
  };
  
  const onBlur = () => finish();
  
  const onKeyDown = (ev) => {
    if (ev.key === 'Enter' && ev.ctrlKey) {
      ev.preventDefault();
      ev.stopPropagation();
      finish();
    } else if (ev.key === 'Escape') {
      ev.preventDefault();
      ev.stopPropagation();
      cancel();
    } else if (ev.key === 'Tab') {
      ev.preventDefault();
      ev.stopPropagation();
      const s = ta.selectionStart;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 2;
    } else {
      ev.stopPropagation();
    }
  };
  
  ta.addEventListener('blur', onBlur);
  ta.addEventListener('keydown', onKeyDown);
}

// ─────────────────────────────────────────────────────────────
// ✅ CHECKLIST EDITOR
// ─────────────────────────────────────────────────────────────

function updateClProgress(items) {
  const done = items.filter(it => it.checked).length;
  const pct = items.length ? done / items.length : 0;
  
  const bar = $('#cl-progress-bar');
  const label = $('#cl-progress-label');
  const wrap = $('#cl-progress-bar-wrap');
  
  if (bar) bar.style.width = (pct * 100) + '%';
  if (label) label.textContent = `${done} / ${items.length}`;
  if (wrap) {
    wrap.setAttribute('aria-valuenow', Math.round(pct * 100));
  }
}

function openChecklistEditor(n) {
  State.clNode = n;
  const el = $('#cl-editor');
  if (!el) return;
  
  const titleInput = $('#cl-title-input');
  if (titleInput) {
    titleInput.value = n.text || '';
  }
  
  renderClItems(n.typeData?.items || []);
  
  // Position editor next to node
  const rect = Canvas.element.getBoundingClientRect();
  const sx = rect.left + n.x * State.vs + State.vx + n.width * State.vs + 12;
  const sy = rect.top + n.y * State.vs + State.vy;
  
  el.style.display = 'block';
  el.showModal?.(); // For dialog support
  
  const ew = 320;
  const left = Math.min(sx, window.innerWidth - ew - 12);
  const top = Math.max(12, Math.min(sy, window.innerHeight - 460));
  
  el.style.left = left + 'px';
  el.style.top = top + 'px';
  
  if (titleInput) {
    titleInput.focus();
    titleInput.select();
  }
}
